<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-black text-gray-300 text-[11px] overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-black z-[999] flex items-center justify-center">
        <div class="w-full max-w-sm p-10 bg-[#0a0e12] border border-[#1c2024] rounded-2xl text-center">
            <div class="mb-8">
                <span class="text-4xl font-black text-white tracking-tighter"><span class="text-[#00b15d]">Ex</span>Nexus</span>
                <p class="text-[9px] text-gray-500 mt-2 tracking-[0.4em]">PRO TERMINAL</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="u" class="w-full bg-black border border-[#1c2024] p-3 rounded text-white outline-none focus:border-[#00b15d]" placeholder="Username">
                <input type="password" id="p" class="w-full bg-black border border-[#1c2024] p-3 rounded text-white outline-none focus:border-[#00b15d]" placeholder="Password">
                <button onclick="handleLogin()" class="w-full bg-[#00b15d] text-white py-4 rounded font-black text-[10px] uppercase tracking-widest shadow-[0_0_20px_rgba(0,177,93,0.3)]">
                    Initialize Session
                </button>
            </div>
        </div>
    </div>

    <div id="terminal-screen" class="h-screen flex flex-col" style="display: none;">
        <header class="h-10 border-b border-[#1c2024] flex items-center px-4 bg-[#0a0e12] justify-between">
            <span class="text-sm font-black"><span class="text-[#00b15d]">Ex</span>Nexus</span>
            <div class="text-[10px] text-[#00b15d] font-bold">● SYSTEM ACTIVE</div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-56 border-r border-[#1c2024] bg-[#0a0e12]">
                <div class="p-2 border-b border-[#1c2024] text-[9px] font-bold text-gray-600">ORDER BOOK</div>
                <div class="text-lg font-bold text-[#00b15d] text-center py-6">71,048.00 ↑</div>
            </aside>
            
            <div class="flex-1 bg-black">
                <div id="tv-layout-grid" class="h-full grid grid-cols-2 grid-rows-2 gap-[1px] bg-[#1c2024]">
                    <div id="tv-1" class="bg-black"></div>
                    <div id="tv-2" class="bg-black"></div>
                    <div id="tv-3" class="bg-black"></div>
                    <div id="tv-4" class="bg-black"></div>
                </div>
            </div>

            <aside class="w-72 border-l border-[#1c2024] bg-[#0a0e12] p-4">
                <button class="w-full bg-[#00b15d] text-white py-4 rounded font-black text-xs uppercase shadow-[0_4px_20px_rgba(0,177,93,0.2)]">Open Long / Buy</button>
            </aside>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        // Emergency Backup in case app.js fails to load
        function handleLogin() {
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('terminal-screen').style.display = 'flex';
            if (typeof initCharts === 'function') initCharts();
        }
    </script>
</body>
</html>
