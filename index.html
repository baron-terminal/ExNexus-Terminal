<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Baron Terminal | Multi-Exchange</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css" rel="stylesheet">
    <style>
        body { background-color: #0a0e12; color: #ffffff; font-family: sans-serif; }
        .bybit-dark { background-color: #161b21; border: 1px solid #2d343b; }
    </style>
</head>
<body>
    <div class="min-h-screen flex">
        <nav class="w-16 border-r border-[#2d343b] flex flex-col items-center py-6 gap-8 bg-[#0a0e12]">
            <div class="text-[#f7a600] font-bold text-xl font-mono">B</div>
            <i data-lucide="layout-grid" class="text-[#f7a600] cursor-pointer w-6 h-6"></i>
            <i data-lucide="trending-up" class="text-gray-500 hover:text-white cursor-pointer w-6 h-6"></i>
            <i data-lucide="wallet" class="text-gray-500 hover:text-white cursor-pointer w-6 h-6"></i>
            <i data-lucide="settings" class="mt-auto text-gray-500 hover:text-white cursor-pointer w-6 h-6"></i>
        </nav>

        <main class="flex-1 flex flex-col">
            <header class="h-14 border-b border-[#2d343b] flex items-center px-6 justify-between bg-[#161b21]">
                <div class="flex items-center gap-4">
                    <h1 class="font-bold">BTC / USDT</h1>
                    <span class="text-[#00b15d] font-mono text-sm">$68,432.50 (+2.4%)</span>
                </div>
                <div class="flex gap-2 bg-[#0a0e12] p-1 rounded border border-[#2d343b]">
                    <button class="px-3 py-1 bg-[#2d343b] rounded text-xs">Bybit</button>
                    <button class="px-3 py-1 text-gray-500 text-xs">Binance</button>
                    <button class="px-3 py-1 text-gray-500 text-xs">Gate.io</button>
                </div>
            </header>

            <div class="flex-1 grid grid-cols-12 overflow-hidden">
                <div class="col-span-8 border-r border-[#2d343b] bg-black flex items-center justify-center">
                    <div class="text-gray-500 italic">[ Chart Interface Loading... ]</div>
                </div>
                <div class="col-span-4 flex flex-col bybit-dark">
                    <div class="flex border-b border-[#2d343b]">
                        <button class="flex-1 py-3 text-sm border-b-2 border-[#f7a600]">Limit</button>
                        <button class="flex-1 py-3 text-sm text-gray-500">Market</button>
                    </div>
                    <div class="p-4 space-y-4">
                        <label class="text-xs text-gray-500">Price (USDT)</label>
                        <input type="text" class="w-full bg-[#0a0e12] border border-[#2d343b] p-2 rounded text-right outline-none" value="68432.50">
                        <label class="text-xs text-gray-500">Qty (BTC)</label>
                        <input type="text" class="w-full bg-[#0a0e12] border border-[#2d343b] p-2 rounded text-right outline-none" placeholder="0.001">
                        <div class="grid grid-cols-2 gap-3 pt-4">
                            <button class="bg-[#00b15d] py-3 rounded font-bold">Long</button>
                            <button class="bg-[#ff3b30] py-3 rounded font-bold">Short</button>
                        </div>
                    </div>
                    <div class="mt-auto p-4 border-t border-[#2d343b] text-[10px] text-gray-500">
                        PRIVATE TERMINAL: USER_ACCESS_GRANTED
                    </div>
                </div>
            </div>

            <footer class="h-48 border-t border-[#2d343b] bybit-dark overflow-y-auto">
                <table class="w-full text-left text-[11px]">
                    <thead class="bg-[#161b21] sticky top-0 border-b border-[#2d343b] text-gray-500">
                        <tr>
                            <th class="p-3">EXCHANGE</th>
                            <th class="p-3">SYMBOL</th>
                            <th class="p-3">SIDE</th>
                            <th class="p-3">ENTRY</th>
                            <th class="p-3">P&L</th>
                            <th class="p-3 text-right">ACTION</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr class="border-b border-[#2d343b]">
                            <td class="p-3 text-[#f7a600]">BYBIT</td>
                            <td class="p-3">BTCUSDT</td>
                            <td class="p-3 text-[#00b15d]">LONG 10X</td>
                            <td class="p-3 font-mono">67,200.00</td>
                            <td class="p-3 text-[#00b15d] font-bold">+124.50 USDT</td>
                            <td class="p-3 text-right text-[#f7a600]">CLOSE</td>
                        </tr>
                    </tbody>
                </table>
            </footer>
        </main>
    </div>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
