<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Command Center</title>
    <!-- Link to our STYLE file -->
    <link rel="stylesheet" href="style.css">
    <!-- Tailwind for quick layout -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <div class="w-16 sidebar flex flex-col items-center py-6">
            <div class="text-blue-500 font-bold text-2xl mb-10">M</div>
            <div class="space-y-8 text-xl cursor-pointer">
                <div>📊</div>
                <div>🤖</div>
                <div>⚙️</div>
            </div>
        </div>

        <!-- MAIN TERMINAL -->
        <div class="flex-1 flex flex-col">
            
            <!-- HEADER -->
            <header class="h-14 bg-[#161a1e] border-b border-gray-800 flex items-center justify-between px-6">
                <div class="flex items-center space-x-4">
                    <span class="text-xs text-gray-400">BYBIT SPOT</span>
                    <span class="font-bold">BTC / USDT</span>
                    <span id="btc-price" class="font-mono text-xl">$--,---.--</span>
                </div>
                <button onclick="toggleApiModal()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-xs font-bold transition">
    Connect API
</button>
</header>

            <!-- CONTENT AREA -->
            <div class="flex-1 flex overflow-hidden">
                <!-- CHART HOUSING -->
<div class="flex-1 bg-black border-r border-gray-800 relative">
    <!-- TradingView Widget BEGIN -->
    <div class="tradingview-widget-container" style="height:100%;width:100%">
        <div id="tradingview_chart" style="height:calc(100% - 32px);width:100%"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget(
        {
            "autosize": true,
            "symbol": "BYBIT:BTCUSDT",
            "interval": "60",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#161a1e",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_chart"
        }
        );
        </script>
    </div>
    <!-- TradingView Widget END -->
</div>

                <!-- RIGHT PANEL (Execution & AI) -->
                <div class="w-80 p-4 space-y-4">
                    <div class="flex space-x-2">
                        <button class="flex-1 btn-buy py-3">BUY</button>
                        <button class="flex-1 btn-sell py-3">SELL</button>
                    </div>

                    <!-- AI ANALYTICS (Future AltFINS Integration) -->
                    <script>
    console.log("Internal Brain is now active!");

    // 1. Toggle the Modal Window
    function toggleApiModal() {
        console.log("Button Clicked!");
        const modal = document.getElementById('api-modal');
        if (modal) {
            modal.classList.toggle('hidden');
        } else {
            alert("Error: Modal box not found in the code.");
        }
    }

    // 2. Save Keys to Browser Storage
    function saveApiKeys() {
        const key = document.getElementById('ex-key').value;
        const secret = document.getElementById('ex-secret').value;

        if (!key || !secret) {
            alert("Please enter your API details.");
            return;
        }

        localStorage.setItem('user_api_keys', JSON.stringify({ key, secret }));
        alert("Keys Saved Successfully!");
        toggleApiModal();
        window.location.reload();
    }

    // 3. Fetch Bybit Price
    async function updatePrice() {
        try {
            const res = await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=BTCUSDT');
            const data = await res.json();
            const lastPrice = data.result.list[0].lastPrice;
            const btcElement = document.getElementById('btc-price');
            if (btcElement) {
                btcElement.innerText = '$' + parseFloat(lastPrice).toLocaleString();
            }
        } catch (e) {
            console.error("Price update failed");
        }
    }

    // Run price update every 2 seconds
    setInterval(updatePrice, 2000);
    updatePrice();

    // 4. Check status on load
    window.onload = function() {
        if (localStorage.getItem('user_api_keys')) {
            const btn = document.querySelector('header button');
            if (btn) {
                btn.innerText = "Bybit Connected ✅";
                btn.style.backgroundColor = "#059669"; // Green color
            }
        }
    }
</script>
                </div>
            </div>
        </div>
    </div>
<!-- API MODAL (Hidden by default) -->
<div id="api-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-[#161a1e] border border-gray-800 w-96 p-6 rounded-xl shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold text-white">Connect Exchange</h2>
            <button onclick="toggleApiModal()" class="text-gray-500 hover:text-white">✕</button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] text-gray-500 uppercase font-bold">Exchange</label>
                <select id="ex-name" class="w-full bg-black border border-gray-700 p-2 rounded mt-1 text-sm text-white">
                    <option value="bybit">Bybit</option>
                    <option value="binance">Binance (Coming Soon)</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] text-gray-500 uppercase font-bold">API Key</label>
                <input id="ex-key" type="text" placeholder="Enter API Key" class="w-full bg-black border border-gray-700 p-2 rounded mt-1 text-sm text-white focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="text-[10px] text-gray-500 uppercase font-bold">API Secret</label>
                <input id="ex-secret" type="password" placeholder="Enter API Secret" class="w-full bg-black border border-gray-700 p-2 rounded mt-1 text-sm text-white focus:border-blue-500 outline-none">
            </div>
            
            <button onclick="saveApiKeys()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-4 transition text-sm">
                Securely Save Keys
            </button>
            <p class="text-[9px] text-gray-500 text-center italic">
                Keys are stored locally in your browser.
            </p>
        </div>
    </div>
</div>
    <!-- Link to our BRAIN file -->
   <script>
    console.log("AI Co-Pilot is now thinking...");

    // 1. Toggle the Modal Window
    function toggleApiModal() {
        const modal = document.getElementById('api-modal');
        if (modal) { modal.classList.toggle('hidden'); }
    }

    // 2. Save Keys to Browser Storage
    function saveApiKeys() {
        const key = document.getElementById('ex-key').value;
        const secret = document.getElementById('ex-secret').value;
        if (!key || !secret) { alert("Please enter API details."); return; }
        localStorage.setItem('user_api_keys', JSON.stringify({ key, secret }));
        alert("Keys Saved Successfully!");
        toggleApiModal();
        window.location.reload();
    }

    // 3. Fetch Bybit Price
    async function updatePrice() {
        try {
            const res = await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=BTCUSDT');
            const data = await res.json();
            const lastPrice = data.result.list[0].lastPrice;
            document.getElementById('btc-price').innerText = '$' + parseFloat(lastPrice).toLocaleString();
        } catch (e) { console.error("Price update failed"); }
    }

    // 4. THE AI INTELLIGENCE ENGINE (Simulating AltFINS + AI)
    function runAIAnalyst() {
        const aiContent = document.getElementById('ai-content');
        
        // These are simulated "High Probability" signals based on AltFINS patterns
        const signals = [
            { pair: "BTC/USDT", pattern: "Falling Wedge Breakout", prob: "84%", note: "Strong support at $62k. Target: $66,500." },
            { pair: "SOL/USDT", pattern: "RSI Divergence", prob: "78%", note: "Whale accumulation detected on Bybit. Buy the dip." },
            { pair: "ETH/USDT", pattern: "Bull Flag", prob: "81%", note: "Consolidation complete. High volume expected." }
        ];

        // Randomly pick a signal to show the "Thinking" process
        const s = signals[Math.floor(Math.random() * signals.length)];

        aiContent.innerHTML = `
            <div class="space-y-2 border-l-2 border-purple-500 pl-3">
                <div class="flex justify-between items-center">
                    <span class="text-white font-bold text-sm">${s.pair}</span>
                    <span class="text-green-400 text-[10px] font-bold">${s.prob} Confidence</span>
                </div>
                <div class="text-purple-300 text-[10px] uppercase font-bold tracking-tighter">${s.pattern}</div>
                <p class="text-gray-400 text-[11px] leading-tight italic">"AI Analysis: ${s.note}"</p>
                <button class="w-full mt-2 bg-purple-600/30 hover:bg-purple-600 text-purple-200 text-[10px] py-1 rounded border border-purple-500/50 transition">
                    Apply Strategy to Bot
                </button>
            </div>
        `;
    }

    // Initialize the App
    setInterval(updatePrice, 2000);
    setInterval(runAIAnalyst, 10000); // AI scans every 10 seconds
    updatePrice();
    runAIAnalyst();

    window.onload = function() {
        if (localStorage.getItem('user_api_keys')) {
            const btn = document.querySelector('header button');
            if (btn) {
                btn.innerText = "Bybit Connected ✅";
                btn.style.backgroundColor = "#059669";
            }
        }
    }
</script>
</body>
</html>
