<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Gemini Institutional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #050709; color: #e2e8f0; overflow: hidden; }
        .neon-green { color: #39FF14; text-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
        .bg-neon { background-color: #39FF14; }
        .border-neon { border-color: #39FF14; }
        .glass-panel { background: rgba(13, 16, 21, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Floating Gemini Icon */
        #gemini-ai {
            position: fixed; bottom: 25px; left: 25px; width: 50px; height: 50px;
            background: linear-gradient(135deg, #4285f4, #9b72cb);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            cursor: pointer; z-index: 1000; box-shadow: 0 0 20px rgba(66, 133, 244, 0.4);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #gemini-ai:hover { transform: scale(1.1); box-shadow: 0 0 30px rgba(155, 114, 203, 0.6); }
        
        /* Compact Bybit-style Inputs */
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        .compact-input { background: #1a1e23; border: 1px solid #2d343c; border-radius: 4px; padding: 8px 12px; font-family: 'JetBrains Mono', monospace; font-size: 12px; }
        .compact-input:focus { border-color: #39FF14; outline: none; }
    </style>
</head>
<body>

    <div id="gemini-ai" onclick="toggleAI()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="white">
            <path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" />
        </svg>
    </div>

    <div id="ai-chat" class="hidden fixed bottom-[90px] left-[25px] w-80 h-96 glass-panel rounded-2xl z-[1001] flex flex-col p-4 shadow-2xl">
        <div class="flex items-center justify-between mb-4 border-b border-gray-800 pb-2">
            <span class="text-xs font-black tracking-widest text-blue-400">GEMINI NAVIGATOR</span>
            <button onclick="toggleAI()" class="text-gray-500 hover:text-white">✕</button>
        </div>
        <div class="flex-1 overflow-y-auto text-[11px] space-y-3 text-gray-400">
            <p class="bg-blue-500/10 p-2 rounded border border-blue-500/20 text-blue-200">System Ready. Analyzing Bybit BTCUSDT liquidity session...</p>
        </div>
        <input type="text" placeholder="Ask Gemini..." class="mt-2 w-full compact-input text-white">
    </div>

    <div class="flex h-screen w-full">
        <div class="absolute top-0 left-0 right-0 h-12 bg-[#0d1015] border-b border-gray-800 flex items-center justify-between px-6 z-10">
            <div class="flex items-center space-x-6">
                <span class="text-[11px] font-black neon-green tracking-tighter uppercase">ExNexus</span>
                <div class="flex items-center space-x-4 text-[10px] font-bold text-gray-500">
                    <span class="text-blue-400">NANSEN: LIVE</span>
                    <span class="text-orange-500">COINGLASS: SYNCED</span>
                </div>
            </div>
            <div class="flex items-center space-x-6 font-mono text-xs">
                <span id="price-ticker" class="neon-green font-black tracking-tighter">$00,000.00</span>
                <span class="text-gray-600">|</span>
                <span class="text-gray-400">NODE: BYBIT</span>
            </div>
        </div>

        <div class="flex-1 mt-12 p-2 grid grid-cols-12 gap-2 h-[calc(100vh-48px)]">
            
            <div class="col-span-9 glass-panel rounded-lg overflow-hidden relative">
                <div id="tradingview_widget" class="w-full h-full"></div>
            </div>

            <div class="col-span-3 flex flex-col space-y-2">
                <div class="glass-panel p-4 rounded-lg">
                    <span class="text-[9px] font-bold text-gray-500 uppercase">Available Balance</span>
                    <div class="text-xl font-black text-white mt-1">$24,190.55 <span class="text-[10px] text-gray-500">USDT</span></div>
                </div>

                <div class="glass-panel p-4 rounded-lg flex-1 flex flex-col">
                    <div class="flex space-x-1 p-1 bg-black rounded mb-4">
                        <button onclick="setMode('BUY')" id="buy-tab" class="flex-1 py-1.5 rounded text-[10px] font-black bg-neon text-black uppercase">Buy</button>
                        <button onclick="setMode('SELL')" id="sell-tab" class="flex-1 py-1.5 rounded text-[10px] font-black text-gray-500 uppercase hover:text-white">Sell</button>
                    </div>

                    <div class="space-y-4">
                        <div>
                            <div class="flex justify-between mb-1"><label class="text-[9px] font-bold text-gray-500 uppercase">Order Price</label><span class="text-[9px] text-[#39FF14]">Market</span></div>
                            <div class="compact-input w-full text-gray-500">Market Price</div>
                        </div>
                        <div>
                            <label class="text-[9px] font-bold text-gray-500 uppercase">Quantity</label>
                            <div class="relative">
                                <input id="qty" type="number" class="compact-input w-full text-white pr-10" placeholder="0.00">
                                <span class="absolute right-3 top-2 text-[10px] text-gray-500 font-bold">USDT</span>
                            </div>
                        </div>
                        <div class="grid grid-cols-4 gap-1">
                            <button onclick="setQty(25)" class="bg-gray-800/50 hover:bg-gray-700 py-1 rounded text-[9px] font-bold">25%</button>
                            <button onclick="setQty(50)" class="bg-gray-800/50 hover:bg-gray-700 py-1 rounded text-[9px] font-bold">50%</button>
                            <button onclick="setQty(75)" class="bg-gray-800/50 hover:bg-gray-700 py-1 rounded text-[9px] font-bold">75%</button>
                            <button onclick="setQty(100)" class="bg-gray-800/50 hover:bg-gray-700 py-1 rounded text-[9px] font-bold border border-gray-600">100%</button>
                        </div>
                    </div>

                    <button id="exec-btn" class="mt-auto w-full py-4 rounded bg-neon text-black font-black uppercase text-xs tracking-widest shadow-[0_0_15px_rgba(57,255,20,0.2)]">Open Long</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const balance = 24190.55;
        
        window.onload = function() {
            new TradingView.widget({
                "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15",
                "theme": "dark", "style": "1", "container_id": "tradingview_widget",
                "hide_side_toolbar": false, "allow_symbol_change": true, "details": false
            });
            updateTickers();
            setInterval(updateTickers, 3000);
        };

        function toggleAI() { document.getElementById('ai-chat').classList.toggle('hidden'); }

        function setMode(mode) {
            const b = document.getElementById('buy-tab'); const s = document.getElementById('sell-tab');
            const btn = document.getElementById('exec-btn');
            if(mode === 'BUY') {
                b.className = 'flex-1 py-1.5 rounded text-[10px] font-black bg-neon text-black uppercase';
                s.className = 'flex-1 py-1.5 rounded text-[10px] font-black text-gray-500 uppercase';
                btn.className = 'mt-auto w-full py-4 rounded bg-neon text-black font-black uppercase text-xs tracking-widest';
                btn.innerText = 'Open Long';
            } else {
                s.className = 'flex-1 py-1.5 rounded text-[10px] font-black bg-red-600 text-white uppercase';
                b.className = 'flex-1 py-1.5 rounded text-[10px] font-black text-gray-500 uppercase';
                btn.className = 'mt-auto w-full py-4 rounded bg-red-600 text-white font-black uppercase text-xs tracking-widest';
                btn.innerText = 'Open Short';
            }
        }

        function setQty(p) { document.getElementById('qty').value = Math.floor(balance * (p/100)); }

        async function updateTickers() {
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('price-ticker').innerText = '$' + parseFloat(d.result.list[0].lastPrice).toLocaleString();
            } catch (e) {}
        }
    </script>
</body>
</html>
