<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Institutional Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-[#07090b] text-white font-sans overflow-hidden">

    <div id="gatekeeper" class="fixed inset-0 z-[9999] bg-[#07090b] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm space-y-8 text-center bg-[#111418] p-10 rounded-3xl border border-gray-800 shadow-2xl">
            <img src="Logo.png" alt="ExNexus" class="w-48 mx-auto mb-6">
            
            <h2 id="auth-title" class="text-[10px] font-black uppercase tracking-[0.3em] text-[#A4CD39] mb-4">Secure Terminal Access</h2>
            
            <div class="space-y-4">
                <input type="text" id="user-id" placeholder="USERNAME" class="w-full bg-black border border-gray-800 p-4 rounded-xl text-xs text-white focus:border-[#A4CD39] outline-none transition">
                <input type="password" id="user-pass" placeholder="ACCESS KEY" class="w-full bg-black border border-gray-800 p-4 rounded-xl text-xs text-white focus:border-[#A4CD39] outline-none transition">
                
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-[#A4CD39] text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest hover:brightness-110 transition">
                    Unlock Terminal
                </button>
            </div>

            <div class="pt-6 border-t border-gray-800 mt-6">
                <button onclick="toggleAuthMode()" id="auth-toggle" class="text-[9px] text-gray-500 font-bold hover:text-white uppercase transition">
                    Need an account? Sign Up
                </button>
            </div>
        </div>
    </div>

    <div id="terminal-wrapper" class="flex h-screen w-full opacity-0 transition-opacity duration-1000">
        
        <aside class="w-16 hover:w-48 group bg-[#111418] border-r border-gray-800 flex flex-col items-center py-4 transition-all duration-300 z-50">
            <div class="mb-8 px-2">
                <img src="Logo_Icon.png" alt="X" class="w-8 h-8 object-contain">
            </div>
            <nav class="flex-1 space-y-8 w-full">
                <div class="flex items-center px-4 cursor-pointer hover:text-[#A4CD39]">
                    <span class="text-xl">📊</span>
                    <span class="ml-4 opacity-0 group-hover:opacity-100 text-[10px] font-black uppercase transition-opacity">Terminal</span>
                </div>
                <div class="flex items-center px-4 cursor-pointer hover:text-[#00ADEF]">
                    <span class="text-xl">🤖</span>
                    <span class="ml-4 opacity-0 group-hover:opacity-100 text-[10px] font-black uppercase transition-opacity">AI Bots</span>
                </div>
            </nav>
        </aside>

        <main class="flex-1 flex flex-col overflow-hidden">
            <header class="h-14 bg-[#111418]/80 backdrop-blur-md border-b border-gray-800 flex items-center justify-between px-6">
                <div class="flex items-center space-x-6">
                    <div class="flex flex-col">
                        <span class="text-[8px] text-gray-500 uppercase font-bold">BTC/USDT</span>
                        <span id="btc-price" class="text-lg font-mono font-black text-[#A4CD39]">$00,000.00</span>
                    </div>
                </div>
                <button id="api-status-btn" onclick="toggleApiModal()" class="panel-glass px-4 py-2 rounded-lg text-[9px] font-black uppercase border border-gray-700 hover:border-[#A4CD39] transition">
                    Link Account
                </button>
            </header>

            <div class="flex-1 flex overflow-hidden">
                <div class="flex-1 bg-black">
                    <div id="tradingview_chart" class="h-full w-full"></div>
                </div>
                <aside class="w-80 bg-[#0b0e11] border-l border-gray-800 p-4 space-y-4 overflow-y-auto">
                    <div class="p-4 rounded-2xl bg-gradient-to-br from-[#1c1329] to-[#0b0e11] border border-purple-500/30">
                        <div class="flex justify-between items-center mb-3">
                            <h4 class="text-[9px] font-black text-purple-400 uppercase">AI Win Probability</h4>
                            <span id="prob-pct" class="text-xs font-mono font-black">--%</span>
                        </div>
                        <div class="prob-bar"><div id="prob-fill" class="prob-fill" style="width: 0%;"></div></div>
                        <p id="ai-status-text" class="text-[9px] text-gray-500 mt-2 italic">Awaiting altFINS signals...</p>
                    </div>
                    <div class="panel-glass p-4 rounded-2xl">
                        <span class="text-[9px] font-black text-gray-500 uppercase">My Wallet</span>
                        <div id="asset-list" class="space-y-3 mt-4"></div>
                    </div>
                </aside>
            </div>
        </main>
    </div>

    <div id="api-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[100]">
        <div class="bg-[#161a1e] border border-gray-800 w-96 p-8 rounded-3xl">
            <h2 class="text-white font-black mb-6 text-center uppercase text-xs">Link Exchange API</h2>
            <div class="space-y-4">
                <input id="ex-key" type="text" placeholder="API KEY" class="w-full bg-black border border-gray-700 p-4 rounded-xl text-xs text-white outline-none">
                <input id="ex-secret" type="password" placeholder="API SECRET" class="w-full bg-black border border-gray-700 p-4 rounded-xl text-xs text-white outline-none">
                <button onclick="saveApiKeys()" class="w-full bg-[#00ADEF] text-white font-black py-4 rounded-xl uppercase text-xs">Save Credentials</button>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
