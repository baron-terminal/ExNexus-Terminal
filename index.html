<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Institutional Bot Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap');
        :root { --neon: #39FF14; --hot-red: #FF003F; --bg: #050505; --panel: #0f0f0f; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
        .glass { background: var(--panel); border: 1px solid rgba(255, 255, 255, 0.05); }
        .bot-card { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.05); transition: 0.2s; }
        .bot-card:hover { border-color: var(--neon); background: rgba(57, 255, 20, 0.02); }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-10 border-b border-gray-900 flex items-center justify-between px-4 bg-black">
        <div class="flex items-center space-x-3">
            <img src="https://api.dicebear.com/7.x/shapes/svg?seed=ExNexus&backgroundColor=39FF14" class="w-5 h-5 rounded-sm" alt="ExNexus PNG">
            <span class="text-sm font-black tracking-tighter neon-text">EXNEXUS</span>
        </div>
        <div class="flex items-center space-x-6 text-[10px] font-mono">
            <div id="ticker" class="neon-text font-black tracking-widest">$00,000.00</div>
            <div class="flex space-x-2 text-gray-500 font-bold uppercase">
                <span class="text-green-500">Bybit Connected</span>
                <span class="border-l border-gray-800 pl-2">API: Stable</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <nav class="w-10 border-r border-gray-900 flex flex-col items-center py-4 space-y-6 bg-black">
            <div class="text-neon"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
            <div class="text-gray-700 hover:text-white cursor-pointer"><svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg></div>
        </nav>

        <main class="flex-1 p-1 grid grid-cols-12 gap-1 h-full overflow-hidden">
            
            <section id="chart-section" class="col-span-7 glass rounded-lg overflow-hidden relative h-[98%]">
                <div class="absolute top-2 right-2 z-10">
                    <button onclick="toggleChart()" class="bg-black/80 border border-gray-700 text-[8px] font-black px-2 py-1 rounded hover:text-neon uppercase">Enlarge Chart</button>
                </div>
                <div id="tradingview_widget" class="w-full h-full"></div>
            </section>

            <aside class="col-span-3 flex flex-col space-y-1 h-[98%]">
                <div class="glass p-2 rounded-lg flex-1 overflow-y-auto">
                    <div class="flex justify-between items-center mb-3">
                        <span class="text-[9px] text-gray-500 uppercase font-black tracking-widest">Active Bot Engines</span>
                        <span class="text-[8px] text-neon font-bold">● 2 ACTIVE</span>
                    </div>
                    
                    <div class="space-y-2">
                        <div class="bot-card p-3 rounded-md relative overflow-hidden">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-black">Smart Trades</span>
                                <span class="text-[9px] text-neon">+$2,025.18</span>
                            </div>
                            <div class="w-full bg-gray-900 h-1 rounded-full overflow-hidden"><div class="bg-neon h-full w-[65%] shadow-[0_0_8px_#39FF14]"></div></div>
                        </div>

                        <div class="bot-card p-3 rounded-md">
                            <div class="flex justify-between items-start mb-2">
                                <span class="text-[10px] font-black">DCA Bots</span>
                                <span class="text-[9px] text-red-500">-$1,091.70</span>
                            </div>
                            <div class="flex justify-between text-[8px] text-gray-500"><span>1 Active Trade</span> <span>Safety: 0/3</span></div>
                        </div>

                        <div class="bot-card p-3 rounded-md border-dashed border-gray-800">
                            <div class="flex justify-between items-center h-8 text-gray-600 text-[9px] font-bold">
                                <span>+ GRID Bot Instance</span>
                                <button class="bg-gray-800 px-2 py-1 rounded text-white hover:bg-gray-700">CREATE</button>
                            </div>
                        </div>
                    </div>
                </div>
            </aside>

            <aside class="col-span-2 flex flex-col space-y-1 h-[98%]">
                <div class="glass p-3 rounded-lg flex-1 flex flex-col overflow-hidden">
                    <span class="text-[8px] text-gray-500 uppercase font-black mb-4">Manual Override</span>
                    
                    <button onclick="setDir('LONG')" id="l-btn" class="w-full py-3 rounded bg-[#39FF14] text-black text-[10px] font-black uppercase mb-1 shadow-[0_0_15px_rgba(57,255,20,0.2)]">Open Long</button>
                    <button onclick="setDir('SHORT')" id="s-btn" class="w-full py-3 rounded bg-gray-900 text-gray-500 text-[10px] font-black uppercase mb-4">Open Short</button>
                    
                    <div class="space-y-1">
                        <input type="number" placeholder="Order Qty" class="w-full bg-black border border-gray-800 p-2 rounded text-[10px] outline-none focus:border-neon font-mono">
                        <div class="grid grid-cols-2 gap-1">
                            <button class="bg-gray-900 text-[8px] py-1 rounded">50%</button>
                            <button class="bg-gray-900 text-[8px] py-1 rounded">MAX</button>
                        </div>
                    </div>

                    <button id="exec-btn" class="mt-auto w-full py-4 rounded bg-[#39FF14] text-black font-black uppercase text-[10px]">Execute Long</button>
                </div>
            </aside>
        </main>
    </div>

    <div class="fixed bottom-4 right-4 w-10 h-10 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-lg flex items-center justify-center cursor-pointer shadow-lg z-[9999]" onclick="alert('Gemini AI: Analyzing Order Flow...')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let isLarge = false;
        const tv = { "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15", "theme": "dark", "container_id": "tradingview_widget", "hide_top_toolbar": false, "allow_symbol_change": true };
        
        window.onload = () => { new TradingView.widget(tv); sync(); setInterval(sync, 3000); };

        function toggleChart() {
            const chart = document.getElementById('chart-section');
            isLarge = !isLarge;
            if(isLarge) { chart.style.position = 'fixed'; chart.style.top = '40px'; chart.style.left = '0'; chart.style.width = '100%'; chart.style.height = 'calc(100vh - 40px)'; chart.style.zIndex = '50'; }
            else { chart.style.position = 'relative'; chart.style.top = '0'; chart.style.width = '100%'; chart.style.height = '98%'; chart.style.zIndex = '1'; }
            new TradingView.widget(tv);
        }

        function setDir(d) {
            const l = document.getElementById('l-btn'); const s = document.getElementById('s-btn'); const ex = document.getElementById('exec-btn');
            if(d === 'LONG') {
                l.className = "w-full py-3 rounded bg-[#39FF14] text-black text-[10px] font-black uppercase mb-1 shadow-[0_0_15px_rgba(57,255,20,0.2)]";
                s.className = "w-full py-3 rounded bg-gray-900 text-gray-500 text-[10px] font-black uppercase mb-4";
                ex.style.backgroundColor = '#39FF14'; ex.style.color = 'black'; ex.innerText = "Execute Long";
            } else {
                s.className = "w-full py-3 rounded bg-[#FF003F] text-white text-[10px] font-black uppercase mb-1 shadow-[0_0_15px_rgba(255,0,63,0.3)]";
                l.className = "w-full py-3 rounded bg-gray-900 text-gray-500 text-[10px] font-black uppercase mb-4";
                ex.style.backgroundColor = '#FF003F'; ex.style.color = 'white'; ex.innerText = "Execute Short";
            }
        }

        async function sync() {
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('ticker').innerText = '$' + parseFloat(d.result.list[0].lastPrice).toLocaleString();
            } catch(e){}
        }
    </script>
</body>
</html>
