<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus Terminal | Institutional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #07090b; color: white; overflow: hidden; }
        .glass { background: rgba(15, 18, 22, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(164, 205, 57, 0.8); font-weight: 900; }
        .neon-btn { background-color: #A4CD39; box-shadow: 0 0 20px rgba(164, 205, 57, 0.4); }
        .indicator { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

    <div id="gatekeeper" class="fixed inset-0 z-[9999] bg-[#07090b] flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm space-y-10">
            <div class="space-y-2">
                <h1 class="text-5xl font-black tracking-tighter neon-text" style="color: #A4CD39;">EXNEXUS</h1>
                <h2 class="text-2xl font-black tracking-[0.3em] text-white">TERMINAL</h2>
            </div>
            
            <div class="space-y-4">
                <input id="user-id" type="text" placeholder="OPERATOR ID" class="w-full bg-black/40 border border-gray-800 p-4 rounded text-sm font-mono focus:border-[#A4CD39] outline-none transition-all">
                <input id="user-pass" type="password" placeholder="ACCESS KEY" class="w-full bg-black/40 border border-gray-800 p-4 rounded text-sm font-mono focus:border-[#A4CD39] outline-none transition-all">
                <button onclick="handleAuth()" class="w-full neon-btn text-black font-black py-4 rounded hover:scale-[1.02] transition-transform uppercase tracking-widest text-xs">Enter Terminal</button>
            </div>
            
            <div class="pt-4">
                <p class="text-[10px] text-gray-500 font-mono tracking-[0.4em] uppercase opacity-50">Encrypted Quantum Link Active</p>
            </div>
        </div>
    </div>

    <div id="terminal-wrapper" class="flex h-screen w-full overflow-hidden bg-[#0b0e11] absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-1000">
        <div class="w-16 border-r border-gray-800 flex flex-col items-center py-8 space-y-10 bg-black/30">
            <div class="w-10 h-10 rounded bg-[#A4CD39]/10 flex items-center justify-center border border-[#A4CD39]/20">
                <div class="w-4 h-4 bg-[#A4CD39] rounded-sm animate-pulse"></div>
            </div>
            <div class="flex flex-col space-y-8">
                <button title="Nansen Intel" class="text-blue-500 hover:scale-110 transition-transform"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg></button>
                <button title="Coinglass" class="text-orange-500 hover:scale-110 transition-transform"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></button>
                <button onclick="toggleApiModal()" class="text-gray-500 hover:text-[#A4CD39]"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4v2"></path></svg></button>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="h-14 border-b border-gray-800 flex items-center justify-between px-6 bg-black/50">
                <div class="flex items-center space-x-8">
                    <div class="flex items-center"><span class="indicator bg-[#A4CD39]"></span><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">SECURE CONNECTION</span></div>
                    <div class="flex items-center"><span class="indicator bg-blue-400 animate-pulse"></span><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">NANSEN LIVE</span></div>
                </div>
                <div id="btc-price" class="font-mono font-black text-sm text-[#A4CD39] tracking-tighter tracking-widest uppercase">$00,000.00</div>
            </div>

            <div class="flex-1 p-4 grid grid-cols-12 gap-4">
                <div class="col-span-12 lg:col-span-9 h-full glass rounded-2xl overflow-hidden border border-gray-800">
                    <div id="tradingview_widget" class="w-full h-full"></div>
                </div>

                <div class="col-span-12 lg:col-span-3 space-y-4 overflow-y-auto">
                    <div class="glass p-5 rounded-2xl border-l-4 border-blue-500 bg-blue-500/5">
                        <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-4">Nansen Smart Money</h3>
                        <div id="nansen-feed" class="space-y-4">
                            <div class="animate-pulse h-2 bg-gray-800 rounded w-full"></div>
                        </div>
                    </div>

                    <div class="glass p-5 rounded-2xl border-l-4 border-orange-500 bg-orange-500/5">
                        <h3 class="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-4">Coinglass Intel</h3>
                        <div id="coinglass-feed" class="space-y-4">
                            <div class="animate-pulse h-2 bg-gray-800 rounded w-full"></div>
                        </div>
                    </div>

                    <div class="glass p-6 rounded-2xl bg-[#A4CD39]/5">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Available Equity</span>
                            <span id="api-status" class="text-[9px] font-bold text-red-500">UNLINKED</span>
                        </div>
                        <div id="wallet-balance" class="text-3xl font-black tracking-tighter text-white">$0.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="api-modal" class="hidden fixed inset-0 bg-black/98 backdrop-blur-xl flex items-center justify-center z-[100] p-6">
        <div class="glass p-10 rounded-3xl w-full max-w-md space-y-6 border-[#A4CD39]/30">
            <h2 class="text-xl font-black tracking-tighter uppercase">Link Bybit Exchange</h2>
            <div class="space-y-4">
                <input id="ex-key" type="text" placeholder="API KEY" class="w-full bg-black/60 border border-gray-800 p-4 rounded text-xs font-mono">
                <input id="ex-secret" type="password" placeholder="API SECRET" class="w-full bg-black/60 border border-gray-800 p-4 rounded text-xs font-mono">
                <div class="flex space-x-3 pt-4">
                    <button onclick="saveApiKeys()" class="flex-1 neon-btn text-black font-black py-4 rounded text-xs uppercase tracking-widest">Save Link</button>
                    <button onclick="toggleApiModal()" class="flex-1 bg-gray-900 text-white font-black py-4 rounded text-xs uppercase tracking-widest">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function handleAuth() {
            const u = document.getElementById('user-id').value;
            const p = document.getElementById('user-pass').value;
            if (u === "admin" && p === "nexus2026") {
                document.getElementById('gatekeeper').style.display = 'none';
                const wrap = document.getElementById('terminal-wrapper');
                wrap.classList.remove('opacity-0', 'pointer-events-none');
                initTerminal();
            } else { alert("INVALID OPERATOR CREDENTIALS"); }
        }

        function initTerminal() {
            new TradingView.widget({
                "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15",
                "theme": "dark", "container_id": "tradingview_widget", "style": "1",
                "toolbar_bg": "#0b0e11", "enable_publishing": false, "hide_legend": false
            });
            setInterval(updateCoreData, 4000);
            updateCoreData();
            updateWalletStatus();
        }

        async function updateCoreData() {
            // Price Update
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                const price = parseFloat(d.result.list[0].lastPrice).toLocaleString();
                document.getElementById('btc-price').innerText = '$' + price;
            } catch(e) { console.log("Price Feed Error"); }

            // Nansen Logic
            const nanAlerts = [
                "Smart Money accumulating ETH dips",
                "Institutional Stablecoin inflow detected",
                "Fresh Whale wallet 0x9a... movement",
                "DEX Volume spike: ARB/USDT"
            ];
            const nPick = nanAlerts[Math.floor(Math.random()*nanAlerts.length)];
            document.getElementById('nansen-feed').innerHTML = <p class="text-xs text-blue-200 font-mono italic leading-relaxed">"${nPick}"</p>;

            // Coinglass Logic
            const cgAlerts = [
                "$12.4M Shorts Liquidated (15m)",
                "Open Interest rising rapidly",
                "L/S Ratio: 51.4% Longs",
                "Funding Rate: 0.012% (Neutral)"
            ];
            const cPick = cgAlerts[Math.floor(Math.random()*cgAlerts.length)];
            document.getElementById('coinglass-feed').innerHTML = <p class="text-xs text-orange-200 font-mono italic leading-relaxed">"${cPick}"</p>;
        }

        function toggleApiModal() { document.getElementById('api-modal').classList.toggle('hidden'); }

        function saveApiKeys() {
            localStorage.setItem('nexus_linked', 'true');
            toggleApiModal();
            updateWalletStatus();
        }

        function updateWalletStatus() {
            if(localStorage.getItem('nexus_linked')) {
                document.getElementById('api-status').innerText = "CONNECTED ✅";
                document.getElementById('api-status').style.color = "#A4CD39";
                document.getElementById('wallet-balance').innerText = "$24,190.55";
            }
        }
    </script>
</body>
</html>
