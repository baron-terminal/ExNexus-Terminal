<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | AI Intelligence Build</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://code.jquery.com/ui/1.13.2/jquery-ui.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap');
        :root { --neon: #39FF14; --hot-red: #FF003F; --bg: #050505; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; overflow: hidden; height: 100vh; margin: 0; }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
        .glass { background: #0f0f0f; border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Draggable AI Hub with Expansion */
        #draggable-ai {
            min-width: 44px; height: 44px;
            background: linear-gradient(135deg, #4285f4, #9b72cb);
            border-radius: 12px; z-index: 9999; position: absolute; bottom: 80px; right: 20px;
            box-shadow: 0 0 20px rgba(66, 133, 244, 0.4); cursor: move;
            transition: width 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        #ai-briefing { display: none; padding: 12px; width: 220px; font-size: 10px; }
        
        .app-container { display: grid; grid-template-columns: 48px 1fr 280px 220px; grid-template-rows: 40px 1fr 180px; height: 100vh; gap: 4px; padding: 4px; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="col-span-4 glass flex items-center justify-between px-4">
            <div class="flex items-center space-x-2">
                <img src="logo.png" alt="ExNexus" class="h-6 w-auto"> 
            </div>
            <div id="ticker" class="neon-text font-black tracking-widest text-[11px]">$00,000.00</div>
        </header>

        <nav class="row-span-2 glass flex flex-col items-center py-6 space-y-8">
            <div class="text-neon"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
            
            <div onclick="expandAI('Analistic: Potential Bullish Breakout on 4H SOL/USDT')" class="group relative cursor-pointer text-gray-700 hover:text-blue-400">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                <span class="absolute left-12 hidden group-hover:block bg-blue-600 text-[8px] font-black px-2 py-1 rounded">ANALISTIC</span>
            </div>

            <div onclick="expandAI('Smart Money: Whale Wallet 0x4f... moving $10M USDC to Bybit')" class="group relative cursor-pointer text-gray-700 hover:text-yellow-500">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"></path></svg>
                <span class="absolute left-12 hidden group-hover:block bg-yellow-600 text-[8px] font-black px-2 py-1 rounded whitespace-nowrap">SMART MONEY</span>
            </div>
        </nav>

        <main class="glass overflow-hidden relative">
            <div id="tradingview_widget" class="w-full h-full"></div>
        </main>

        <aside class="glass p-3 overflow-y-auto">
            <h4 class="text-[9px] text-gray-500 font-black uppercase mb-4 tracking-widest">Active Bot Engines</h4>
            <div class="space-y-3">
                <div class="p-3 bg-white/5 border border-white/10 rounded-lg">
                    <div class="flex justify-between text-[10px] font-bold"><span>Smart Trades</span> <span class="neon-text">+$2,025</span></div>
                </div>
            </div>
        </aside>

        <aside class="glass p-4 flex flex-col">
            <h4 class="text-[9px] text-gray-500 font-black uppercase mb-4 tracking-widest">Manual Override</h4>
            <button onclick="setDir('LONG')" id="l-btn" class="w-full py-3 rounded bg-[#39FF14] text-black text-[10px] font-black uppercase mb-1 shadow-[0_0_15px_#39FF1444]">Open Long</button>
            <button onclick="setDir('SHORT')" id="s-btn" class="w-full py-3 rounded bg-gray-900 text-gray-400 text-[10px] font-black uppercase mb-4">Open Short</button>
            <button id="ex-btn" class="mt-auto w-full py-4 rounded bg-[#39FF14] text-black font-black uppercase text-[10px]">Execute Long</button>
        </aside>

        <section class="col-span-3 glass p-4">
            <div class="flex space-x-6 text-[9px] font-black text-gray-500 uppercase border-b border-gray-900 pb-2 mb-4">
                <span class="text-white border-b-2 border-neon pb-2">Active Positions</span>
                <span>Order History</span>
            </div>
            <div class="text-[10px] font-mono text-gray-700 italic text-center pt-8">Monitoring all exchange nodes...</div>
        </section>
    </div>

    <div id="draggable-ai">
        <div id="ai-icon" class="flex-shrink-0 w-[44px] h-[44px] flex items-center justify-center">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
        </div>
        <div id="ai-briefing">
            <div class="flex justify-between items-center mb-2 border-b border-white/20 pb-1">
                <span class="font-black uppercase text-[8px]">Intelligence Brief</span>
                <span onclick="closeAI()" class="cursor-pointer font-bold hover:text-red-500">×</span>
            </div>
            <p id="ai-text" class="leading-tight text-white/90"></p>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        $(function() { $("#draggable-ai").draggable({ containment: "window" }); });

        function expandAI(msg) {
            $("#ai-text").text(msg);
            $("#draggable-ai").css("width", "260px");
            $("#ai-briefing").fadeIn(300);
        }

        function closeAI() {
            $("#ai-briefing").fadeOut(100, () => { $("#draggable-ai").css("width", "44px"); });
        }

        const widgetOptions = {
            "autosize": true,
            "symbol": "BYBIT:BTCUSDT",
            "interval": "15",
            "theme": "dark",
            "container_id": "tradingview_widget",
            "overrides": {
                "mainSeriesProperties.candleStyle.upColor": "#39FF14",
                "mainSeriesProperties.candleStyle.downColor": "#FF003F",
                "mainSeriesProperties.candleStyle.borderUpColor": "#39FF14",
                "mainSeriesProperties.candleStyle.borderDownColor": "#FF003F",
                "mainSeriesProperties.candleStyle.wickUpColor": "#39FF14",
                "mainSeriesProperties.candleStyle.wickDownColor": "#FF003F"
            }
        };

        window.onload = () => { new TradingView.widget(widgetOptions); };
    </script>
</body>
</html>
