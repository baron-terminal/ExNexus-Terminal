<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Trading Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; height: 100vh; }
        .bybit-dark { background-color: #0a0e12; border: 1px solid #2d343b; }
        .hidden { display: none; }
        
        #tradingview_widget { height: 100%; width: 100%; position: absolute; inset: 0; }
        
        /* BRAND COLORS */
        .ex-text { fill: #00b15d; font-weight: bold; font-size: 24px; }
        .nexus-text { fill: #ffffff; font-weight: bold; font-size: 24px; }
        .trading-intel { fill: #848e9c; font-size: 9px; text-transform: uppercase; letter-spacing: 0.25em; }
        .glowing-line { stroke: #00b1ff; stroke-width: 1.5; filter: drop-shadow(0 0 5px #00b1ff); }

        /* ANTI-DISTORTION LOGO FIX */
        .logo-container { width: 280px; height: auto; aspect-ratio: 280 / 180; }
    </style>
</head>
<body>
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-[#000000] z-[100] relative p-6">
        <div class="w-full max-w-md p-10 bg-[#0a0e12] rounded-lg border border-[#2d343b] text-center shadow-2xl">
            <div class="mb-8 flex justify-center">
                <svg viewBox="0 0 240 160" class="logo-container">
                    <g transform="translate(70, 5)">
                        <path d="M50 10 L90 80 L70 80 L30 10 Z" fill="#e5e7eb" opacity="0.9"/> 
                        <path d="M10 10 L50 80 L30 80 L-10 10 Z" fill="#ffffff"/> 
                        <path d="M30 40 L50 75 L70 75 L50 40 Z" fill="#00b1ff"/>
                        <path d="M30 40 L10 75 L-10 75 L10 40 Z" fill="#00b15d"/>
                    </g>
                    <g transform="translate(0, 110)">
                        <text x="50%" text-anchor="middle">
                            <tspan class="ex-text">Ex</tspan><tspan class="nexus-text tracking-tighter">Nexus</tspan>
                        </text>
                    </g>
                    <line x1="40" y1="125" x2="200" y2="125" class="glowing-line" />
                    <text x="120" y="145" text-anchor="middle" class="trading-intel">Trading Intelligence</text>
                </svg>
            </div>
            <div class="space-y-4">
                <input type="email" class="w-full bg-[#000000] border border-[#2d343b] p-3 rounded text-white outline-none focus:border-[#00b1ff] text-sm" placeholder="Email">
                <input type="password" class="w-full bg-[#000000] border border-[#2d343b] p-3 rounded text-white outline-none focus:border-[#00b15d] text-sm" placeholder="Password">
                <button onclick="showTerminal()" class="w-full bg-[#00b15d] hover:bg-[#008f4c] text-white font-bold py-3.5 rounded uppercase tracking-widest text-xs transition shadow-lg shadow-green-900/40">Access Terminal</button>
            </div>
        </div>
    </div>

    <div id="terminal-screen" class="h-screen flex flex-col hidden">
        <header class="h-12 border-b border-[#2d343b] flex items-center px-4 justify-between bg-[#0a0e12] shrink-0">
            <div class="flex items-center gap-4">
                <div class="flex items-center gap-1">
                    <span class="text-[#00b15d] font-bold text-xs">Ex</span><span class="text-white font-bold text-xs">Nexus</span>
                </div>
                <div class="h-4 w-[1px] bg-[#2d343b]"></div>
                <div class="flex gap-3 text-[9px] uppercase font-bold">
                    <span class="text-[#00b15d]">● Binance</span>
                    <span class="text-[#00b15d]">● Bybit</span>
                    <span class="text-red-500">○ Gate.io Offline</span>
                </div>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <nav class="w-12 border-r border-[#2d343b] flex flex-col items-center py-4 gap-6 bg-[#000000] shrink-0">
                <i data-lucide="layout-grid" class="text-[#00b1ff] w-5 h-5 cursor-pointer"></i>
                <i data-lucide="zap" class="text-gray-500 hover:text-white w-5 h-5 cursor-pointer"></i>
                <i data-lucide="settings" onclick="toggleSettings()" class="text-gray-500 hover:text-white w-5 h-5 cursor-pointer"></i>
            </nav>

            <aside class="w-64 border-r border-[#2d343b] bg-[#000000] shrink-0 overflow-y-auto">
                <div class="p-2 border-b border-[#2d343b] bg-[#0a0e12]"><span class="text-[9px] font-bold text-[#00b15d]">ARBITRAGE SCANNER</span></div>
                <div class="p-2">
                    <div class="p-2 bg-[#0a0e12] rounded border border-[#2d343b]"><span class="text-[10px] font-bold text-white">SOL/USDT +1.82%</span></div>
                </div>
            </aside>

            <section class="flex-1 relative bg-black">
                <div id="tradingview_widget"></div>
            </section>

            <aside class="w-64 border-l border-[#2d343b] bg-[#0a0e12] shrink-0 p-4">
                <button class="w-full bg-[#00b15d] py-3 rounded font-bold text-[10px] text-white tracking-widest uppercase">Deploy AI Bot</button>
            </aside>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function showTerminal() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('terminal-screen').classList.remove('hidden');
            new TradingView.widget({
                "autosize": true,
                "symbol": "BYBIT:BTCUSDT",
                "interval": "60",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "container_id": "tradingview_widget"
            });
            lucide.createIcons();
        }
        function toggleSettings() { alert("Settings Panel: Please enter Gate.io Passphrase in the next update."); }
        lucide.createIcons();
    </script>
</body>
</html>
