<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ExNexus | Institutional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-black text-gray-300 text-[11px] overflow-hidden">
    <div class="h-screen flex flex-col">
        <header class="h-10 border-b border-[#1c2024] flex items-center px-4 bg-[#0a0e12] justify-between shrink-0">
            <span class="text-sm font-black text-white"><span class="text-[#00b15d]">Ex</span>Nexus</span>
            <div class="flex gap-4 font-bold text-[9px] text-gray-500 uppercase">
                <span onclick="toggleLayout(1)" class="cursor-pointer hover:text-white">1 Chart</span>
                <span onclick="toggleLayout(4)" class="cursor-pointer hover:text-white">4 Charts</span>
            </div>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <aside class="w-52 border-r border-[#1c2024] bg-[#0a0e12] shrink-0 p-2">
                <div class="text-[9px] uppercase font-bold text-gray-600 mb-2">Order Book</div>
                <div class="text-[#00b15d] font-mono text-lg">71,048.00 ↑</div>
            </aside>
            <main id="main-grid" class="flex-1 grid gap-[1px] bg-[#1c2024] grid-cols-1">
                <div id="chart-1" class="bg-black w-full h-full"></div>
                <div id="chart-2" class="bg-black w-full h-full hidden"></div>
                <div id="chart-3" class="bg-black w-full h-full hidden"></div>
                <div id="chart-4" class="bg-black w-full h-full hidden"></div>
            </main>
            <aside class="w-64 border-l border-[#1c2024] bg-[#0a0e12] p-4 shrink-0">
                <button class="w-full bg-[#00b15d] text-white py-4 rounded font-black uppercase shadow-[0_4px_25px_rgba(0,177,93,0.3)]">Open Long</button>
            </aside>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
