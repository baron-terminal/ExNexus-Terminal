<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Institutional Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
    <style>
        :root { --brand-lime: #A4CD39; --brand-blue: #00ADEF; --bg-dark: #07090b; }
        body { background-color: var(--bg-dark); margin: 0; padding: 0; overflow: hidden; }
        .panel-glass { background: rgba(17, 20, 24, 0.8); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.05); }
    </style>
</head>
<body class="text-white font-sans">

    <div id="gatekeeper" class="fixed inset-0 z-[9999] bg-[#07090b] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm space-y-8 text-center bg-[#111418] p-10 rounded-3xl border border-gray-800 shadow-2xl">
            <img src="Logo.png" alt="ExNexus" class="w-48 mx-auto mb-6">
            <h2 id="auth-title" class="text-[10px] font-black uppercase tracking-[0.3em] text-[#A4CD39] mb-4">Secure Terminal Access</h2>
            <div class="space-y-4">
                <input type="text" id="user-id" placeholder="USERNAME" class="w-full bg-black border border-gray-800 p-4 rounded-xl text-xs text-white outline-none focus:border-[#A4CD39]">
                <input type="password" id="user-pass" placeholder="ACCESS KEY" class="w-full bg-black border border-gray-800 p-4 rounded-xl text-xs text-white outline-none focus:border-[#A4CD39]">
                <button onclick="handleAuth()" id="auth-btn" class="w-full bg-[#A4CD39] text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest hover:brightness-110 transition">Unlock Terminal</button>
            </div>
            <div class="pt-6 border-t border-gray-800 mt-6">
                <button onclick="toggleAuthMode()" id="auth-toggle" class="text-[9px] text-gray-500 font-bold hover:text-white uppercase transition">Need an account? Sign Up</button>
            </div>
        </div>
    </div>

    <div id="terminal-wrapper" class="flex h-screen w-full opacity-0 transition-opacity duration-1000">
        <aside class="w-16 bg-[#111418] border-r border-gray-800 flex flex-col items-center py-4">
            <div class="mb-8"><img src="Icon.png" alt="X" class="w-8 h-8"></div>
            <div class="text-xl">📊</div>
        </aside>
        <main class="flex-1 flex flex-col">
            <header class="h-14 bg-[#111418] border-b border-gray-800 flex items-center px-6">
                <span id="btc-price" class="text-lg font-mono font-black text-[#A4CD39]">Connecting...</span>
            </header>
            <div id="tradingview_chart" class="flex-1 bg-black"></div>
        </main>
    </div>

    <script>
        let isSignUpMode = false;

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('auth-title').innerText = isSignUpMode ? "Create Account" : "Secure Terminal Access";
            document.getElementById('auth-btn').innerText = isSignUpMode ? "Register & Enter" : "Unlock Terminal";
            document.getElementById('auth-toggle').innerText = isSignUpMode ? "Back to Login" : "Need an account? Sign Up";
        }

        function handleAuth() {
            const u = document.getElementById('user-id').value.trim();
            const p = document.getElementById('user-pass').value.trim();
            
            if (!u || !p) {
                alert("Please fill both fields");
                return;
            }

            if (isSignUpMode) {
                localStorage.setItem("nexus_user_" + u, p);
                alert("Account Created! You can now log in.");
                toggleAuthMode();
            } else {
                const saved = localStorage.getItem("nexus_user_" + u);
                if (saved === p || (u === "admin" && p === "nexus2026")) {
                    document.getElementById('gatekeeper').style.display = 'none';
                    document.getElementById('terminal-wrapper').style.opacity = '1';
                    startTerminal();
                } else {
                    alert("Access Denied. If new, please Sign Up first.");
                }
            }
        }

        function startTerminal() {
            if (typeof TradingView !== 'undefined') {
                new TradingView.widget({
                    "autosize": true,
                    "symbol": "BYBIT:BTCUSDT",
                    "interval": "60",
                    "theme": "dark",
                    "container_id": "tradingview_chart"
                });
            }
            
            setInterval(function() {
                fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=BTCUSDT')
                    .then(r => r.json())
                    .then(data => {
                        const price = parseFloat(data.result.list[0].lastPrice);
                        document.getElementById('btc-price').innerText = 'BTC/USDT: $' + price.toLocaleString();
                    })
                    .catch(e => console.log("Price error"));
            }, 3000);
        }
    </script>
</body>
</html>
