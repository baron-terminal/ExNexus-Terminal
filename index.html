<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus Terminal | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #07090b; color: white; overflow: hidden; }
        .glass { background: rgba(15, 18, 22, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-text { text-shadow: 0 0 15px rgba(164, 205, 57, 0.6); font-weight: 900; color: #A4CD39; }
        .neon-btn { background-color: #A4CD39; box-shadow: 0 0 20px rgba(164, 205, 57, 0.4); border: none; }
        .indicator { height: 8px; width: 8px; border-radius: 50%; display: inline-block; margin-right: 8px; }
    </style>
</head>
<body>

    <div id="gatekeeper" class="fixed inset-0 z-[9999] bg-[#07090b] flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm space-y-10">
            <div class="space-y-2">
                <h1 class="text-6xl tracking-tighter neon-text">EXNEXUS</h1>
                <h2 class="text-2xl font-black tracking-[0.4em] text-white">TERMINAL</h2>
            </div>
            
            <div class="space-y-4">
                <input id="user-id" type="text" placeholder="OPERATOR ID" class="w-full bg-black/40 border border-gray-800 p-4 rounded text-sm font-mono focus:border-[#A4CD39] outline-none">
                <input id="user-pass" type="password" placeholder="ACCESS KEY" class="w-full bg-black/40 border border-gray-800 p-4 rounded text-sm font-mono focus:border-[#A4CD39] outline-none">
                <button onclick="handleAuth()" class="w-full neon-btn text-black font-black py-4 rounded uppercase tracking-widest text-xs hover:opacity-90 transition-opacity">Enter Terminal</button>
            </div>
            <p class="text-[10px] text-gray-500 font-mono tracking-[0.4em] uppercase opacity-50">Encrypted Quantum Link Active</p>
        </div>
    </div>

    <div id="terminal-wrapper" class="flex h-screen w-full overflow-hidden bg-[#0b0e11] absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-1000">
        <div class="w-16 border-r border-gray-800 flex flex-col items-center py-8 space-y-10 bg-black/30">
            <div class="w-10 h-10 rounded bg-[#A4CD39]/10 flex items-center justify-center border border-[#A4CD39]/20">
                <div class="w-4 h-4 bg-[#A4CD39] rounded-sm animate-pulse"></div>
            </div>
            <div class="flex flex-col space-y-8">
                <button title="Nansen Intel" class="text-blue-500"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg></button>
                <button title="Coinglass" class="text-orange-500"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></button>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="h-14 border-b border-gray-800 flex items-center justify-between px-6 bg-black/50">
                <div class="flex items-center space-x-8">
                    <div class="flex items-center"><span class="indicator bg-[#A4CD39]"></span><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">SECURE LINK</span></div>
                    <div class="flex items-center"><span class="indicator bg-blue-400 animate-pulse"></span><span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">NANSEN DATA ACTIVE</span></div>
                </div>
                <div id="btc-price" class="font-mono font-black text-sm text-[#A4CD39] tracking-widest">$00,000.00</div>
            </div>

            <div class="flex-1 p-4 grid grid-cols-12 gap-4">
                <div class="col-span-9 h-full glass rounded-2xl overflow-hidden border border-gray-800">
                    <div id="tradingview_widget" class="w-full h-full"></div>
                </div>

                <div class="col-span-3 space-y-4">
                    <div class="glass p-5 rounded-2xl border-l-4 border-blue-500 bg-blue-500/5">
                        <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3">Nansen Smart Money</h3>
                        <div id="nansen-feed" class="text-xs font-mono text-blue-100 italic">Tracking on-chain flows...</div>
                    </div>
                    <div class="glass p-5 rounded-2xl border-l-4 border-orange-500 bg-orange-500/5">
                        <h3 class="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-3">Coinglass Intel</h3>
                        <div id="coinglass-feed" class="text-xs font-mono text-orange-100 italic">Monitoring liquidations...</div>
                    </div>
                    <div class="glass p-6 rounded-2xl">
                        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest">Wallet Equity</span>
                        <div id="wallet-balance" class="text-3xl font-black text-white tracking-tighter">$24,190.55</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function handleAuth() {
            const u = document.getElementById('user-id').value;
            const p = document.getElementById('user-pass').value;
            if (u === "admin" && p === "nexus2026") {
                document.getElementById('gatekeeper').style.display = 'none';
                const wrap = document.getElementById('terminal-wrapper');
                wrap.classList.remove('opacity-0', 'pointer-events-none');
                initTerminal();
            } else {
                alert("ACCESS DENIED");
            }
        }

        function initTerminal() {
            new TradingView.widget({
                "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15",
                "theme": "dark", "container_id": "tradingview_widget"
            });
            setInterval(updateData, 4000);
            updateData();
        }

        async function updateData() {
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('btc-price').innerText = '$' + parseFloat(d.result.list[0].lastPrice).toLocaleString();
            } catch(e) {}
            
            const nansen = ["Institutional buying detected at support", "Whale inflow: +$12.5M", "Smart Money rotating to ETH"];
            const coin = ["$8.2M Shorts Liquidated (5m)", "Long/Short Ratio: 51.4% Long", "Open Interest +2.34%"];
            
            document.getElementById('nansen-feed').innerText = nansen[Math.floor(Math.random()*nansen.length)];
            document.getElementById('coinglass-feed').innerText = coin[Math.floor(Math.random()*coin.length)];
        }
    </script>
</body>
</html>
