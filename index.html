<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ExNexus | Institutional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-black text-gray-300 text-[11px] overflow-hidden">

    <div id="terminal-screen" class="h-screen flex flex-col">
        <header class="h-10 border-b border-[#1c2024] flex items-center px-4 bg-[#0a0e12] justify-between">
            <div class="flex items-center gap-6">
                <span class="text-sm font-black tracking-tighter text-white"><span class="text-[#00b15d]">Ex</span>Nexus</span>
                <nav class="flex gap-4 font-bold text-gray-500 uppercase text-[9px]">
                    <span class="text-white border-b border-[#00b15d] pb-1 cursor-pointer">Trade</span>
                    <div class="relative group">
                        <span class="hover:text-white cursor-pointer">Layout Options ▾</span>
                        <div class="absolute hidden group-hover:block bg-[#0a0e12] border border-[#1c2024] mt-1 w-24 z-50 shadow-2xl">
                            <div onclick="updateLayout(1)" class="p-2 hover:bg-[#1c2024] cursor-pointer text-white">1 Chart</div>
                            <div onclick="updateLayout(2)" class="p-2 hover:bg-[#1c2024] cursor-pointer text-white">2 Charts</div>
                            <div onclick="updateLayout(4)" class="p-2 hover:bg-[#1c2024] cursor-pointer text-white">4 Charts</div>
                        </div>
                    </div>
                </nav>
            </div>
            <div class="flex items-center gap-4 text-[10px] font-bold text-[#00b15d]">
                ● PRO TERMINAL ACTIVE
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-56 border-r border-[#1c2024] bg-[#0a0e12] shrink-0">
                <div class="p-2 border-b border-[#1c2024] text-[9px] uppercase font-bold text-gray-600">Order Book</div>
                <div class="text-xl font-bold text-[#00b15d] text-center py-10 font-mono">71,048.00 ↑</div>
            </aside>

            <div class="flex-1 flex flex-col bg-black">
                <div id="tv-layout-grid" class="flex-1 bg-[#1c2024]"></div>
                <div class="h-44 border-t border-[#1c2024] bg-[#0a0e12] p-3">
                    <div class="flex gap-4 text-[9px] font-bold text-gray-500 uppercase mb-4">
                        <span class="text-white border-b border-[#00b15d] pb-1 cursor-pointer">Positions(0)</span>
                        <span class="cursor-pointer hover:text-white transition-colors">Open Orders(0)</span>
                        <span class="cursor-pointer hover:text-white transition-colors">History</span>
                    </div>
                    <div class="text-center text-gray-700 mt-10 font-bold uppercase tracking-widest">Awaiting Market Data...</div>
                </div>
            </div>

            <aside class="w-72 border-l border-[#1c2024] bg-[#0a0e12] p-4 shrink-0">
                <div class="flex bg-black p-1 rounded border border-[#1c2024] mb-6">
                    <button class="flex-1 bg-[#00b15d] text-white py-2 rounded text-[10px] font-black uppercase">Buy</button>
                    <button class="flex-1 text-gray-500 py-2 rounded text-[10px] font-bold uppercase">Sell</button>
                </div>
                <div class="space-y-4">
                    <div class="bg-black border border-[#1c2024] p-3 rounded">
                        <div class="text-[8px] text-gray-600 uppercase font-black mb-1">Leverage</div>
                        <div class="text-white font-mono text-xs">100.00x</div>
                    </div>
                    <button class="w-full bg-[#00b15d] text-white py-4 rounded font-black text-[11px] uppercase tracking-widest shadow-[0_4px_25px_rgba(0,177,93,0.3)]">Open Long Position</button>
                </div>
            </aside>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
