<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Trading Command Center</title>
    <!-- Link to our STYLE file -->
    <link rel="stylesheet" href="style.css">
    <!-- Tailwind for quick layout -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <div class="flex h-screen overflow-hidden">
        
        <!-- SIDEBAR -->
        <div class="w-16 sidebar flex flex-col items-center py-6">
            <div class="text-blue-500 font-bold text-2xl mb-10">M</div>
            <div class="space-y-8 text-xl cursor-pointer">
                <div>📊</div>
                <div>🤖</div>
                <div>⚙️</div>
            </div>
        </div>

        <!-- MAIN TERMINAL -->
        <div class="flex-1 flex flex-col">
            
            <!-- HEADER -->
            <header class="h-14 bg-[#161a1e] border-b border-gray-800 flex items-center justify-between px-6">
                <div class="flex items-center space-x-4">
                    <span class="text-xs text-gray-400">BYBIT SPOT</span>
                    <span class="font-bold">BTC / USDT</span>
                    <span id="btc-price" class="font-mono text-xl">$--,---.--</span>
                </div>
                <button onclick="toggleApiModal()" class="bg-blue-600 hover:bg-blue-500 px-4 py-1 rounded text-xs font-bold transition">
    Connect API
</button>
</header>

            <!-- CONTENT AREA -->
            <div class="flex-1 flex overflow-hidden">
                <!-- CHART HOUSING -->
<div class="flex-1 bg-black border-r border-gray-800 relative">
    <!-- TradingView Widget BEGIN -->
    <div class="tradingview-widget-container" style="height:100%;width:100%">
        <div id="tradingview_chart" style="height:calc(100% - 32px);width:100%"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget(
        {
            "autosize": true,
            "symbol": "BYBIT:BTCUSDT",
            "interval": "60",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#161a1e",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_chart"
        }
        );
        </script>
    </div>
    <!-- TradingView Widget END -->
</div>

                <!-- RIGHT PANEL (Execution & AI) -->
                <div class="w-80 p-4 space-y-4">
                    <div class="flex space-x-2">
                        <button class="flex-1 btn-buy py-3">BUY</button>
                        <button class="flex-1 btn-sell py-3">SELL</button>
                    </div>

                    <!-- AI ANALYTICS (Future AltFINS Integration) -->
                    <div class="ai-box mt-10">
                        <h4 class="text-xs font-bold text-purple-400 uppercase mb-2">AI Intelligence</h4>
                        <p class="text-[11px] text-gray-400 leading-relaxed italic">
                            "Connecting to AltFINS via MCP... Awaiting high-probability trade signals."
                        </p>
                    </div>
                </div>
            </div>
        </div>
    </div>
<!-- API MODAL (Hidden by default) -->
<div id="api-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-50">
    <div class="bg-[#161a1e] border border-gray-800 w-96 p-6 rounded-xl shadow-2xl">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-lg font-bold text-white">Connect Exchange</h2>
            <button onclick="toggleApiModal()" class="text-gray-500 hover:text-white">✕</button>
        </div>

        <div class="space-y-4">
            <div>
                <label class="text-[10px] text-gray-500 uppercase font-bold">Exchange</label>
                <select id="ex-name" class="w-full bg-black border border-gray-700 p-2 rounded mt-1 text-sm text-white">
                    <option value="bybit">Bybit</option>
                    <option value="binance">Binance (Coming Soon)</option>
                </select>
            </div>
            <div>
                <label class="text-[10px] text-gray-500 uppercase font-bold">API Key</label>
                <input id="ex-key" type="text" placeholder="Enter API Key" class="w-full bg-black border border-gray-700 p-2 rounded mt-1 text-sm text-white focus:border-blue-500 outline-none">
            </div>
            <div>
                <label class="text-[10px] text-gray-500 uppercase font-bold">API Secret</label>
                <input id="ex-secret" type="password" placeholder="Enter API Secret" class="w-full bg-black border border-gray-700 p-2 rounded mt-1 text-sm text-white focus:border-blue-500 outline-none">
            </div>
            
            <button onclick="saveApiKeys()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg mt-4 transition text-sm">
                Securely Save Keys
            </button>
            <p class="text-[9px] text-gray-500 text-center italic">
                Keys are stored locally in your browser.
            </p>
        </div>
    </div>
</div>
    <!-- Link to our BRAIN file -->
    <script src="brain.js"></script>
</body>
</html>
