<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Multi-Exchange Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap');
        :root { --neon: #39FF14; --hot-red: #FF003F; }
        body { font-family: 'Inter', sans-serif; background: #050505; color: white; overflow: hidden; height: 100vh; }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
        .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(255, 255, 255, 0.05); }
        .exchange-node { border-left: 2px solid #222; transition: all 0.2s; }
        .exchange-node:hover { border-left-color: var(--neon); background: rgba(57, 255, 20, 0.02); }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-10 border-b border-gray-900 flex items-center justify-between px-4 bg-black">
        <div class="flex items-center space-x-3">
            <div class="w-6 h-6 bg-gradient-to-br from-[#39FF14] to-green-900 rounded flex items-center justify-center font-black text-[10px] text-black">EX</div>
            <span class="text-sm font-black tracking-tighter neon-text">EXNEXUS</span>
        </div>
        <div class="flex items-center space-x-6 text-[10px] font-mono">
            <div id="ticker" class="neon-text font-black">$00,000.00</div>
            <div class="flex space-x-2">
                <span class="text-green-500">BYBIT ●</span>
                <span class="text-gray-600">BINANCE ○</span>
                <span class="text-gray-600">GATE.IO ○</span>
            </div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <nav class="w-12 border-r border-gray-900 flex flex-col items-center py-4 space-y-6 bg-black">
            <div class="text-neon"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
            <div class="text-gray-700 hover:text-white cursor-pointer"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4a2 2 0 110-4m0 4v2m0-6V4"></path></svg></div>
        </nav>

        <main class="flex-1 p-1 grid grid-cols-12 grid-rows-6 gap-1 h-full">
            
            <section class="col-span-8 row-span-4 glass rounded-lg overflow-hidden relative">
                <div id="tradingview_widget" class="w-full h-full"></div>
            </section>

            <aside class="col-span-4 row-span-4 flex flex-col space-y-1">
                <div class="glass p-2 rounded-lg flex-1 overflow-y-auto">
                    <div class="flex justify-between items-center mb-2">
                        <span class="text-[8px] text-gray-500 uppercase font-black">Exchange Nodes</span>
                        <button class="text-[8px] bg-blue-600 px-2 py-0.5 rounded text-white font-bold">+ ADD API</button>
                    </div>
                    <div class="space-y-1">
                        <div class="exchange-node p-2 bg-black/40 rounded">
                            <div class="flex justify-between text-[10px] font-bold"><span>BYBIT Main</span> <span class="text-neon">$24,190.55</span></div>
                            <div class="text-[7px] text-gray-600 mt-1">Status: Active | Perpetual-V5</div>
                        </div>
                        <div class="exchange-node p-2 opacity-40 rounded">
                            <div class="flex justify-between text-[10px] font-bold"><span>Binance Hub</span> <span class="text-gray-500">$0.00</span></div>
                            <div class="text-[7px] text-gray-600 mt-1">Status: Disconnected</div>
                        </div>
                    </div>
                </div>

                <div class="glass p-3 rounded-lg flex flex-col bg-gradient-to-b from-transparent to-black/40">
                    <span class="text-[8px] text-gray-500 uppercase font-black mb-2">Manual Execution</span>
                    <div class="grid grid-cols-2 gap-1 mb-2">
                        <button onclick="setDir('LONG')" id="long-btn" class="py-2 rounded bg-neon text-black text-[9px] font-black uppercase">Open Long</button>
                        <button onclick="setDir('SHORT')" id="short-btn" class="py-2 rounded bg-gray-900 text-gray-500 text-[9px] font-black uppercase">Open Short</button>
                    </div>
                    <input type="number" placeholder="Order Size" class="w-full bg-black border border-gray-800 p-2 rounded text-[10px] mb-2 outline-none focus:border-neon font-mono">
                    <button id="exec-main" class="w-full py-3 rounded bg-neon text-black font-black uppercase text-[10px] shadow-[0_0_15px_rgba(57,255,20,0.1)]">Confirm Execution</button>
                </div>
            </aside>

            <section class="col-span-12 row-span-2 glass rounded-lg p-3 flex space-x-4">
                <div class="w-1/4 border-r border-gray-800">
                    <h4 class="text-[8px] text-gray-500 uppercase font-black mb-2">Gemini AI Logic</h4>
                    <div class="text-[9px] font-mono space-y-1">
                        <div class="flex justify-between"><span>Strategy:</span> <span class="text-blue-400">Momentum-Bot</span></div>
                        <div class="flex justify-between"><span>Signal:</span> <span class="neon-text">STANDBY</span></div>
                    </div>
                </div>
                <div class="flex-1">
                    <h4 class="text-[8px] text-gray-500 uppercase font-black mb-2">Universal Order History</h4>
                    <div class="text-[9px] text-gray-600 italic text-center pt-4">Monitoring Bybit & Connected API Nodes...</div>
                </div>
            </section>
        </main>
    </div>

    <div class="fixed bottom-4 left-16 w-10 h-10 bg-gradient-to-tr from-blue-600 to-purple-600 rounded-lg flex items-center justify-center cursor-pointer shadow-lg z-[9999]" onclick="alert('Gemini: Ready for commands.')">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const tv = { "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15", "theme": "dark", "container_id": "tradingview_widget", "hide_top_toolbar": false, "allow_symbol_change": true };
        window.onload = () => { new TradingView.widget(tv); sync(); setInterval(sync, 3000); };

        function setDir(d) {
            const l = document.getElementById('long-btn'); const s = document.getElementById('short-btn'); const ex = document.getElementById('exec-main');
            if(d === 'LONG') {
                l.className = "py-2 rounded bg-neon text-black text-[9px] font-black uppercase";
                s.className = "py-2 rounded bg-gray-900 text-gray-500 text-[9px] font-black uppercase";
                ex.className = "w-full py-3 rounded bg-neon text-black font-black uppercase text-[10px]";
                ex.innerText = "Confirm Long Market";
            } else {
                s.className = "py-2 rounded bg-[#FF003F] text-white text-[9px] font-black uppercase shadow-[0_0_10px_rgba(255,0,63,0.3)]";
                l.className = "py-2 rounded bg-gray-900 text-gray-500 text-[9px] font-black uppercase";
                ex.className = "w-full py-3 rounded bg-[#FF003F] text-white font-black uppercase text-[10px]";
                ex.innerText = "Confirm Short Market";
            }
        }

        async function sync() {
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('ticker').innerText = '$' + parseFloat(d.result.list[0].lastPrice).toLocaleString();
            } catch(e){}
        }
    </script>
</body>
</html>
