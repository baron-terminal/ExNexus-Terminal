<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Institutional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        
        :root { 
            --neon: #39FF14; 
            --hot-red: #FF003F; 
            --bg: #050505; 
            --sidebar-left: 52px;   /* LOCKED */
            --sidebar-right: 360px; /* LOCKED */
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: white; 
            overflow: hidden; 
            height: 100vh; 
            margin: 0; 
        }

        /* 40% REDUCTION PROTOCOL: Middle column (the graph) is limited to 0.6fr */
        .app-container { 
            display: grid; 
            grid-template-columns: var(--sidebar-left) 0.6fr var(--sidebar-right); 
            grid-template-rows: 40px 1fr 180px; 
            height: 100vh; 
            gap: 2px;
        }

        .glass { background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.03); }

        /* Left Nav Locked */
        .nav-icon { color: #444; height: 50px; display: flex; align-items: center; justify-content: center; cursor: pointer; }

        /* GRAPH BOX: Reduced size area */
        .chart-container { 
            min-width: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            background: #000;
        }

        /* Right Sidebar Intelligence */
        .node-header { font-weight: 900; font-size: 8px; color: rgba(255,255,255,0.3); text-transform: uppercase; letter-spacing: 0.15em; margin-bottom: 20px; }
        .bot-row { display: flex; justify-content: space-between; font-size: 11px; padding: 6px 0; border-bottom: 1px solid rgba(255,255,255,0.03); }
        
        .execution-block { margin-top: auto; padding-top: 30px; }
        input { background: #000; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: 'JetBrains Mono'; font-size: 11px; padding: 12px; width: 100%; outline: none; margin: 10px 0; }
        
        .btn-short { width: 100%; padding: 14px; border: 1px solid var(--hot-red); color: var(--hot-red); font-weight: 800; text-transform: uppercase; font-size: 10px; transition: 0.2s; }
        .btn-short:hover { background: var(--hot-red); color: black; }

        #ticker { color: var(--neon); font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="col-span-3 glass flex items-center justify-between px-6">
            <div class="flex items-center space-x-3">
                <span class="text-[10px] font-black tracking-tighter opacity-40">EXNEXUS</span>
                <span id="ticker">$74,231.70</span>
            </div>
            <div class="text-[8px] font-bold text-white/20 uppercase tracking-widest">Connected: Bybit API</div>
        </header>

        <nav class="row-span-2 glass flex flex-col py-6">
            <div class="nav-icon" style="color:var(--neon)"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
            <div class="nav-icon"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></div>
        </nav>

        <main class="glass chart-container">
            <div id="tradingview_widget" style="width: 100%; height: 100%;"></div>
        </main>

        <aside class="row-span-2 glass p-6 flex flex-col">
            <div class="node-header">Bot Intelligence Node</div>
            <div class="space-y-2">
                <div class="bot-row"><span>Smart Trades</span> <span style="color:var(--neon)">+$2,025.18</span></div>
                <div class="bot-row text-white/40"><span>DCA Strategy</span> <span>Active (3)</span></div>
                <div class="bot-row text-white/40"><span>Grid Bot</span> <span>Standby</span></div>
                <div class="bot-row"><span style="color:var(--neon)">DYS Custom Bot</span> <span class="italic text-white/10 font-mono text-[8px]">Scanning...</span></div>
            </div>

            <div class="execution-block">
                <span class="text-[9px] font-black text-gray-600 uppercase">Order Quantity (USDT)</span>
                <input type="text" placeholder="Amount...">
                <button class="btn-short">Execute Short</button>
            </div>
        </aside>

        <footer class="glass px-8 py-4">
            <div class="flex items-center space-x-8 text-[9px] font-black uppercase tracking-widest text-white/20">
                <span style="color:var(--neon); border-bottom: 2px solid var(--neon)" class="pb-1">Live Orders</span>
                <span>Active Positions</span>
                <span>P&L History</span>
            </div>
        </footer>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({
            "autosize": true,
            "symbol": "BYBIT:BTCUSDT.P",
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "container_id": "tradingview_widget",
            "enable_publishing": false,
            "hide_side_toolbar": true, /* REMOVES BULK TO PREVENT SIDEBAR PUSH */
            "allow_symbol_change": true,
            "save_image": false
        });
    </script>
</body>
</html>
