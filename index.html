<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ExNexus Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #07090b; color: white; font-family: sans-serif; overflow: hidden; }
        .neon-border { border: 1px solid #A4CD39; box-shadow: 0 0 10px rgba(164, 205, 57, 0.2); }
    </style>
</head>
<body>

    <div id="gatekeeper" class="fixed inset-0 z-[9999] bg-[#07090b] flex flex-col items-center justify-center p-6">
        <div class="w-full max-w-sm space-y-6 text-center">
            <h1 class="text-4xl font-black tracking-tighter" style="color: #A4CD39;">EXNEXUS TERMINAL</h1>
            <div class="space-y-4">
                <input id="user-id" type="text" placeholder="OPERATOR ID" class="w-full bg-black border border-gray-800 p-4 rounded text-sm outline-none focus:border-[#A4CD39]">
                <input id="user-pass" type="password" placeholder="ACCESS KEY" class="w-full bg-black border border-gray-800 p-4 rounded text-sm outline-none focus:border-[#A4CD39]">
                <button onclick="handleAuth()" class="w-full bg-[#A4CD39] text-black font-bold py-4 rounded uppercase tracking-widest hover:opacity-80">Enter Terminal</button>
            </div>
        </div>
    </div>

    <div id="terminal-wrapper" class="hidden h-screen w-full flex flex-col bg-[#0b0e11]">
        <div class="h-16 border-b border-gray-800 flex items-center justify-between px-6">
            <span class="text-[#A4CD39] font-bold text-xs tracking-widest">SYSTEM ONLINE</span>
            <div id="btc-price" class="font-mono text-sm font-bold">$00,000.00</div>
        </div>
        <div class="flex-1 p-4">
            <div id="tradingview_widget" class="w-full h-full rounded-xl overflow-hidden neon-border"></div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function handleAuth() {
            const u = document.getElementById('user-id').value;
            const p = document.getElementById('user-pass').value;

            if (u === "admin" && p === "nexus2026") {
                document.getElementById('gatekeeper').classList.add('hidden');
                document.getElementById('terminal-wrapper').classList.remove('hidden');
                loadChart();
            } else {
                alert("ACCESS DENIED");
            }
        }

        function loadChart() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BYBIT:BTCUSDT",
                "interval": "15",
                "theme": "dark",
                "container_id": "tradingview_widget"
            });
            setInterval(fetchPrice, 5000);
            fetchPrice();
        }

        async function fetchPrice() {
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                const p = d.result.list[0].lastPrice;
                document.getElementById('btc-price').innerText = '$' + parseFloat(p).toLocaleString();
            } catch(e) { console.log("Price error"); }
        }
    </script>
</body>
</html>
