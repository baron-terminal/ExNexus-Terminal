<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Pro Terminal (Unified Green)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body class="bg-black text-gray-300 text-[11px] overflow-hidden">

    <div id="prefs-modal" class="fixed inset-0 bg-black/80 z-[100] flex items-center justify-center hidden">
        <div class="w-[500px] bg-[#1c2024] rounded-lg border border-[#2d343b] shadow-2xl">
            <div class="flex justify-between items-center p-4 border-b border-[#2d343b]">
                <span class="text-sm font-bold text-white">Preferences</span>
                <button onclick="togglePrefs()" class="text-gray-500 hover:text-white"><i data-lucide="x" class="w-4 h-4"></i></button>
            </div>
            <div class="flex gap-4 px-4 py-2 text-[10px] font-bold border-b border-[#2d343b] text-gray-500">
                <span class="hover:text-white cursor-pointer">Trade</span>
                <span class="hover:text-white cursor-pointer" onclick="switchTab('general')">General</span>
                <span id="tab-layout" class="text-[#00b15d] border-b border-[#00b15d] pb-1 cursor-pointer" onclick="switchTab('layout')">Layout</span>
                <span id="tab-charts" class="hover:text-white cursor-pointer" onclick="switchTab('charts')">Multiple charts</span>
            </div>
            <div id="prefs-content" class="p-6 space-y-6 max-h-[400px] overflow-y-auto">
                </div>
        </div>
    </div>

    <div id="terminal-screen" class="h-screen flex flex-col">
        <header class="h-10 border-b border-[#1c2024] flex items-center px-3 bg-[#0a0e12] justify-between">
            <div class="flex items-center gap-4">
                <div class="flex items-center text-sm mr-4">
                    <span class="text-[#00b15d] font-extrabold">Ex</span><span class="text-white font-extrabold">Nexus</span>
                </div>
                <nav class="flex gap-4 font-medium text-gray-400">
                    <span class="text-white border-b border-[#00b15d] pb-1 cursor-pointer">Trade</span>
                    <span class="hover:text-white cursor-pointer" onclick="toggleDashboard()">Dashboard</span>
                </nav>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="togglePrefs()" class="text-gray-400 hover:text-[#00b15d]"><i data-lucide="settings" class="w-4 h-4"></i></button>
            </div>
        </header>

        <div class="h-12 border-b border-[#1c2024] bg-[#0a0e12] flex items-center px-4 gap-10">
            <div class="flex flex-col"><span class="text-white font-bold text-sm">BTCUSDT</span><span class="text-[9px] text-gray-500 uppercase tracking-tighter">Perpetual</span></div>
            <div class="flex flex-col"><span class="text-[#00b15d] font-bold">71,048.00</span><span class="text-[9px] text-gray-500">Mark: 71,072.4</span></div>
            <div class="flex flex-col"><span class="text-gray-500 text-[9px] uppercase">24h Change</span><span class="text-[#00b15d]">+84.30 (+0.11%)</span></div>
            <div class="flex flex-col"><span class="text-gray-500 text-[9px] uppercase">Funding Rate</span><span class="text-[#00b15d]">0.0100%</span></div>
        </div>

        <div id="main-container" class="flex-1 flex overflow-hidden">
            <aside id="order-book" class="w-56 border-r border-[#1c2024] bg-[#0a0e12] flex flex-col">
                <div class="p-2 border-b border-[#1c2024] text-[10px] uppercase font-bold text-gray-500">Order Book</div>
                <div class="flex-1 p-2 font-mono" id="ob-container">
                    <div class="text-lg font-bold text-[#00b15d] text-center my-4 py-1 border-y border-[#1c2024]">71,048.00 ↑</div>
                </div>
            </aside>

            <div id="chart-workspace" class="flex-1 flex flex-col bg-black overflow-hidden">
                <div id="tv-layout-grid" class="flex-1 grid grid-cols-2 grid-rows-2 gap-[1px] bg-[#1c2024]">
                    <div id="tv-c1" class="bg-black relative"></div>
                    <div id="tv-c2" class="bg-black relative"></div>
                    <div id="tv-c3" class="bg-black relative"></div>
                    <div id="tv-c4" class="bg-black relative"></div>
                </div>
                <div class="h-40 border-t border-[#1c2024] bg-[#0a0e12]">
                    <div class="flex gap-4 p-2 text-[10px] font-bold text-gray-500 border-b border-[#1c2024]">
                        <span class="text-white border-b-2 border-[#00b15d] pb-1">Positions(0)</span>
                        <span class="hover:text-white">Current Orders(0)</span>
                        <span class="hover:text-white">Order History</span>
                    </div>
                    <div class="p-4 text-center text-gray-600 italic">No reporting data available.</div>
                </div>
            </div>

            <aside id="order-panel" class="w-72 border-l border-[#1c2024] bg-[#0a0e12] p-3">
                <div class="flex justify-between items-center mb-4">
                    <div class="text-[10px] font-bold text-[#00b15d]">Isolated 10x</div>
                    <div class="text-gray-500 hover:text-white cursor-pointer"><i data-lucide="info" class="w-3 h-3"></i></div>
                </div>
                <div class="flex bg-black p-1 rounded border border-[#1c2024] mb-4">
                    <button class="flex-1 bg-[#00b15d] text-white py-1.5 rounded text-[10px] font-black uppercase">Buy</button>
                    <button class="flex-1 text-gray-500 py-1.5 rounded text-[10px] font-bold uppercase hover:text-white">Sell</button>
                </div>
                <div class="space-y-4">
                    <div>
                        <div class="text-[9px] text-gray-500 uppercase font-bold mb-1">Price (USDT)</div>
                        <input type="text" class="w-full bg-black border border-[#2d343b] p-2 rounded text-white font-mono" value="71048.00">
                    </div>
                    <div>
                        <div class="text-[9px] text-gray-500 uppercase font-bold mb-1">Quantity (BTC)</div>
                        <input type="text" class="w-full bg-black border border-[#2d343b] p-2 rounded text-white font-mono" placeholder="0.0">
                    </div>
                    <button class="w-full bg-[#00b15d] text-white py-3 rounded font-black text-[11px] uppercase mt-4 tracking-widest shadow-[0_0_15px_rgba(0,177,93,0.2)]">Open Long / Buy</button>
                </div>
            </aside>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="app.js"></script>
</body>
</html>
