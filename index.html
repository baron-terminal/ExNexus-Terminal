<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Full Integrated Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;900&family=JetBrains+Mono&display=swap');
        :root { --neon: #39FF14; --hot-red: #FF003F; --bg: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; overflow: hidden; height: 100vh; }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
        .hot-red-text { color: var(--hot-red); text-shadow: 0 0 10px rgba(255, 0, 63, 0.3); }
        .glass { background: rgba(15, 15, 15, 0.95); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Floating Gemini Hub */
        #gemini-hub {
            position: fixed; bottom: 20px; left: 20px; width: 42px; height: 42px;
            background: linear-gradient(135deg, #4285f4, #9b72cb);
            border-radius: 10px; z-index: 1000; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 15px rgba(66, 133, 244, 0.3);
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-10 border-b border-gray-900 flex items-center justify-between px-4 bg-black">
        <div class="flex items-center space-x-4">
            <span class="text-base font-black tracking-tighter neon-text">EXNEXUS</span>
            <span class="text-[8px] font-bold text-gray-600 uppercase tracking-[0.2em] border-l border-gray-800 pl-4">Institutional Terminal</span>
        </div>
        <div class="flex items-center space-x-6">
            <div id="ticker" class="font-mono text-xs font-black neon-text">$00,000.00</div>
            <div class="text-[9px] font-bold text-blue-500 uppercase">NODE: BYBIT LIVE</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <main class="flex-1 p-2 grid grid-cols-12 grid-rows-6 gap-2 h-full">
            
            <section id="chart-parent" class="col-span-9 row-span-4 glass rounded-lg overflow-hidden relative">
                <div class="absolute top-2 right-2 z-10">
                    <button onclick="toggleChart()" class="bg-black/80 border border-gray-700 text-[8px] font-black px-2 py-1 rounded hover:text-neon uppercase">Expand View</button>
                </div>
                <div id="tradingview_widget" class="w-full h-full"></div>
            </section>

            <aside id="manual-side" class="col-span-3 row-span-4 flex flex-col space-y-2">
                <div class="glass p-3 rounded-lg border-l-2 border-neon">
                    <span class="text-[8px] text-gray-500 uppercase font-black">Total Equity</span>
                    <div class="text-xl font-black">$24,190.55</div>
                </div>

                <div class="glass p-3 rounded-lg flex-1 flex flex-col">
                    <span class="text-[8px] text-gray-500 uppercase font-black mb-3">Manual Override</span>
                    <div class="grid grid-cols-2 gap-1 mb-3">
                        <button onclick="setTrade('LONG')" id="long-tab" class="py-2 rounded bg-neon text-black text-[9px] font-black uppercase shadow-[0_0_10px_rgba(57,255,20,0.2)]">Open Long</button>
                        <button onclick="setTrade('SHORT')" id="short-tab" class="py-2 rounded bg-gray-900 text-gray-500 text-[9px] font-black uppercase">Open Short</button>
                    </div>
                    <div class="space-y-2">
                        <input type="number" placeholder="Order Qty (USDT)" class="w-full bg-black border border-gray-800 p-2 rounded text-[10px] outline-none focus:border-neon font-mono">
                        <div class="grid grid-cols-4 gap-1">
                            <button class="bg-gray-900 text-[8px] font-bold py-1 rounded">25%</button>
                            <button class="bg-gray-900 text-[8px] font-bold py-1 rounded">50%</button>
                            <button class="bg-gray-900 text-[8px] font-bold py-1 rounded">75%</button>
                            <button class="bg-gray-900 text-[8px] font-bold py-1 rounded border border-gray-700">MAX</button>
                        </div>
                    </div>
                    <button id="main-exec" class="mt-auto w-full py-3 rounded bg-neon text-black font-black uppercase text-[10px]">Execute Long Market</button>
                </div>
            </aside>

            <section class="col-span-12 row-span-2 glass rounded-lg p-3 grid grid-cols-4 gap-4">
                <div class="border-r border-gray-900">
                    <h4 class="text-[8px] text-gray-500 uppercase font-black mb-2 tracking-widest">Automation Node</h4>
                    <div class="space-y-1 font-mono text-[10px]">
                        <div class="flex justify-between"><span>RSI 14:</span> <span class="neon-text">42.50</span></div>
                        <div class="flex justify-between"><span>MACD:</span> <span class="hot-red-text">Bearish</span></div>
                        <div class="flex justify-between"><span>Session:</span> <span class="text-blue-400">London</span></div>
                    </div>
                </div>
                <div class="col-span-3">
                    <h4 class="text-[8px] text-gray-500 uppercase font-black mb-2 tracking-widest">Active Bybit Positions</h4>
                    <table class="w-full text-left text-[10px] font-mono">
                        <thead class="text-gray-600 border-b border-gray-900 uppercase text-[8px]">
                            <tr><th>Symbol</th><th>Side</th><th>PnL %</th><th>Entry</th><th class="text-right">Liquidation</th></tr>
                        </thead>
                        <tbody class="text-gray-400">
                            <tr><td colspan="5" class="pt-4 text-center italic text-gray-600">No manual or automated positions currently active.</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="gemini-hub" onclick="alert('Gemini: Automation scanning for RSI divergence...')">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let isExpanded = false;
        const tvConfig = { "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15", "theme": "dark", "container_id": "tradingview_widget", "hide_top_toolbar": false, "allow_symbol_change": true, "save_image": false };

        window.onload = () => { new TradingView.widget(tvConfig); sync(); setInterval(sync, 3000); };

        function toggleChart() {
            const chart = document.getElementById('chart-parent');
            const side = document.getElementById('manual-side');
            isExpanded = !isExpanded;
            if(isExpanded) { chart.classList.replace('col-span-9', 'col-span-12'); side.classList.add('hidden'); }
            else { chart.classList.replace('col-span-12', 'col-span-9'); side.classList.remove('hidden'); }
            new TradingView.widget(tvConfig);
        }

        function setTrade(dir) {
            const lTab = document.getElementById('long-tab'); const sTab = document.getElementById('short-tab');
            const exec = document.getElementById('main-exec');
            if(dir === 'LONG') {
                lTab.className = "py-2 rounded bg-neon text-black text-[9px] font-black uppercase";
                sTab.className = "py-2 rounded bg-gray-900 text-gray-500 text-[9px] font-black uppercase";
                exec.className = "mt-auto w-full py-3 rounded bg-neon text-black font-black uppercase text-[10px]";
                exec.innerText = "Execute Long Market";
            } else {
                sTab.className = "py-2 rounded bg-[#FF003F] text-white text-[9px] font-black uppercase shadow-[0_0_10px_rgba(255,0,63,0.3)]";
                lTab.className = "py-2 rounded bg-gray-900 text-gray-500 text-[9px] font-black uppercase";
                exec.className = "mt-auto w-full py-3 rounded bg-[#FF003F] text-white font-black uppercase text-[10px]";
                exec.innerText = "Execute Short Market";
            }
        }

        async function sync() {
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('ticker').innerText = '$' + parseFloat(d.result.list[0].lastPrice).toLocaleString();
            } catch(e){}
        }
    </script>
</body>
</html>
