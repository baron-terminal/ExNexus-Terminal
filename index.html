<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus Trading Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; margin: 0; overflow: hidden; }
        .font-mono { font-family: 'Courier New', monospace; }
        #terminal-wrapper { transition: opacity 0.8s ease-in-out; }
        .signal-glow { box-shadow: 0 0 15px rgba(164, 205, 57, 0.1); }
    </style>
</head>
<body>

<div id="gatekeeper" class="fixed inset-0 z-[9999] bg-[#07090b] flex flex-col items-center justify-center p-6">
    <div class="w-full max-w-sm space-y-8 text-center bg-[#111418] p-10 rounded-3xl border border-gray-800 shadow-2xl">
        <img src="Logo.png" alt="ExNexus" class="w-48 mx-auto mb-6">
        <h2 id="auth-title" class="text-[10px] font-black uppercase tracking-[0.3em] text-[#A4CD39]">Secure Access Required</h2>
        <div class="space-y-4">
            <input type="text" id="user-id" placeholder="USERNAME" class="w-full bg-black border border-gray-800 p-4 rounded-xl text-xs text-white outline-none focus:border-[#A4CD39]">
            <input type="password" id="user-pass" placeholder="ACCESS KEY" class="w-full bg-black border border-gray-800 p-4 rounded-xl text-xs text-white outline-none focus:border-[#A4CD39]">
            <button onclick="handleAuth()" id="auth-btn" class="w-full bg-[#A4CD39] text-black font-black py-4 rounded-xl uppercase text-[10px] tracking-widest hover:brightness-110 transition">Unlock Terminal</button>
        </div>
        <button onclick="toggleAuthMode()" id="auth-toggle" class="text-[9px] text-gray-500 font-bold hover:text-white uppercase">Need an account? Sign Up</button>
    </div>
</div>

<div id="terminal-wrapper" class="flex h-screen w-full overflow-hidden bg-[#0b0e11] absolute inset-0 opacity-0 pointer-events-none">
    
    <aside class="w-40 bg-[#161a1e] border-r border-gray-800 flex flex-col items-center py-6 z-20 shadow-xl">
        <div class="mb-10 w-full px-4 text-center">
            <img src="Logo.png" alt="ExNexus" class="w-full h-auto object-contain">
        </div>
        <div class="flex-1 space-y-10 text-2xl text-gray-500">
            <div class="hover:text-white cursor-pointer transition flex flex-col items-center"><span class="text-xs uppercase font-bold tracking-tighter mb-1 text-gray-600">Market</span>📊</div>
            <div class="hover:text-[#A4CD39] cursor-pointer transition flex flex-col items-center"><span class="text-xs uppercase font-bold tracking-tighter mb-1 text-gray-600">AI Bot</span>🤖</div>
            <div class="hover:text-white cursor-pointer transition flex flex-col items-center"><span class="text-xs uppercase font-bold tracking-tighter mb-1 text-gray-600">Setup</span>⚙️</div>
        </div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-20 bg-[#111418] border-b border-gray-800 flex items-center justify-between px-8 z-10">
            <div class="flex items-center space-x-8">
                <div class="flex flex-col border-r border-gray-800 pr-8">
                    <span class="text-[9px] text-gray-500 font-bold uppercase tracking-widest mb-1">Bybit Spot Price</span>
                    <div class="flex items-center space-x-3"><span class="font-black text-xs">BTC/USDT</span><span id="btc-price" class="font-mono text-xl text-[#A4CD39] font-black">$--,---.--</span></div>
                </div>
                <div class="flex flex-col border-r border-gray-800 pr-8">
                    <span class="text-[9px] text-[#00ADEF] font-bold uppercase tracking-widest mb-1">Available</span>
                    <div class="flex items-center space-x-2"><span id="wallet-balance" class="font-mono text-xl text-white font-black tracking-tighter">0.00</span><span class="text-[9px] text-gray-500 font-bold uppercase">USDT</span></div>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] text-[#A4CD39] font-bold uppercase tracking-widest mb-1">Total Equity</span>
                    <div class="flex items-center space-x-2"><span id="total-equity" class="font-mono text-xl text-white font-black tracking-tighter">0.00</span><span class="text-[9px] text-gray-600 font-bold uppercase">USD</span></div>
                </div>
            </div>
            <button onclick="toggleApiModal()" id="api-status-btn" class="bg-[#00ADEF] hover:bg-blue-500 text-white px-6 py-2.5 rounded-full text-[10px] font-black uppercase tracking-widest transition">Connect API</button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div class="flex-1 bg-black border-r border-gray-800"><div id="tradingview_chart" class="h-full w-full"></div></div>
            <aside class="w-80 p-5 space-y-5 bg-[#0b0e11] overflow-y-auto">
                <div class="flex space-x-3">
                    <button class="flex-1 bg-[#A4CD39] text-black font-black py-4 rounded-xl text-xs uppercase tracking-widest">Buy</button>
                    <button class="flex-1 bg-red-600 text-white font-black py-4 rounded-xl text-xs uppercase tracking-widest">Sell</button>
                </div>
                
                <div class="p-5 border border-purple-500/20 rounded-2xl bg-[#1c1329] signal-glow">
                    <div class="flex justify-between items-center mb-4">
                        <h4 class="text-[10px] font-bold text-purple-400 uppercase tracking-widest">Intelligence</h4>
                        <span class="text-[8px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded">LIVE</span>
                    </div>
                    <div id="ai-content" class="space-y-3">
                        <p class="text-[10px] text-gray-500 animate-pulse">Scanning Global Markets...</p>
                    </div>
                </div>

                <div class="p-5 border border-gray-800 rounded-2xl bg-[#111418]">
                    <h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest mb-5">Portfolio</h4>
                    <div id="asset-list" class="space-y-4"></div>
                </div>
            </aside>
        </div>
    </main>
</div>

<div id="api-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md flex items-center justify-center z-[100]">
    <div class="bg-[#161a1e] border border-gray-800 w-96 p-8 rounded-3xl">
        <h2 class="text-white font-black mb-6 text-center uppercase tracking-widest">Link Bybit</h2>
        <div class="space-y-4">
            <input id="ex-key" type="text" placeholder="API KEY" class="w-full bg-black border border-gray-700 p-4 rounded-xl text-xs text-white outline-none">
            <input id="ex-secret" type="password" placeholder="API SECRET" class="w-full bg-black border border-gray-700 p-4 rounded-xl text-xs text-white outline-none">
            <button onclick="saveApiKeys()" class="w-full bg-[#00ADEF] text-white font-black py-4 rounded-xl uppercase text-xs">Authorize</button>
            <button onclick="toggleApiModal()" class="w-full text-gray-600 text-[10px] font-bold uppercase">Cancel</button>
        </div>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    const proxyUrl = "https://exnexus-proxy.drorbaron18.workers.dev/";
    let isSignUpMode = false;
    let lastPrice = 0;

    function toggleAuthMode() {
        isSignUpMode = !isSignUpMode;
        document.getElementById('auth-title').innerText = isSignUpMode ? "Create Account" : "Secure Access Required";
        document.getElementById('auth-btn').innerText = isSignUpMode ? "Register & Enter" : "Unlock Terminal";
        document.getElementById('auth-toggle').innerText = isSignUpMode ? "Back to Login" : "Need an account? Sign Up";
    }

    function handleAuth() {
        const u = document.getElementById('user-id').value.trim();
        const p = document.getElementById('user-pass').value.trim();
        if (!u || !p) return alert("Missing credentials");

        if (isSignUpMode) {
            localStorage.setItem("nexus_user_" + u, p);
            alert("Success!"); toggleAuthMode();
        } else {
            const saved = localStorage.getItem("nexus_user_" + u);
            if (saved === p || (u === "admin" && p === "nexus2026")) {
                document.getElementById('gatekeeper').style.display = 'none';
                const wrap = document.getElementById('terminal-wrapper');
                wrap.classList.remove('opacity-0', 'pointer-events-none');
                initTerminal();
            } else { alert("Access Denied"); }
        }
    }

    function initTerminal() {
        new TradingView.widget({ "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "60", "theme": "dark", "style": "1", "container_id": "tradingview_chart" });
        setInterval(updatePrice, 2000);
        setInterval(runAI, 10000);
        setInterval(updateWalletBalance, 60000);
        updatePrice(); runAI(); updateWalletBalance(); updateUI();
    }

    async function updatePrice() {
        try {
            const res = await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=BTCUSDT');
            const data = await res.json();
            const price = parseFloat(data.result.list[0].lastPrice);
            const el = document.getElementById('btc-price');
            if (lastPrice > 0) el.style.color = price >= lastPrice ? "#A4CD39" : "#ff4d4d";
            el.innerText = '$' + price.toLocaleString(undefined, {minimumFractionDigits: 2});
            lastPrice = price;
        } catch (e) { console.error("Ticker Fail"); }
    }

    async function updateWalletBalance() {
        const keys = JSON.parse(localStorage.getItem('user_api_keys'));
        if (!keys) return;
        try {
            const res = await fetch(proxyUrl, { method: 'POST', headers: { 'x-api-key': keys.key, 'x-api-secret': keys.secret } });
            const data = await res.json();
            if (data.result && data.result.list) {
                const acc = data.result.list[0];
                document.getElementById('total-equity').innerText = parseFloat(acc.totalEquity || 0).toFixed(2);
                const listDiv = document.getElementById('asset-list');
                listDiv.innerHTML = '';
                acc.coin.forEach(c => {
                    const b = parseFloat(c.walletBalance);
                    if (c.coin === "USDT") document.getElementById('wallet-balance').innerText = b.toFixed(2);
                    if (b > 0) {
                        listDiv.innerHTML += `<div class="flex justify-between items-center border-b border-gray-900 pb-2 mb-2">
                            <div><p class="text-xs font-black text-white">${c.coin}</p><p class="text-[9px] text-gray-500 font-mono">${b.toFixed(4)}</p></div>
                            <div class="text-right"><p class="text-xs text-[#A4CD39] font-black font-mono">$${parseFloat(c.usdValue || 0).toFixed(2)}</p></div>
                        </div>`;
                    }
                });
            }
        } catch (e) { console.error("Balance Sync Fail"); }
    }

    function runAI() {
        const signals = [
            {p:"BTC/USDT", pat:"Bullish Divergence", pr:94, n:"RSI confirmed trend reversal.", type:"BULL"},
            {p:"SOL/USDT", pat:"Double Bottom", pr:88, n:"Testing key support level.", type:"BULL"},
            {p:"ETH/USDT", pat:"Rising Wedge", pr:72, n:"Volume dropping, prepare for volatility.", type:"BEAR"}
        ];
        const s = signals[Math.floor(Math.random() * signals.length)];
        const color = s.type === "BULL" ? "#A4CD39" : "#ff4d4d";
        document.getElementById('ai-content').innerHTML = `
            <div class="space-y-3">
                <div class="flex justify-between items-center">
                    <span class="font-black text-white text-xs">${s.p}</span>
                    <span class="text-[8px] font-bold px-2 py-0.5 rounded bg-black/40" style="color: ${color}">${s.pr}% CONFIDENCE</span>
                </div>
                <div class="h-1 w-full bg-gray-800 rounded-full overflow-hidden">
                    <div class="h-full transition-all duration-1000" style="width: ${s.pr}%; background-color: ${color}"></div>
                </div>
                <div class="text-[9px] uppercase font-bold text-purple-300">${s.pat}</div>
                <p class="text-[10px] text-gray-400 leading-tight">"${s.n}"</p>
            </div>`;
    }

    function toggleApiModal() { document.getElementById('api-modal').classList.toggle('hidden'); }
    function saveApiKeys() {
        const key = document.getElementById('ex-key').value.trim();
        const secret = document.getElementById('ex-secret').value.trim();
        if (!key || !secret) return;
        localStorage.setItem('user_api_keys', JSON.stringify({ key, secret }));
        toggleApiModal(); updateWalletBalance(); updateUI();
    }
    function updateUI() {
        if (localStorage.getItem('user_api_keys')) {
            const btn = document.getElementById('api-status-btn');
            btn.innerText = "BYBIT LINKED ✅"; btn.classList.replace('bg-[#00ADEF]', 'bg-[#A4CD39]');
            btn.style.color = "black";
        }
    }
</script>
</body>
</html>
