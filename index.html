<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ExNexus | Institutional Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-black text-gray-300 text-[11px] overflow-hidden">

    <div class="h-screen flex flex-col">
        <header class="h-10 border-b border-[#1c2024] flex items-center px-4 bg-[#0a0e12] justify-between shrink-0">
            <div class="flex items-center gap-6">
                <span class="text-sm font-black text-white"><span class="text-[#00b15d]">Ex</span>Nexus</span>
                <nav class="flex gap-4 font-bold text-gray-500 uppercase text-[9px]">
                    <span class="text-white border-b border-[#00b15d] pb-1 cursor-pointer">Trade</span>
                    <span class="hover:text-white cursor-pointer">Markets</span>
                    <span class="hover:text-white cursor-pointer">History</span>
                </nav>
            </div>
            <div class="text-[9px] font-bold text-[#00b15d] uppercase tracking-tighter">● PRO TERMINAL ACTIVE</div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-56 border-r border-[#1c2024] bg-[#0a0e12] shrink-0 flex flex-col">
                <div class="p-2 border-b border-[#1c2024] text-[9px] uppercase font-bold text-gray-600">Order Book</div>
                <div class="flex-1 p-2 space-y-1 overflow-hidden font-mono text-[10px]">
                    <div class="flex justify-between text-red-500/80"><span>71,085.50</span><span>0.421</span></div>
                    <div class="flex justify-between text-red-500/80"><span>71,084.00</span><span>1.105</span></div>
                    <div class="text-center py-4 text-white font-bold text-lg border-y border-[#1c2024] my-2">71,048.00 ↑</div>
                    <div class="flex justify-between text-[#00b15d]/80"><span>71,042.50</span><span>0.882</span></div>
                    <div class="flex justify-between text-[#00b15d]/80"><span>71,041.00</span><span>2.441</span></div>
                </div>
            </aside>

            <main class="flex-1 flex flex-col bg-black">
                <div id="tv-main-chart" class="flex-1 bg-black relative"></div>
                
                <div class="h-44 border-t border-[#1c2024] bg-[#0a0e12] p-3 shrink-0">
                    <div class="flex gap-4 text-[9px] font-bold text-gray-500 uppercase mb-4 border-b border-[#1c2024] pb-1">
                        <span class="text-white border-b border-[#00b15d] pb-1">Positions(0)</span>
                        <span>Open Orders(0)</span>
                        <span>History</span>
                    </div>
                    <div class="h-full flex items-center justify-center text-gray-700 font-bold uppercase tracking-widest text-[10px]">
                        Awaiting Market Data...
                    </div>
                </div>
            </main>

            <aside class="w-72 border-l border-[#1c2024] bg-[#0a0e12] p-4 shrink-0 flex flex-col">
                <div class="flex bg-black p-1 rounded border border-[#1c2024] mb-6">
                    <button class="flex-1 bg-[#00b15d] text-white py-2 rounded text-[10px] font-black uppercase">Buy</button>
                    <button class="flex-1 text-gray-500 py-2 rounded text-[10px] font-bold uppercase">Sell</button>
                </div>
                <div class="space-y-4 flex-1">
                    <div class="bg-black border border-[#1c2024] p-3 rounded">
                        <div class="flex justify-between items-center mb-1">
                            <span class="text-[8px] text-gray-600 uppercase font-black">Leverage</span>
                            <span class="text-[#00b15d] text-[9px] font-bold">100.00x</span>
                        </div>
                    </div>
                </div>
                <button class="w-full bg-[#00b15d] text-white py-4 rounded font-black text-[11px] uppercase tracking-widest shadow-[0_4px_25px_rgba(0,177,93,0.3)] mt-4">
                    Open Long Position
                </button>
            </aside>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
