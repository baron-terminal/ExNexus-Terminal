<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Full Institutional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #07090b; color: white; overflow: hidden; }
        .glass { background: rgba(15, 18, 22, 0.9); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.08); }
        .neon-glow { color: #A4CD39; text-shadow: 0 0 15px rgba(164, 205, 57, 0.4); }
        
        /* Floating AI Navigator Styling */
        #ai-navigator {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: linear-gradient(135deg, #A4CD39, #6a8d1e);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            z-index: 9999;
            box-shadow: 0 0 30px rgba(164, 205, 57, 0.4);
            transition: all 0.3s ease;
        }
        #ai-navigator:hover { transform: scale(1.1) rotate(10deg); }
    </style>
</head>
<body>

    <div id="ai-navigator" onclick="alert('AI Assistant: Scanning market sentiment...')">
        <svg class="w-8 h-8 text-black" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
        </svg>
    </div>

    <div class="flex h-screen w-full overflow-hidden bg-[#0b0e11]">
        <div class="flex-1 flex flex-col">
            <div class="h-14 border-b border-gray-800 flex items-center justify-between px-6 bg-black">
                <div class="flex items-center space-x-8">
                    <span class="text-[10px] font-black neon-glow tracking-widest uppercase">● EXNEXUS TERMINAL</span>
                    <div class="flex items-center space-x-6 border-l border-gray-800 pl-6">
                        <div class="text-[9px] font-mono"><span class="text-blue-400 font-black">NANSEN:</span> <span id="n-feed" class="text-gray-400 italic ml-1">Scanning Smart Money...</span></div>
                        <div class="text-[9px] font-mono"><span class="text-orange-400 font-black">COINGLASS:</span> <span id="c-feed" class="text-gray-400 italic ml-1">Syncing Liquidity...</span></div>
                    </div>
                </div>
                <div class="flex items-center space-x-6">
                    <div id="ticker" class="font-mono font-black text-[#A4CD39] text-sm tracking-tighter">$00,000.00</div>
                    <div class="h-4 w-[1px] bg-gray-800"></div>
                    <div class="text-[10px] font-black text-gray-400">NODE: BYBIT LIVE</div>
                </div>
            </div>

            <div class="flex-1 p-3 grid grid-cols-12 gap-3">
                
                <div class="col-span-8 h-[60vh] glass rounded-3xl overflow-hidden border border-gray-800 relative">
                    <div id="tradingview_widget" class="w-full h-full"></div>
                </div>

                <div class="col-span-4 flex flex-col space-y-3">
                    <div class="glass p-5 rounded-3xl bg-[#A4CD39]/5 border border-[#A4CD39]/20">
                        <span class="text-[9px] font-black text-gray-500 uppercase tracking-widest block mb-1">Portfolio Equity</span>
                        <div class="text-3xl font-black text-white tracking-tighter">$24,190.55</div>
                    </div>

                    <div class="glass p-6 rounded-3xl flex-1 border border-gray-800 flex flex-col">
                        <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-6">Trade Execution</h3>
                        <div class="flex bg-black/40 p-1 rounded-xl mb-6">
                            <button onclick="setSide('BUY')" id="buy-btn" class="flex-1 py-3 rounded-lg text-xs font-black transition-all bg-[#A4CD39] text-black">BUY</button>
                            <button onclick="setSide('SELL')" id="sell-btn" class="flex-1 py-3 rounded-lg text-xs font-black transition-all text-gray-500">SELL</button>
                        </div>
                        <input id="trade-qty" type="number" placeholder="QTY (USDT)" class="w-full bg-black/60 border border-gray-800 p-4 rounded-xl text-xs font-mono outline-none focus:border-[#A4CD39] mb-4">
                        <div class="grid grid-cols-4 gap-2 mb-6">
                            <button onclick="setPct(25)" class="bg-gray-900 py-2 rounded text-[9px] font-bold">25%</button>
                            <button onclick="setPct(50)" class="bg-gray-900 py-2 rounded text-[9px] font-bold">50%</button>
                            <button onclick="setPct(75)" class="bg-gray-900 py-2 rounded text-[9px] font-bold">75%</button>
                            <button onclick="setPct(100)" class="bg-gray-900 py-2 rounded text-[9px] font-bold underline">MAX</button>
                        </div>
                        <button id="exec-action" class="mt-auto w-full py-5 rounded-2xl bg-[#A4CD39] text-black font-black uppercase tracking-widest text-[11px] shadow-[0_0_20px_rgba(164,205,57,0.15)]">Confirm Execution</button>
                    </div>
                </div>

                <div class="col-span-12 h-[25vh] glass rounded-3xl border border-gray-800 p-6 overflow-hidden">
                    <h3 class="text-[10px] font-black text-gray-400 uppercase tracking-widest mb-4">Active Positions</h3>
                    <table class="w-full text-left">
                        <thead class="text-[8px] text-gray-600 uppercase border-b border-gray-800 font-bold">
                            <tr>
                                <th class="pb-3">Asset</th>
                                <th class="pb-3">Side</th>
                                <th class="pb-3">Entry</th>
                                <th class="pb-3">PnL</th>
                                <th class="pb-3 text-right">Liquidation</th>
                            </tr>
                        </thead>
                        <tbody class="text-[11px] font-mono text-gray-500">
                            <tr><td colspan="5" class="pt-8 text-center italic tracking-widest">NO OPEN INTEREST DETECTED</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        const equity = 24190.55;

        window.onload = function() {
            new TradingView.widget({
                "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15",
                "theme": "dark", "container_id": "tradingview_widget",
                "hide_top_toolbar": false, "allow_symbol_change": true
            });
            syncTerminal();
            setInterval(syncTerminal, 4000);
        };

        function setSide(s) {
            const b = document.getElementById('buy-btn'); const sl = document.getElementById('sell-btn');
            const act = document.getElementById('exec-action');
            if(s === 'BUY') {
                b.className = 'flex-1 py-3 rounded-lg text-xs font-black bg-[#A4CD39] text-black';
                sl.className = 'flex-1 py-3 rounded-lg text-xs font-black text-gray-500';
                act.style.backgroundColor = '#A4CD39'; act.innerText = 'Confirm Buy Order';
            } else {
                sl.className = 'flex-1 py-3 rounded-lg text-xs font-black bg-red-600 text-white';
                b.className = 'flex-1 py-3 rounded-lg text-xs font-black text-gray-500';
                act.style.backgroundColor = '#dc2626'; act.innerText = 'Confirm Sell Order';
            }
        }

        function setPct(p) { document.getElementById('trade-qty').value = Math.floor(equity * (p/100)); }

        async function syncTerminal() {
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('ticker').innerText = '$' + parseFloat(d.result.list[0].lastPrice).toLocaleString();
            } catch (e) {}
            
            const nData = ["Smart Money Longing SOL", "Whale Inflow: $25M USDT", "Exchange Reserve Low"];
            document.getElementById('n-feed').innerText = nData[Math.floor(Math.random()*nData.length)];
            document.getElementById('c-feed').innerText = "BTC L/S Ratio: 51.4%";
        }
    </script>
</body>
</html>
