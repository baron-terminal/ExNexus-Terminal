<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Unified Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-black text-gray-300 text-[11px] overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-black z-[500] flex items-center justify-center p-6">
        <div class="w-full max-w-sm p-10 bg-[#0a0e12] rounded-2xl border border-[#1c2024] shadow-2xl text-center">
            <div class="mb-8">
                <span class="text-4xl font-black tracking-tighter text-white"><span class="text-[#00b15d]">Ex</span>Nexus</span>
                <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-[0.4em]">Institutional Access</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="user-id" class="w-full bg-black border border-[#1c2024] p-3 rounded text-white focus:border-[#00b15d] outline-none mt-1" placeholder="Username">
                <input type="password" id="user-pass" class="w-full bg-black border border-[#1c2024] p-3 rounded text-white focus:border-[#00b15d] outline-none mt-1" placeholder="Password">
                <button onclick="authenticate()" class="w-full bg-[#00b15d] text-white py-4 rounded font-black text-[11px] uppercase tracking-widest shadow-[0_0_20px_rgba(0,177,93,0.2)] mt-4">Initialize Session</button>
            </div>
        </div>
    </div>

    <div id="terminal-screen" class="h-screen flex flex-col opacity-0 transition-opacity duration-500">
        <header class="h-10 border-b border-[#1c2024] flex items-center px-4 bg-[#0a0e12] justify-between">
            <div class="flex items-center gap-6">
                <span class="text-sm font-black tracking-tighter text-white"><span class="text-[#00b15d]">Ex</span>Nexus</span>
                <nav class="flex gap-4 font-bold text-gray-500">
                    <span class="text-white border-b border-[#00b15d] pb-1 cursor-pointer">Trade</span>
                    <span class="hover:text-white cursor-pointer">Layout</span>
                </nav>
            </div>
            <div class="flex items-center gap-4 text-[10px] font-bold text-[#00b15d]">
                ● SYSTEM ACTIVE
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <aside class="w-56 border-r border-[#1c2024] bg-[#0a0e12] shrink-0">
                <div class="p-2 border-b border-[#1c2024] text-[9px] uppercase font-bold text-gray-600 tracking-wider">Order Book</div>
                <div class="text-lg font-bold text-[#00b15d] text-center py-6">71,048.00 ↑</div>
            </aside>

            <div class="flex-1 flex flex-col bg-black">
                <div id="tv-layout-grid" class="flex-1 grid grid-cols-2 grid-rows-2 gap-[1px] bg-[#1c2024]">
                    </div>
                <div class="h-44 border-t border-[#1c2024] bg-[#0a0e12] p-2">
                    <div class="flex gap-4 text-[9px] font-bold text-gray-500 uppercase">
                        <span class="text-white border-b border-[#00b15d] pb-1">Positions(0)</span>
                        <span>Orders(0)</span>
                    </div>
                </div>
            </div>

            <aside class="w-72 border-l border-[#1c2024] bg-[#0a0e12] p-4 shrink-0">
                <div class="flex bg-black p-1 rounded border border-[#1c2024] mb-6">
                    <button class="flex-1 bg-[#00b15d] text-white py-2 rounded text-[10px] font-black uppercase">Buy</button>
                    <button class="flex-1 text-gray-500 py-2 rounded text-[10px] font-bold uppercase">Sell</button>
                </div>
                <div class="space-y-4">
                    <div class="bg-black border border-[#1c2024] p-3 rounded">
                        <div class="text-[8px] text-gray-600 uppercase font-black mb-1">Market Price</div>
                        <div class="text-white font-mono text-xs">71048.00</div>
                    </div>
                    <button class="w-full bg-[#00b15d] text-white py-4 rounded font-black text-[11px] uppercase tracking-widest shadow-[0_4px_25px_rgba(0,177,93,0.2)]">Open Long / Buy</button>
                </div>
            </aside>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="app.js"></script>
</body>
</html>
