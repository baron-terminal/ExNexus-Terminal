<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Trading Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        
        body { 
            background-color: #000; 
            color: #fff; 
            font-family: 'Inter', sans-serif; 
            overflow: hidden; 
            height: 100vh; 
            margin: 0; 
        }

        .hidden { display: none; }

        /* THE LOGO FIX: Standardizing the container to prevent 'X' squeezing */
        .brand-frame { 
            width: 320px; 
            height: 220px; 
            margin: 0 auto; 
            display: block; 
        }

        /* Brand Colors */
        .ex-green { fill: #00b15d; font-weight: 800; font-size: 34px; }
        .nexus-white { fill: #ffffff; font-weight: 800; font-size: 34px; }
        .blue-glow { 
            stroke: #00b1ff; 
            stroke-width: 2; 
            filter: drop-shadow(0 0 8px #00b1ff); 
        }
        .tagline { 
            fill: #848e9c; 
            font-size: 10px; 
            text-transform: uppercase; 
            letter-spacing: 0.45em; 
        }

        /* Layout Tweaks */
        .terminal-bg { background-color: #0a0e12; }
        .border-gray { border-color: #2d343b; }

        /* TradingView Container */
        #tradingview_widget { 
            height: 100%; 
            width: 100%; 
            position: absolute; 
            inset: 0; 
        }
    </style>
</head>
<body>

    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-black p-4">
        <div class="w-full max-w-md p-10 terminal-bg rounded-3xl border border-gray text-center shadow-2xl">
            
            <div class="brand-frame">
                <svg viewBox="0 0 300 200" preserveAspectRatio="xMidYMid meet" xmlns="http://www.w3.org/2000/svg">
                    <g transform="translate(110, 20)">
                        <path d="M40 0 L80 85 L60 85 L20 0 Z" fill="#e5e7eb" /> 
                        <path d="M0 0 L40 85 L20 85 L-20 0 Z" fill="#ffffff"/> 
                        <path d="M20 42 L40 80 L60 80 L40 42 Z" fill="#00b1ff"/>
                        <path d="M20 42 L0 80 L-20 80 L0 42 Z" fill="#00b15d"/>
                    </g>
                    <text x="150" y="145" text-anchor="middle">
                        <tspan class="ex-green">Ex</tspan><tspan class="nexus-white">Nexus</tspan>
                    </text>
                    <line x1="35" y1="165" x2="265" y2="165" class="blue-glow" />
                    <text x="150" y="188" text-anchor="middle" class="tagline">Trading Intelligence</text>
                </svg>
            </div>

            <div class="space-y-4 mt-6">
                <input type="email" class="w-full bg-black border border-gray p-4 rounded-xl text-white outline-none focus:border-[#00b1ff] transition-all" placeholder="License Email">
                <input type="password" class="w-full bg-black border border-gray p-4 rounded-xl text-white outline-none focus:border-[#00b15d] transition-all" placeholder="Password">
                <button onclick="launchTerminal()" class="w-full bg-[#00b15d] hover:bg-[#008f4c] text-white font-bold py-4 rounded-xl uppercase tracking-widest transition-all shadow-lg shadow-green-900/20 mt-2">
                    Initialize Terminal
                </button>
            </div>
        </div>
    </div>

    <div id="terminal-screen" class="h-screen flex flex-col hidden">
        <header class="h-14 border-b border-gray flex items-center px-6 justify-between terminal-bg">
            <div class="flex items-center gap-2">
                <span class="text-[#00b15d] font-extrabold text-xl">Ex</span>
                <span class="text-white font-extrabold text-xl">Nexus</span>
            </div>
            <div class="flex items-center gap-4 text-xs font-semibold text-[#848e9c]">
                <span class="flex items-center gap-1"><i data-lucide="activity" class="w-3 h-3 text-[#00b15d]"></i> SYSTEM LIVE</span>
                <span class="px-3 py-1 bg-black rounded-md border border-gray">BTC/USDT</span>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <nav class="w-14 border-r border-gray flex flex-col items-center py-6 bg-black gap-8">
                <i data-lucide="layout-dashboard" class="text-[#00b15d] w-6 h-6 cursor-pointer"></i>
                <i data-lucide="trending-up" class="text-[#848e9c] w-6 h-6 cursor-pointer hover:text-white transition-colors"></i>
                <i data-lucide="layers" class="text-[#848e9c] w-6 h-6 cursor-pointer hover:text-white transition-colors"></i>
                <div class="mt-auto">
                    <i data-lucide="settings" class="text-[#848e9c] w-6 h-6 cursor-pointer hover:text-white transition-colors"></i>
                </div>
            </nav>

            <section class="flex-1 relative bg-black">
                <div id="tradingview_widget"></div>
            </section>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Start Lucide Icons
        lucide.createIcons();

        function launchTerminal() {
            // Screen Switch
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('terminal-screen').classList.remove('hidden');
            
            // Initialize TradingView
            new TradingView.widget({
                "autosize": true,
                "symbol": "BYBIT:BTCUSDT",
                "interval": "60",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "toolbar_bg": "#0a0e12",
                "enable_publishing": false,
                "hide_top_toolbar": false,
                "allow_symbol_change": true,
                "container_id": "tradingview_widget"
            });

            // Re-render icons for the terminal screen
            lucide.createIcons();
        }
    </script>
</body>
</html>
