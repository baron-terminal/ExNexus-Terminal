<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Institutional</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-black text-gray-300 overflow-hidden">

    <div id="login-screen" class="fixed inset-0 bg-black z-[999] flex items-center justify-center p-6">
        <div class="w-full max-w-sm p-10 bg-[#0a0e12] rounded-2xl border border-[#1c2024] text-center">
            <div class="mb-8">
                <span class="text-4xl font-black tracking-tighter text-white"><span class="text-[#00b15d]">Ex</span>Nexus</span>
                <p class="text-[10px] text-gray-500 mt-2 uppercase tracking-[0.4em]">Institutional Access</p>
            </div>
            <div class="space-y-4">
                <input type="text" id="user-id" class="w-full bg-black border border-[#1c2024] p-3 rounded text-white focus:border-[#00b15d] outline-none" placeholder="Username">
                <input type="password" id="user-pass" class="w-full bg-black border border-[#1c2024] p-3 rounded text-white focus:border-[#00b15d] outline-none" placeholder="Password">
                <button onclick="authenticate()" class="w-full bg-[#00b15d] text-white py-4 rounded font-black text-[11px] uppercase tracking-widest shadow-[0_0_20px_rgba(0,177,93,0.3)]">Initialize Session</button>
            </div>
        </div>
    </div>

    <div id="terminal-screen" class="h-screen flex flex-col" style="display: none;">
        <header class="h-10 border-b border-[#1c2024] flex items-center px-4 bg-[#0a0e12] justify-between">
            <span class="text-sm font-black tracking-tighter text-white"><span class="text-[#00b15d]">Ex</span>Nexus</span>
            <div class="text-[10px] font-bold text-[#00b15d]">● SYSTEM ACTIVE</div>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <div id="tv-layout-grid" class="flex-1 grid grid-cols-2 grid-rows-2 gap-[1px] bg-[#1c2024]">
                <div id="tv-c1" class="bg-black"></div>
                <div id="tv-c2" class="bg-black"></div>
                <div id="tv-c3" class="bg-black"></div>
                <div id="tv-c4" class="bg-black"></div>
            </div>
            <aside class="w-72 border-l border-[#1c2024] bg-[#0a0e12] p-4">
                <button class="w-full bg-[#00b15d] text-white py-4 rounded font-black text-xs uppercase shadow-[0_4px_25px_rgba(0,177,93,0.2)]">Open Long / Buy</button>
            </aside>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
