<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Institutional Development</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #07090b; color: white; overflow: hidden; }
        .glass { background: rgba(15, 18, 22, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-glow { color: #A4CD39; text-shadow: 0 0 15px rgba(164, 205, 57, 0.4); }
    </style>
</head>
<body>

    <div class="flex h-screen w-full overflow-hidden bg-[#0b0e11]">
        <div class="w-20 border-r border-gray-800 flex flex-col items-center py-10 space-y-12 bg-black/40">
            <div class="w-12 h-12 rounded bg-[#A4CD39]/10 flex items-center justify-center border border-[#A4CD39]/30">
                <div class="w-5 h-5 bg-[#A4CD39] rounded-sm animate-pulse"></div>
            </div>
            <div class="flex flex-col space-y-10">
                <div title="Nansen Smart Money" class="text-blue-500 cursor-pointer hover:scale-110 transition-transform">
                    <svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
                </div>
                <div title="Coinglass Data" class="text-orange-500 cursor-pointer hover:scale-110 transition-transform">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                </div>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <div class="h-16 border-b border-gray-800 flex items-center justify-between px-8 bg-black/60">
                <div class="flex items-center space-x-10">
                    <span class="text-[11px] font-black neon-glow tracking-widest uppercase">● EXNEXUS LIVE</span>
                    <span class="text-[11px] font-black text-blue-400 tracking-widest uppercase animate-pulse">● NANSEN FEED ACTIVE</span>
                </div>
                <div id="btc-price" class="font-mono font-black text-lg text-[#A4CD39] tracking-tighter">$00,000.00</div>
            </div>

            <div class="flex-1 p-6 grid grid-cols-12 gap-6">
                <div class="col-span-9 h-full glass rounded-3xl overflow-hidden border border-gray-800">
                    <div id="tradingview_widget" class="w-full h-full"></div>
                </div>

                <div class="col-span-3 space-y-6">
                    <div class="glass p-6 rounded-3xl border-l-4 border-blue-500 bg-blue-500/5">
                        <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest block mb-3">Nansen Intelligence</span>
                        <div id="nansen-feed" class="text-xs font-mono text-blue-100 italic">Scanning on-chain whale activity...</div>
                    </div>

                    <div class="glass p-6 rounded-3xl border-l-4 border-orange-500 bg-orange-500/5">
                        <span class="text-[10px] font-black text-orange-400 uppercase tracking-widest block mb-3">Coinglass Liquidations</span>
                        <div id="coinglass-feed" class="text-xs font-mono text-orange-100 italic">Calculating OI and liquidation heatmaps...</div>
                    </div>

                    <div class="glass p-8 rounded-3xl bg-[#A4CD39]/5">
                        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-2">Available Equity</span>
                        <div class="text-4xl font-black text-white tracking-tighter">$24,190.55</div>
                        <div class="mt-2 text-[10px] font-bold text-[#A4CD39]">NODE CONNECTED: BYBIT</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Automatic Initialization (No Login Required)
        window.onload = function() {
            new TradingView.widget({
                "autosize": true,
                "symbol": "BYBIT:BTCUSDT",
                "interval": "15",
                "timezone": "Etc/UTC",
                "theme": "dark",
                "style": "1",
                "locale": "en",
                "container_id": "tradingview_widget"
            });
            
            setInterval(fetchRealTimeData, 5000);
            fetchRealTimeData();
        };

        async function fetchRealTimeData() {
            try {
                const response = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const data = await response.json();
                const price = parseFloat(data.result.list[0].lastPrice);
                document.getElementById('btc-price').innerText = '$' + price.toLocaleString();
            } catch (error) {
                console.error("API Sync Error:", error);
            }

            // Intelligence Feed Mock Logic
            const nansenAlerts = ["Smart Money buying ETH at support", "Whale wallet move: +$14.2M USDT", "Institutional buy wall at $72.5k"];
            const coinAlerts = ["$8.4M Shorts Liquidated (5m)", "L/S Ratio: 52.1% Long", "Open Interest rising +1.2%"];
            
            document.getElementById('nansen-feed').innerText = nansenAlerts[Math.floor(Math.random() * nansenAlerts.length)];
            document.getElementById('coinglass-feed').innerText = coinAlerts[Math.floor(Math.random() * coinAlerts.length)];
        }
    </script>
</body>
</html>
