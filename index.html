<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus Terminal | Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #07090b; color: white; overflow: hidden; }
        .glass { background: rgba(15, 18, 22, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-text { text-shadow: 0 0 10px rgba(164, 205, 57, 0.5); }
        .indicator-dot { height: 6px; width: 6px; border-radius: 50%; display: inline-block; margin-right: 6px; }
    </style>
</head>
<body>

    <div id="gatekeeper" class="fixed inset-0 z-[9999] bg-[#07090b] flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-sm space-y-8">
            <h1 class="text-4xl font-black tracking-tighter neon-text" style="color: #A4CD39;">EXNEXUS <span class="text-white">TERMINAL</span></h1>
            <div class="space-y-4">
                <input id="user-id" type="text" placeholder="OPERATOR ID" class="w-full bg-black/50 border border-gray-800 p-4 rounded text-sm font-mono focus:border-[#A4CD39] outline-none">
                <input id="user-pass" type="password" placeholder="ACCESS KEY" class="w-full bg-black/50 border border-gray-800 p-4 rounded text-sm font-mono focus:border-[#A4CD39] outline-none">
                <button onclick="handleAuth()" class="w-full bg-[#A4CD39] text-black font-black py-4 rounded hover:opacity-90 uppercase tracking-widest text-xs">Authorize Link</button>
            </div>
            <p class="text-[10px] text-gray-600 font-mono italic uppercase tracking-[0.2em]">Encrypted Quantum Link Active</p>
        </div>
    </div>

    <div id="terminal-wrapper" class="flex h-screen w-full overflow-hidden bg-[#0b0e11] absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-700">
        <div class="w-16 border-r border-gray-800 flex flex-col items-center py-6 space-y-8 bg-black/20">
            <div class="w-8 h-8 rounded bg-[#A4CD39]/10 flex items-center justify-center border border-[#A4CD39]/30">
                <div class="w-4 h-4 bg-[#A4CD39] rounded-sm animate-pulse"></div>
            </div>
            <div class="space-y-6 pt-4">
                <button title="Nansen Smart Money" class="text-gray-500 hover:text-blue-400 transition-colors"><svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg></button>
                <button title="Coinglass Liquidations" class="text-gray-500 hover:text-orange-500 transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></button>
                <button onclick="toggleApiModal()" class="text-gray-500 hover:text-[#A4CD39] transition-colors"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6V4m0 2a2 2 0 100 4m0-4a2 2 0 110 4m-6 8a2 2 0 100-4m0 4v2m0-6V4m6 6v10m6-2a2 2 0 100-4m0 4v2"></path></svg></button>
            </div>
        </div>

        <div class="flex-1 flex flex-col overflow-hidden">
            <div class="h-14 border-b border-gray-800 flex items-center justify-between px-6 bg-black/40">
                <div class="flex items-center space-x-6">
                    <div class="flex items-center"><span class="indicator-dot bg-[#A4CD39]"></span><span class="text-[10px] font-bold text-gray-400 uppercase">System: Online</span></div>
                    <div class="flex items-center"><span class="indicator-dot bg-blue-500"></span><span class="text-[10px] font-bold text-gray-400 uppercase">Nansen: Linked</span></div>
                </div>
                <div id="btc-price" class="font-mono font-bold text-sm text-[#A4CD39]">$00,000.00</div>
            </div>

            <div class="flex-1 p-4 grid grid-cols-12 gap-4">
                <div class="col-span-12 lg:col-span-9 h-full glass rounded-xl overflow-hidden border border-gray-800">
                    <div id="tradingview_widget" class="w-full h-full"></div>
                </div>

                <div class="col-span-12 lg:col-span-3 space-y-4 overflow-y-auto">
                    <div class="glass p-4 rounded-xl border-t-2 border-blue-500">
                        <h3 class="text-[10px] font-black text-blue-400 uppercase tracking-widest mb-3">Nansen Intelligence</h3>
                        <div id="nansen-feed" class="space-y-3 text-[11px]">
                            <p class="text-gray-400">Scanning Smart Money flows...</p>
                        </div>
                    </div>

                    <div class="glass p-4 rounded-xl border-t-2 border-orange-500">
                        <h3 class="text-[10px] font-black text-orange-400 uppercase tracking-widest mb-3">Coinglass Data</h3>
                        <div id="coinglass-feed" class="space-y-3 text-[11px]">
                            <p class="text-gray-400">Monitoring Liquidations...</p>
                        </div>
                    </div>

                    <div class="glass p-4 rounded-xl">
                        <div class="flex justify-between items-center mb-2">
                            <span class="text-[10px] font-black text-gray-500 uppercase">Equity</span>
                            <span id="api-indicator" class="text-[9px] text-red-500">UNLINKED</span>
                        </div>
                        <div id="wallet-balance" class="text-2xl font-black tracking-tighter">$0.00</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="api-modal" class="hidden fixed inset-0 bg-black/95 backdrop-blur-md flex items-center justify-center z-[100] p-6">
        <div class="glass p-8 rounded-2xl w-full max-w-md space-y-6">
            <h2 class="text-xl font-black uppercase">Bybit API Link</h2>
            <div class="space-y-4">
                <input id="ex-key" type="text" placeholder="API KEY" class="w-full bg-black/40 border border-gray-800 p-3 rounded text-xs font-mono">
                <input id="ex-secret" type="password" placeholder="API SECRET" class="w-full bg-black/40 border border-gray-800 p-3 rounded text-xs font-mono">
                <button onclick="saveApiKeys()" class="w-full bg-[#A4CD39] text-black font-bold py-3 rounded text-xs uppercase">Save Securely</button>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function handleAuth() {
            const u = document.getElementById('user-id').value;
            const p = document.getElementById('user-pass').value;
            if (u === "admin" && p === "nexus2026") {
                document.getElementById('gatekeeper').style.display = 'none';
                const wrap = document.getElementById('terminal-wrapper');
                wrap.classList.remove('opacity-0', 'pointer-events-none');
                initTerminal();
            } else { alert("ACCESS DENIED"); }
        }

        function initTerminal() {
            new TradingView.widget({
                "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15",
                "theme": "dark", "container_id": "tradingview_widget"
            });
            setInterval(updateData, 5000);
            updateData();
            updateWallet();
        }

        async function updateData() {
            // Update BTC Price
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('btc-price').innerText = '$' + parseFloat(d.result.list[0].lastPrice).toLocaleString();
            } catch(e) {}

            // Nansen Simulation
            const nan = ["Smart Money buying ETH dip", "Stablecoin inflows increasing", "Whale wallet 0x4f... active"];
            document.getElementById('nansen-feed').innerHTML = <p class="text-[#A4CD39] font-mono">● ${nan[Math.floor(Math.random()*nan.length)]}</p>;

            // Coinglass Simulation
            const cg = ["$42M Shorts Liquidated (1h)", "Long/Short Ratio: 51.2%", "Open Interest up 2.4%"];
            document.getElementById('coinglass-feed').innerHTML = <p class="text-orange-400 font-mono">● ${cg[Math.floor(Math.random()*cg.length)]}</p>;
        }

        function toggleApiModal() { document.getElementById('api-modal').classList.toggle('hidden'); }

        function saveApiKeys() {
            localStorage.setItem('nexus_api', 'linked');
            toggleApiModal();
            updateWallet();
        }

        function updateWallet() {
            if(localStorage.getItem('nexus_api')) {
                document.getElementById('api-indicator').innerText = "LINKED ✅";
                document.getElementById('api-indicator').style.color = "#A4CD39";
                document.getElementById('wallet-balance').innerText = "$14,502.88";
            }
        }
    </script>
</body>
</html>
