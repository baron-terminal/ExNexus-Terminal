<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Trading Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/lucide/0.263.0/lucide.min.css" rel="stylesheet">
    <style>
        body { background-color: #000000; color: #ffffff; font-family: sans-serif; overflow: hidden; height: 100vh; margin: 0; }
        .hidden { display: none; }
        
        /* LOGO PROTECTION: Locked Aspect Ratio */
        .brand-box {
            width: 300px;
            height: 200px;
            margin: 0 auto;
        }

        /* Exact Brand Colors from Image */
        .color-ex { fill: #00b15d; font-weight: 800; font-size: 32px; }
        .color-nexus { fill: #ffffff; font-weight: 800; font-size: 32px; }
        .color-tagline { fill: #848e9c; font-size: 10px; text-transform: uppercase; letter-spacing: 0.4em; }
        .blue-glow-line { stroke: #00b1ff; stroke-width: 2; filter: drop-shadow(0 0 6px #00b1ff); }

        #tradingview_widget { height: 100%; width: 100%; position: absolute; inset: 0; }
    </style>
</head>
<body>
    <div id="login-screen" class="min-h-screen flex items-center justify-center bg-[#000000] relative p-4">
        <div class="w-full max-w-md p-10 bg-[#0a0e12] rounded-2xl border border-[#2d343b] shadow-[0_0_50px_rgba(0,177,93,0.1)]">
            
            <div class="brand-box">
                <svg viewBox="0 0 300 200" preserveAspectRatio="xMidYMid meet">
                    <g transform="translate(105, 15)">
                        <path d="M45 0 L85 80 L65 80 L25 0 Z" fill="#e5e7eb" /> 
                        <path d="M5 0 L45 80 L25 80 L-15 0 Z" fill="#ffffff"/> 
                        <path d="M25 40 L45 75 L65 75 L45 40 Z" fill="#00b1ff"/>
                        <path d="M25 40 L5 75 L-15 75 L5 40 Z" fill="#00b15d"/>
                    </g>
                    <text x="150" y="140" text-anchor="middle">
                        <tspan class="color-ex">Ex</tspan><tspan class="color-nexus">Nexus</tspan>
                    </text>
                    <line x1="40" y1="158" x2="260" y2="158" class="blue-glow-line" />
                    <text x="150" y="180" text-anchor="middle" class="color-tagline">Trading Intelligence</text>
                </svg>
            </div>

            <div class="space-y-4 mt-2">
                <input type="email" class="w-full bg-[#000000] border border-[#2d343b] p-3 rounded text-white outline-none focus:border-[#00b1ff]" placeholder="Email">
                <input type="password" class="w-full bg-[#000000] border border-[#2d343b] p-3 rounded text-white outline-none focus:border-[#00b15d]" placeholder="Password">
                <button onclick="showTerminal()" class="w-full bg-[#00b15d] hover:bg-[#008f4c] text-white font-bold py-4 rounded-xl uppercase tracking-widest transition-all">Secure Entry</button>
            </div>
        </div>
    </div>

    <div id="terminal-screen" class="h-screen flex flex-col hidden">
        <header class="h-12 border-b border-[#2d343b] flex items-center px-4 justify-between bg-[#0a0e12]">
            <div class="flex items-center gap-2">
                <span class="text-[#00b15d] font-bold">Ex</span><span class="text-white font-bold">Nexus</span>
            </div>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <nav class="w-12 border-r border-[#2d343b] flex flex-col items-center py-4 bg-black">
                <i data-lucide="zap" class="text-white w-5 h-5"></i>
            </nav>
            <section class="flex-1 relative">
                <div id="tradingview_widget"></div>
            </section>
        </div>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        function showTerminal() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('terminal-screen').classList.remove('hidden');
            new TradingView.widget({
                "autosize": true,
                "symbol": "BYBIT:BTCUSDT",
                "theme": "dark",
                "container_id": "tradingview_widget"
            });
            lucide.createIcons();
        }
        lucide.createIcons();
    </script>
</body>
</html>
