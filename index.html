<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Locked Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        :root { --neon: #39FF14; --hot-red: #FF003F; --bg: #050505; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: white; overflow: hidden; height: 100vh; }
        .neon-text { color: var(--neon); text-shadow: 0 0 10px rgba(57, 255, 20, 0.3); }
        .hot-red-text { color: var(--hot-red); }
        .glass { background: rgba(15, 15, 15, 0.98); border: 1px solid rgba(255, 255, 255, 0.05); }
        
        /* Persistent Gemini Hub */
        #gemini-hub {
            position: fixed; bottom: 20px; right: 20px; width: 44px; height: 44px;
            background: linear-gradient(135deg, #4285f4, #9b72cb);
            border-radius: 12px; z-index: 9999; display: flex; align-items: center; justify-content: center;
            cursor: pointer; box-shadow: 0 0 20px rgba(66, 133, 244, 0.4);
        }
    </style>
</head>
<body class="flex flex-col">

    <header class="h-10 border-b border-gray-900 flex items-center justify-between px-4 bg-black">
        <div class="flex items-center space-x-4">
            <span class="text-base font-black tracking-tighter neon-text">EXNEXUS</span>
            <span class="text-[8px] font-bold text-gray-600 uppercase tracking-widest border-l border-gray-800 pl-4">Institutional Terminal</span>
        </div>
        <div class="flex items-center space-x-6 font-mono text-xs">
            <div id="ticker" class="neon-text font-black">$00,000.00</div>
            <div class="text-blue-500 text-[9px] font-bold">BYBIT:BTCUSDT</div>
        </div>
    </header>

    <div class="flex flex-1 overflow-hidden">
        <nav class="w-12 border-r border-gray-900 flex flex-col items-center py-4 space-y-6 bg-black">
            <div class="text-neon cursor-pointer"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
            <div class="text-gray-700 hover:text-white cursor-pointer"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg></div>
            <div class="text-gray-700 hover:text-white cursor-pointer"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M3 14h18m-9-4v8m-7 0h14a2 2 0 002-2V8a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg></div>
        </nav>

        <main class="flex-1 p-2 grid grid-cols-12 grid-rows-6 gap-2 h-full">
            <section id="chart-panel" class="col-span-9 row-span-4 glass rounded-lg overflow-hidden relative">
                <div class="absolute top-2 right-2 z-10">
                    <button onclick="toggleChart()" class="bg-black/80 border border-gray-700 text-[8px] font-black px-2 py-1 rounded hover:text-neon uppercase">Expand / Shrink</button>
                </div>
                <div id="tradingview_widget" class="w-full h-full"></div>
            </section>

            <aside id="manual-panel" class="col-span-3 row-span-4 flex flex-col space-y-2">
                <div class="glass p-3 rounded-lg">
                    <span class="text-[8px] text-gray-500 uppercase font-black">Total Equity</span>
                    <div class="text-lg font-black">$24,190.55</div>
                </div>

                <div class="glass p-3 rounded-lg flex-1 flex flex-col overflow-hidden">
                    <span class="text-[8px] text-gray-500 uppercase font-black mb-3">Manual Override</span>
                    <div class="grid grid-cols-2 gap-1 mb-4">
                        <button onclick="setMode('BUY')" id="buy-tab" class="py-2 rounded bg-neon text-black text-[10px] font-black uppercase shadow-[0_0_10px_rgba(57,255,20,0.2)]">Open Long</button>
                        <button onclick="setMode('SELL')" id="sell-tab" class="py-2 rounded bg-gray-900 text-gray-500 text-[10px] font-black uppercase">Open Short</button>
                    </div>
                    <div class="space-y-3">
                        <input type="number" placeholder="USDT Amount" class="w-full bg-black border border-gray-800 p-2 rounded text-xs outline-none focus:border-neon font-mono">
                        <div class="grid grid-cols-4 gap-1">
                            <button class="bg-gray-900 text-[8px] py-1 rounded">25%</button>
                            <button class="bg-gray-900 text-[8px] py-1 rounded">50%</button>
                            <button class="bg-gray-900 text-[8px] py-1 rounded">75%</button>
                            <button class="bg-gray-900 text-[8px] py-1 rounded border border-gray-700">MAX</button>
                        </div>
                    </div>
                    <button id="main-btn" class="mt-auto w-full py-3 rounded bg-neon text-black font-black uppercase text-[10px]">Confirm Long Market</button>
                </div>
            </aside>

            <section class="col-span-12 row-span-2 glass rounded-lg p-3 grid grid-cols-4 gap-4">
                <div class="border-r border-gray-900">
                    <h4 class="text-[8px] text-gray-500 uppercase font-black mb-2">Automation Node</h4>
                    <div class="space-y-1 font-mono text-[10px]">
                        <div class="flex justify-between"><span>RSI Status:</span> <span class="neon-text">Neutral</span></div>
                        <div class="flex justify-between"><span>MACD Signal:</span> <span class="hot-red-text">Short Divergence</span></div>
                        <div class="flex justify-between"><span>AI Engine:</span> <span class="text-blue-400">Scanning...</span></div>
                    </div>
                </div>
                <div class="col-span-3">
                    <h4 class="text-[8px] text-gray-500 uppercase font-black mb-2">Active Bybit Positions</h4>
                    <table class="w-full text-left text-[10px] font-mono">
                        <thead class="text-gray-600 border-b border-gray-900 text-[8px] uppercase">
                            <tr><th>Symbol</th><th>Side</th><th>PnL %</th><th>Entry</th></tr>
                        </thead>
                        <tbody class="text-gray-400">
                            <tr><td colspan="4" class="pt-4 text-center italic text-gray-600">Bot is scanning for entry triggers...</td></tr>
                        </tbody>
                    </table>
                </div>
            </section>
        </main>
    </div>

    <div id="gemini-hub" onclick="alert('Gemini AI: Monitoring market for 15m Trend Reversal...')">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="white"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z"/></svg>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        let expanded = false;
        const tvConfig = { "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15", "theme": "dark", "container_id": "tradingview_widget", "hide_top_toolbar": false, "allow_symbol_change": true };

        window.onload = () => { new TradingView.widget(tvConfig); sync(); setInterval(sync, 4000); };

        function toggleChart() {
            const chart = document.getElementById('chart-panel');
            const panel = document.getElementById('manual-panel');
            expanded = !expanded;
            if(expanded) { chart.classList.replace('col-span-9', 'col-span-12'); panel.classList.add('hidden'); }
            else { chart.classList.replace('col-span-12', 'col-span-9'); panel.classList.remove('hidden'); }
            new TradingView.widget(tvConfig);
        }

        function setMode(m) {
            const b = document.getElementById('buy-tab'); const s = document.getElementById('sell-tab'); const btn = document.getElementById('main-btn');
            if(m === 'BUY') {
                b.className = "py-2 rounded bg-neon text-black text-[10px] font-black uppercase";
                s.className = "py-2 rounded bg-gray-900 text-gray-500 text-[10px] font-black uppercase";
                btn.className = "mt-auto w-full py-3 rounded bg-neon text-black font-black uppercase text-[10px]";
                btn.innerText = "Confirm Long Market";
            } else {
                s.className = "py-2 rounded bg-[#FF003F] text-white text-[10px] font-black uppercase shadow-[0_0_10px_rgba(255,0,63,0.3)]";
                b.className = "py-2 rounded bg-gray-900 text-gray-500 text-[10px] font-black uppercase";
                btn.className = "mt-auto w-full py-3 rounded bg-[#FF003F] text-white font-black uppercase text-[10px]";
                btn.innerText = "Confirm Short Market";
            }
        }

        async function sync() {
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('ticker').innerText = '$' + parseFloat(d.result.list[0].lastPrice).toLocaleString();
            } catch(e){}
        }
    </script>
</body>
</html>
