<!DOCTYPE html>
<html lang="en" dir="ltr" id="html-root">
<head>

    <!-- PWA Support -->
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ExNexus">
    <meta name="theme-color" content="#44B828">
    <link rel="apple-touch-icon" href="/Icon.png">
<meta charset="UTF-8">
<script>
(function(){
    var host     = window.location.hostname;
    var ua       = navigator.userAgent.toLowerCase();
    var w        = window.innerWidth || screen.width;
    var isMobile = w <= 1024 || /android|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(ua);

    // exnexus.app → always go to terminal
    if(host === 'exnexus.app' || host === 'www.exnexus.app'){
        window.location.replace('terminal.html');
        return;
    }

    // Mobile/tablet on any domain → go to terminal
    if(isMobile && host !== 'localhost' && host !== '127.0.0.1'){
        window.location.replace('terminal.html');
        return;
    }

    // exnexus.co on desktop → show landing page (do nothing)
    // pages.dev on desktop → show landing page (do nothing)
})();
</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ExNexus | Trading Intelligence</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --neon:#44B828; --neon2:#5fd93a;
  --bg:#030303; --bg2:#080808; --bg3:#0f0f0f;
  --border:rgba(255,255,255,0.07); --border2:rgba(255,255,255,0.12);
  --text:#ffffff; --text-mid:rgba(255,255,255,0.65); --text-dim:rgba(255,255,255,0.38);
  --red:#FF003F; --gold:#F0B429; --blue:#4285f4; --purple:#9b72cb;
  --nav-h:64px;
}
[dir="rtl"] { font-family:'Syne',sans-serif; }
*{box-sizing:border-box;margin:0;padding:0;}
html{scroll-behavior:smooth;}
body{
  font-family:'DM Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
  font-size:15px;
  line-height:1.6;
}
a{text-decoration:none;color:inherit;}
button{cursor:pointer;font-family:inherit;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-thumb{background:#1e1e1e;border-radius:2px;}

/* ═══ LANGUAGE SWITCHER ═══ */
#lang-bar{
  height:36px;
  background:#050505;
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  justify-content:flex-end;
  padding:0 24px;
  gap:6px;
  font-size:12px;
  color:var(--text-dim);
}
.lang-btn{
  display:flex;align-items:center;gap:5px;
  padding:3px 10px;border-radius:4px;
  background:none;border:1px solid transparent;
  color:var(--text-dim);font-size:12px;
  transition:all .15s;cursor:pointer;
}
.lang-btn:hover{border-color:var(--border2);color:var(--text);}
.lang-btn.active{background:rgba(68,184,40,0.1);border-color:rgba(68,184,40,0.3);color:var(--neon);}
.lang-flag{font-size:14px;}
#lang-more-btn{
  padding:3px 10px;border-radius:4px;
  background:none;border:1px solid var(--border);
  color:var(--text-dim);font-size:11px;cursor:pointer;
  transition:all .15s;
}
#lang-more-btn:hover{border-color:var(--border2);color:var(--text);}
#lang-modal{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,0.7);z-index:9999;
  align-items:center;justify-content:center;
}
#lang-modal.open{display:flex;}
.lang-modal-box{
  background:#141414;border:1px solid var(--border2);
  border-radius:12px;padding:28px;width:min(600px,90vw);
  box-shadow:0 20px 60px rgba(0,0,0,0.8);
}
.lang-modal-title{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:20px;}
.lang-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:8px;}
.lang-option{
  display:flex;align-items:center;gap:8px;
  padding:10px 14px;border-radius:7px;
  background:rgba(255,255,255,0.04);border:1px solid var(--border);
  cursor:pointer;font-size:13px;transition:all .15s;
}
.lang-option:hover{background:rgba(255,255,255,0.08);border-color:var(--border2);}
.lang-option.active{background:rgba(68,184,40,0.08);border-color:rgba(68,184,40,0.25);color:var(--neon);}
.lang-modal-close{float:right;background:none;border:none;color:var(--text-dim);font-size:22px;cursor:pointer;margin-top:-4px;}

/* ═══ NAVBAR ═══ */
nav{
  position:sticky;top:0;z-index:1000;
  height:var(--nav-h);
  background:rgba(3,3,3,0.95);
  backdrop-filter:blur(20px);
  border-bottom:1px solid var(--border);
  display:flex;align-items:center;
  padding:0 24px;gap:0;
}
.nav-logo{
  display:flex;align-items:center;gap:0;
  margin-right:32px;flex-shrink:0;
}
.nav-logo img{height:44px;width:auto;}
.nav-links{display:flex;align-items:center;gap:2px;flex:1;}
.nav-item{
  position:relative;
  display:flex;align-items:center;gap:4px;
  padding:8px 14px;border-radius:6px;
  font-size:13.5px;font-weight:500;color:var(--text-mid);
  cursor:pointer;transition:color .15s,background .15s;
  white-space:nowrap;
  -webkit-tap-highlight-color:transparent;
}
.nav-item:hover{color:var(--text);background:rgba(255,255,255,0.05);}
.nav-item.active{color:var(--text);}
.nav-caret{font-size:10px;opacity:0.6;transition:transform .2s;}
.nav-item:hover .nav-caret{transform:rotate(180deg);}
/* Dropdown */
.nav-dropdown{
  position:absolute;top:calc(100% + 8px);left:0;
  min-width:260px;
  background:#111;border:1px solid var(--border2);
  border-radius:10px;padding:8px;
  opacity:0;pointer-events:none;
  transform:translateY(-6px);
  transition:opacity .18s,transform .18s;
  box-shadow:0 16px 40px rgba(0,0,0,0.7);
  z-index:100;
}
.nav-item:hover .nav-dropdown{opacity:1;pointer-events:all;transform:translateY(0);}
.dd-item{
  display:flex;align-items:flex-start;gap:12px;
  padding:10px 12px;border-radius:7px;cursor:pointer;
  transition:background .15s;
}
.dd-item:hover{background:rgba(255,255,255,0.06);}
.dd-icon{
  width:34px;height:34px;border-radius:8px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;font-size:16px;
}
.dd-text-title{font-size:13px;font-weight:600;color:var(--text);margin-bottom:1px;}
.dd-text-sub{font-size:11px;color:var(--text-dim);line-height:1.4;}
.dd-sep{height:1px;background:var(--border);margin:5px 0;}
.dd-badge{
  font-size:9px;font-weight:700;padding:1px 6px;border-radius:4px;
  background:rgba(68,184,40,0.15);color:var(--neon);
  margin-left:5px;text-transform:uppercase;letter-spacing:.05em;
}
/* Nav right */
.nav-right{display:flex;align-items:center;gap:10px;margin-left:auto;}
.btn-login{
  padding:7px 18px;border-radius:7px;
  background:none;border:1px solid var(--border2);
  color:var(--text-mid);font-size:13px;font-weight:500;
  transition:all .15s;
}
.btn-login:hover{border-color:rgba(255,255,255,0.25);color:var(--text);}
.btn-launch{
  padding:8px 22px;border-radius:7px;
  background:var(--neon);border:none;
  color:#000;font-size:13px;font-weight:700;
  transition:opacity .15s,transform .15s;
  font-family:'Syne',sans-serif;letter-spacing:.02em;
}
.btn-launch:hover{opacity:0.9;transform:translateY(-1px);}
/* Mobile nav toggle */
#mob-menu-btn{display:none;background:none;border:none;color:var(--text);padding:8px;}
#mob-menu{display:none;position:fixed;inset:0;top:calc(var(--nav-h) + 36px);background:#080808;z-index:999;overflow-y:auto;padding:16px;}
.mob-nav-item{padding:14px 16px;border-bottom:1px solid var(--border);font-size:15px;font-weight:500;color:var(--text-mid);cursor:pointer;}
.mob-nav-item:hover{color:var(--text);}

/* ═══ HERO ═══ */
#hero{
  min-height:calc(100vh - var(--nav-h) - 36px);
  display:grid;
  grid-template-columns:1fr 1fr;
  align-items:center;
  gap:40px;
  padding:80px 80px 80px 80px;
  max-width:1400px;
  margin:0 auto;
  position:relative;overflow:hidden;
  width:100%;
}
.hero-bg{
  position:absolute;inset:0;z-index:0;
  background:
    radial-gradient(ellipse 60% 50% at 70% 50%, rgba(68,184,40,0.06) 0%, transparent 70%),
    radial-gradient(ellipse 40% 60% at 20% 80%, rgba(66,133,244,0.04) 0%, transparent 60%);
}
.hero-grid-lines{
  position:absolute;inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:60px 60px;
  mask-image:radial-gradient(ellipse 80% 80% at 50% 50%, black 0%, transparent 100%);
}
.hero-content{position:relative;z-index:1;max-width:600px;}
.hero-badge{
  display:inline-flex;align-items:center;gap:7px;
  background:rgba(68,184,40,0.08);border:1px solid rgba(68,184,40,0.2);
  border-radius:20px;padding:5px 14px;
  font-size:12px;font-weight:600;color:var(--neon);
  margin-bottom:24px;letter-spacing:.04em;text-transform:uppercase;
}
.hero-badge-dot{width:6px;height:6px;border-radius:50%;background:var(--neon);animation:pulse 2s ease infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.5;transform:scale(1.3);}}
h1{
  font-family:'Syne',sans-serif;
  font-size:clamp(38px,5vw,68px);
  font-weight:800;
  line-height:1.05;
  letter-spacing:-0.02em;
  margin-bottom:20px;
}
h1 .accent{color:var(--neon);}
.hero-sub{
  font-size:17px;color:var(--text-mid);
  line-height:1.65;margin-bottom:36px;
  max-width:480px;
}
.hero-btns{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:44px;}
.btn-primary{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;border-radius:8px;
  background:var(--neon);border:none;
  color:#000;font-size:14px;font-weight:700;
  font-family:'Syne',sans-serif;letter-spacing:.02em;
  transition:all .2s;
}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 24px rgba(68,184,40,0.3);}
.btn-secondary{
  display:inline-flex;align-items:center;gap:8px;
  padding:13px 28px;border-radius:8px;
  background:rgba(255,255,255,0.06);border:1px solid var(--border2);
  color:var(--text);font-size:14px;font-weight:500;
  transition:all .2s;
}
.btn-secondary:hover{background:rgba(255,255,255,0.1);transform:translateY(-1px);}
.hero-stats{display:flex;gap:32px;flex-wrap:wrap;}
.hero-stat-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:700;color:var(--text);}
.hero-stat-lbl{font-size:12px;color:var(--text-dim);margin-top:1px;}
/* Hero right — live price cards */
.hero-right{
  display:grid;grid-template-columns:1fr 1fr;gap:12px;
  z-index:1;
  position:relative;
}
.price-card{
  background:rgba(255,255,255,0.04);
  border:1px solid var(--border2);
  border-radius:12px;padding:16px 18px;
  min-width:150px;
  backdrop-filter:blur(10px);
  transition:transform .2s,border-color .2s;
  cursor:default;
}
.price-card:hover{transform:translateY(-3px);border-color:rgba(255,255,255,0.2);}
.price-card-sym{font-size:13px;font-weight:600;color:var(--text-mid);margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.price-card-icon{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;}
.price-card-price{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:3px;}
.price-card-chg{font-size:12px;font-weight:600;}
.price-card-chg.pos{color:var(--neon);}
.price-card-chg.neg{color:var(--red);}

/* ═══ SECTIONS ═══ */
section{padding:100px 24px;max-width:1200px;margin:0 auto;}
.section-full{max-width:100%;padding:100px 0;}
.section-tag{
  display:inline-flex;align-items:center;gap:6px;
  font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;
  color:var(--neon);margin-bottom:14px;
}
h2{
  font-family:'Syne',sans-serif;
  font-size:clamp(28px,3.5vw,46px);
  font-weight:800;letter-spacing:-0.02em;
  line-height:1.1;margin-bottom:16px;
}
.section-sub{
  font-size:17px;color:var(--text-mid);
  max-width:560px;line-height:1.65;margin-bottom:56px;
}
/* Divider */
.divider{
  height:1px;
  background:linear-gradient(90deg,transparent,var(--border2),transparent);
  margin:0;
}

/* ═══ FEATURES GRID ═══ */
.features-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(300px,1fr));
  gap:16px;
}
.feat-card{
  background:var(--bg3);
  border:1px solid var(--border);
  border-radius:14px;
  padding:28px;
  transition:border-color .2s,transform .2s;
  position:relative;overflow:hidden;
}
.feat-card::before{
  content:'';position:absolute;inset:0;
  background:linear-gradient(135deg,rgba(68,184,40,0.04) 0%,transparent 60%);
  opacity:0;transition:opacity .3s;
}
.feat-card:hover{border-color:rgba(68,184,40,0.25);transform:translateY(-3px);}
.feat-card:hover::before{opacity:1;}
.feat-icon{
  width:44px;height:44px;border-radius:11px;
  display:flex;align-items:center;justify-content:center;
  margin-bottom:18px;font-size:20px;
}
.feat-title{font-family:'Syne',sans-serif;font-size:17px;font-weight:700;margin-bottom:8px;}
.feat-desc{font-size:14px;color:var(--text-mid);line-height:1.6;}
.feat-tag{
  display:inline-flex;align-items:center;gap:4px;
  margin-top:14px;font-size:10px;font-weight:700;
  text-transform:uppercase;letter-spacing:.08em;
  padding:3px 9px;border-radius:5px;
}

/* ═══ INTELLIGENCE SECTION ═══ */
.intel-grid{
  display:grid;grid-template-columns:1fr 1fr;gap:16px;
}
.intel-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:14px;padding:28px;
  display:flex;gap:20px;align-items:flex-start;
  transition:all .2s;
}
.intel-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-2px);}
.intel-card-icon{
  width:48px;height:48px;border-radius:12px;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;font-size:22px;
}
.intel-card-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;}
.intel-card-sub{font-size:13px;color:var(--text-mid);line-height:1.55;margin-bottom:10px;}
.intel-card-tags{display:flex;flex-wrap:wrap;gap:5px;}
.intel-tag{
  font-size:10px;padding:2px 8px;border-radius:4px;
  background:rgba(255,255,255,0.06);border:1px solid var(--border);
  color:var(--text-dim);
}

/* ═══ BOTS SECTION ═══ */
.bots-grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
  gap:14px;
}
.bot-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:14px;padding:24px;
  position:relative;overflow:hidden;transition:all .2s;
}
.bot-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-3px);}
.bot-card.featured{border-color:rgba(68,184,40,0.25);background:linear-gradient(135deg,rgba(68,184,40,0.05),var(--bg3));}
.bot-status{
  position:absolute;top:16px;right:16px;
  font-size:9px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;padding:3px 8px;border-radius:4px;
}
.bot-status.live{background:rgba(68,184,40,0.12);color:var(--neon);border:1px solid rgba(68,184,40,0.2);}
.bot-status.soon{background:rgba(255,255,255,0.06);color:var(--text-dim);border:1px solid var(--border);}
.bot-icon{font-size:28px;margin-bottom:14px;}
.bot-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;margin-bottom:6px;}
.bot-desc{font-size:13px;color:var(--text-mid);line-height:1.55;margin-bottom:14px;}
.bot-stats{display:flex;gap:14px;}
.bot-stat{font-size:11px;color:var(--text-dim);}
.bot-stat b{color:var(--text);font-weight:600;}

/* ═══ ARB SECTION ═══ */
.arb-visual{
  background:var(--bg3);border:1px solid var(--border2);
  border-radius:16px;padding:32px;
  display:grid;grid-template-columns:1fr auto 1fr;
  gap:20px;align-items:center;
  margin-bottom:32px;
}
.arb-exch{text-align:center;}
.arb-exch-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:4px;}
.arb-exch-price{font-size:28px;font-weight:300;font-family:'Syne',sans-serif;}
.arb-exch-price.buy{color:var(--neon);}
.arb-exch-price.sell{color:var(--red);}
.arb-arrow{
  display:flex;flex-direction:column;align-items:center;gap:6px;
  padding:16px 24px;
  background:rgba(68,184,40,0.08);border:1px solid rgba(68,184,40,0.2);
  border-radius:12px;
}
.arb-profit-label{font-size:10px;text-transform:uppercase;letter-spacing:.08em;color:var(--text-dim);}
.arb-profit-val{font-family:'Syne',sans-serif;font-size:22px;font-weight:800;color:var(--neon);}
.arb-steps{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;}
.arb-step{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;padding:20px;text-align:center;
}
.arb-step-num{
  width:32px;height:32px;border-radius:50%;
  background:rgba(68,184,40,0.1);border:1px solid rgba(68,184,40,0.25);
  color:var(--neon);font-weight:700;font-size:14px;
  display:flex;align-items:center;justify-content:center;
  margin:0 auto 12px;
}
.arb-step-title{font-weight:600;font-size:14px;margin-bottom:5px;}
.arb-step-desc{font-size:12px;color:var(--text-dim);line-height:1.5;}

/* ═══ EXCHANGES ═══ */
.exchanges-row{
  display:flex;flex-wrap:wrap;gap:12px;justify-content:center;
  margin-bottom:48px;
}
.exch-pill{
  display:flex;align-items:center;gap:10px;
  padding:10px 20px;border-radius:100px;
  background:var(--bg3);border:1px solid var(--border);
  font-size:14px;font-weight:600;color:var(--text-mid);
  transition:all .2s;
}
.exch-pill:hover{border-color:rgba(255,255,255,0.2);color:var(--text);transform:scale(1.04);}
.exch-pill-dot{width:8px;height:8px;border-radius:50%;}

/* ═══ AFFILIATE ═══ */
.affiliate-grid{display:grid;grid-template-columns:1fr 1fr;gap:40px;align-items:center;}
.aff-steps{display:flex;flex-direction:column;gap:20px;}
.aff-step{
  display:flex;gap:16px;align-items:flex-start;
  padding:20px;background:var(--bg3);border:1px solid var(--border);
  border-radius:12px;transition:border-color .2s;
}
.aff-step:hover{border-color:rgba(68,184,40,0.2);}
.aff-step-num{
  width:36px;height:36px;border-radius:50%;
  background:rgba(68,184,40,0.1);border:1px solid rgba(68,184,40,0.2);
  color:var(--neon);font-weight:800;font-size:15px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.aff-step-title{font-weight:700;font-size:15px;margin-bottom:4px;}
.aff-step-desc{font-size:13px;color:var(--text-mid);line-height:1.5;}
.aff-card{
  background:linear-gradient(135deg,rgba(68,184,40,0.08),rgba(68,184,40,0.02));
  border:1px solid rgba(68,184,40,0.2);border-radius:16px;
  padding:36px;text-align:center;
}
.aff-rate{font-family:'Syne',sans-serif;font-size:64px;font-weight:800;color:var(--neon);line-height:1;}
.aff-rate-label{font-size:16px;color:var(--text-mid);margin:8px 0 24px;}
.aff-features{display:flex;flex-direction:column;gap:10px;text-align:left;margin-bottom:28px;}
.aff-feature{
  display:flex;align-items:center;gap:10px;
  font-size:14px;color:var(--text-mid);
}
.aff-check{color:var(--neon);font-size:16px;font-weight:700;flex-shrink:0;}

/* ═══ LEARN/ACADEMY ═══ */
.academy-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;}
.academy-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:14px;overflow:hidden;transition:all .2s;cursor:pointer;
}
.academy-card:hover{border-color:rgba(255,255,255,0.15);transform:translateY(-3px);}
.academy-card-top{
  height:120px;display:flex;align-items:center;justify-content:center;
  font-size:44px;
}
.academy-card-body{padding:18px 20px;}
.academy-card-tag{
  font-size:10px;font-weight:700;text-transform:uppercase;
  letter-spacing:.08em;color:var(--neon);margin-bottom:6px;
}
.academy-card-title{font-weight:700;font-size:15px;margin-bottom:6px;}
.academy-card-desc{font-size:12.5px;color:var(--text-dim);line-height:1.5;}

/* ═══ PRICING ═══ */
.pricing-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px;}
.price-plan{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:16px;padding:28px;transition:all .2s;
  position:relative;
}
.price-plan:hover{transform:translateY(-4px);}
.price-plan.featured{
  border-color:rgba(68,184,40,0.35);
  background:linear-gradient(135deg,rgba(68,184,40,0.07),var(--bg3));
}
.plan-popular{
  position:absolute;top:-12px;left:50%;transform:translateX(-50%);
  background:var(--neon);color:#000;
  font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.08em;
  padding:3px 14px;border-radius:10px;white-space:nowrap;
}
.plan-name{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:6px;}
.plan-price{font-family:'Syne',sans-serif;font-size:36px;font-weight:800;margin:14px 0 4px;}
.plan-price span{font-size:16px;font-weight:400;color:var(--text-dim);}
.plan-desc{font-size:13px;color:var(--text-dim);margin-bottom:20px;}
.plan-features{display:flex;flex-direction:column;gap:9px;margin-bottom:24px;}
.plan-feat{display:flex;align-items:center;gap:9px;font-size:13.5px;color:var(--text-mid);}
.plan-feat .ck{color:var(--neon);font-size:14px;flex-shrink:0;}
.plan-feat .xx{color:var(--text-dim);font-size:14px;flex-shrink:0;}

/* ═══ FOOTER ═══ */
footer{
  background:var(--bg2);
  border-top:1px solid var(--border);
  padding:60px 24px 30px;
}
.footer-grid{
  max-width:1200px;margin:0 auto;
  display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr 1fr;
  gap:40px;margin-bottom:48px;
}
.footer-logo{height:28px;margin-bottom:16px;}
.footer-tagline{font-size:13px;color:var(--text-dim);line-height:1.6;margin-bottom:20px;}
.footer-social{display:flex;gap:10px;}
.social-btn{
  width:34px;height:34px;border-radius:8px;
  background:rgba(255,255,255,0.06);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:14px;cursor:pointer;transition:all .15s;color:var(--text-mid);
}
.social-btn:hover{background:rgba(255,255,255,0.1);color:var(--text);}
.footer-col-title{font-family:'Syne',sans-serif;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:16px;}
.footer-link{display:block;font-size:13.5px;color:var(--text-dim);padding:4px 0;cursor:pointer;transition:color .15s;}
.footer-link:hover{color:var(--text);}
.footer-bottom{
  max-width:1200px;margin:0 auto;
  display:flex;align-items:center;justify-content:space-between;
  padding-top:24px;border-top:1px solid var(--border);
  font-size:12px;color:var(--text-dim);flex-wrap:wrap;gap:12px;
}
.footer-bottom-links{display:flex;gap:20px;}

/* ═══ SCROLL ANIMATIONS ═══ */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .6s ease,transform .6s ease;}
.reveal.visible{opacity:1;transform:translateY(0);}

/* ═══ HERO TICKER ═══ */
.ticker-bar{
  background:rgba(255,255,255,0.03);
  border-top:1px solid var(--border);
  border-bottom:1px solid var(--border);
  padding:10px 0;overflow:hidden;position:relative;
  white-space:nowrap;
}
.ticker-inner{
  display:inline-flex;gap:48px;
  animation:ticker 30s linear infinite;
}
.ticker-inner:hover{animation-play-state:paused;}
@keyframes ticker{from{transform:translateX(0);}to{transform:translateX(-50%);}}
.ticker-item{
  display:inline-flex;align-items:center;gap:10px;
  font-size:13px;font-weight:500;
}
.ticker-sym{color:var(--text-mid);font-weight:600;}
.ticker-price{color:var(--text);font-family:'Syne',sans-serif;}
.ticker-chg.pos{color:var(--neon);}
.ticker-chg.neg{color:var(--red);}

/* ═══ RTL SUPPORT ═══ */
[dir="rtl"] .nav-links{flex-direction:row-reverse;}
[dir="rtl"] .nav-right{margin-left:0;margin-right:auto;}
[dir="rtl"] .hero-content{text-align:right;}
[dir="rtl"] .hero-right{right:auto;left:5%;}
[dir="rtl"] .hero-btns{flex-direction:row-reverse;}
[dir="rtl"] .section-sub{margin-right:0;}
[dir="rtl"] .feat-card,[dir="rtl"] .intel-card{text-align:right;}
[dir="rtl"] .intel-card{flex-direction:row-reverse;}
[dir="rtl"] .aff-feature{flex-direction:row-reverse;}
[dir="rtl"] .footer-grid{direction:rtl;}
[dir="rtl"] .nav-logo{margin-right:0;margin-left:32px;}
[dir="rtl"] .dd-item{flex-direction:row-reverse;}

/* ═══ RESPONSIVE ═══ */
@media(max-width:1100px){
  #hero{grid-template-columns:1fr;padding:60px 24px;}
  .hero-right{display:none;}
  .affiliate-grid{grid-template-columns:1fr;}
  .intel-grid{grid-template-columns:1fr;}

}

/* ── Navigation ────────────────────────────────── */
function goto(hash) {
  const el = document.querySelector(hash);
  if(el) el.scrollIntoView({behavior:'smooth', block:'start'});
}
function launchTerminal() {
  window.location.href = window.location.hostname === 'exnexus.co' || window.location.hostname === 'www.exnexus.co' ? 'https://exnexus.app' : 'terminal.html';
}
function toggleMobMenu() {
  const m = document.getElementById('mob-menu');
  m.style.display = m.style.display === 'block' ? 'none' : 'block';
}

/* ── Live Prices ────────────────────────────────── */
const SYMBOLS = ['BTCUSDT','ETHUSDT','SOLUSDT','XRPUSDT','AVAXUSDT','BNBUSDT'];
const CARD_IDS = { BTCUSDT:'btc', ETHUSDT:'eth', SOLUSDT:'sol', XRPUSDT:'xrp', AVAXUSDT:'avax', BNBUSDT:'bnb' };
let ws;

const prevPrices = {};
function connectPriceFeed() {
  const streams = SYMBOLS.map(s => `${s.toLowerCase()}@miniTicker`).join('/');
  ws = new WebSocket(`wss://stream.binance.com:9443/stream?streams=${streams}`);
  ws.onmessage = (e) => {
    try {
      const d = JSON.parse(e.data).data;
      if(!d || !d.s) return;
      const sym = d.s;
      const id = CARD_IDS[sym];
      if(!id) return;
      const price = parseFloat(d.c);
      // P = price change percent in 24h for miniTicker
      const chgRaw = d.P !== undefined ? parseFloat(d.P) : null;
      const chg = (chgRaw !== null && !isNaN(chgRaw)) ? chgRaw : (prevPrices[sym] ? ((price - prevPrices[sym]) / prevPrices[sym]) * 100 : 0);
      prevPrices[sym] = price;
      const fmt = price >= 1000 ? price.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})
                : price >= 10 ? price.toFixed(3)
                : price.toFixed(4);
      const priceEl = document.getElementById('hc-'+id);
      const chgEl   = document.getElementById('hc-'+id+'-chg');
      if(priceEl) priceEl.textContent = '$' + fmt;
      if(chgEl) {
        chgEl.textContent = (chg>=0?'+':'') + chg.toFixed(2) + '%';
        chgEl.className = 'price-card-chg ' + (chg>=0?'pos':'neg');
      }
      updateTicker(sym, fmt, chg);
    } catch(err){}
  };
  ws.onclose = () => setTimeout(connectPriceFeed, 3000);
}

/* ── Ticker ──────────────────────────────────────── */
const tickerData = {};
function updateTicker(sym, price, chg) {
  tickerData[sym] = {price, chg};
  renderTicker();
}
function renderTicker() {
  const items = Object.entries(tickerData).map(([sym, d]) =>
    `<span class="ticker-item">
      <span class="ticker-sym">${sym.replace('USDT','')}/USDT</span>
      <span class="ticker-price">$${d.price}</span>
      <span class="ticker-chg ${d.chg>=0?'pos':'neg'}">${d.chg>=0?'+':''}${d.chg.toFixed(2)}%</span>
    </span>`
  ).join('');
  // Duplicate for infinite scroll
  const inner = document.getElementById('ticker-inner');
  if(inner) inner.innerHTML = items + items;
}

/* ── Scroll reveal ───────────────────────────────── */
const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(e => { if(e.isIntersecting) e.target.classList.add('visible'); });
}, { threshold: 0.1 });
document.querySelectorAll('.reveal').forEach(el => revealObserver.observe(el));

/* ── Init ─────────────────────────────────────────── */
window.addEventListener('DOMContentLoaded', () => {
  // Load saved language
  const saved = localStorage.getItem('exnexus_lang') || 'en';
  currentLang = saved;
  applyTranslations();

  // Start price feed
  connectPriceFeed();
});

// ── Answer Engine ─────────────────────────────────────────────
function exGetAnswer(question) {
  const q = question.toLowerCase()
    .trim()
    .replace(/[?!.,]/g, '')
    .replace(/whats/g, 'what is')
    .replace(/hows/g, 'how is')
    .replace(/cant/g, 'cannot')
    .replace(/dont/g, 'do not');

  // Check live context first (terminal only)
  const liveAnswer = exLiveContext(q);
  if(liveAnswer) return liveAnswer;

  // Exact match
  if(EX_QA[q]) return EX_QA[q];

  // Partial match - find best matching key
  const keys = Object.keys(EX_QA);
  const match = keys.find(k =>
    q.includes(k) || k.includes(q) ||
    k.split(' ').some(word => word.length > 3 && q.includes(word))
  );
  if(match) return EX_QA[match];

  // Keyword matching
  if(q.includes('rsi'))         return EX_QA['what is rsi'];
  if(q.includes('macd'))        return EX_QA['what is macd'];
  if(q.includes('dragonfly'))   return EX_QA['what is dragonfly doji'];
  if(q.includes('doji'))        return EX_QA['what is doji'];
  if(q.includes('arbitrage') || q.includes('arb')) return EX_QA['what is arbitrage'];
  if(q.includes('bot'))         return EX_QA['what bots are available'];
  if(q.includes('demo'))        return EX_QA['what is demo mode'];
  if(q.includes('safe') || q.includes('security')) return EX_QA['is it safe'];
  if(q.includes('free') || q.includes('price') || q.includes('cost')) return EX_QA['is it free'];
  if(q.includes('start') || q.includes('begin')) return EX_QA['how do i start'];
  if(q.includes('contact') || q.includes('email') || q.includes('help')) return EX_QA['how do i contact support'];
  if(q.includes('affiliate') || q.includes('referral') || q.includes('earn')) return EX_QA['how does affiliate work'];
  if(q.includes('exchange') || q.includes('connect')) return EX_QA['how do i connect exchange'];
  if(q.includes('leverage')) return EX_QA['what is leverage'];
  if(q.includes('indicator')) return EX_QA['how many indicators'];
  if(q.includes('pattern')) return EX_QA['what patterns'];
  if(q.includes('screener') || q.includes('signal')) return EX_QA['what is signal intelligence'];

  // Unknown — Claude AI fallback or email
  return null; // null = call Claude AI
}

// ── Live Context (terminal page only) ────────────────────────
function exLiveContext(q) {
  // Only works in terminal where live data exists
  if(typeof getCurrentPrice === 'undefined') return null;

  const btcPrice = getCurrentPrice('BTCUSDT');

  if(q.includes('btc') && (q.includes('price') || q.includes('now') || q.includes('current'))) {
    return btcPrice > 0
      ? `BTC is at $${btcPrice.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2})} 📊`
      : `Loading BTC price...`;
  }

  if(q.includes('balance') || q.includes('how much')) {
    if(typeof demoMode !== 'undefined' && demoMode && typeof demoState !== 'undefined') {
      return `Your demo balance is $${demoState.balance.toFixed(2)} 🎮`;
    }
    return `Check your balance in the Assets tab.
Add API keys in Settings first 🔑`;
  }

  if(q.includes('position') || q.includes('open trade')) {
    if(typeof demoMode !== 'undefined' && demoMode && typeof demoState !== 'undefined') {
      const pos = demoState.positions;
      return pos.length > 0
        ? `${pos.length} open position(s):
${pos.map(p=>`${p.symbol} ${p.side}`).join('
')}`
        : `No open demo positions.
Want to try a trade? 🎮`;
    }
    return `Check your Positions tab below 📊`;
  }

  if(q.includes('sentiment') || q.includes('fear') || q.includes('greed')) {
    const fgEl = document.getElementById('fg-value-display');
    const fgLbl = document.getElementById('fg-label-display');
    if(fgEl && fgLbl) {
      return `Market Sentiment: ${fgLbl.textContent} (${fgEl.textContent}/100)
${parseInt(fgEl.textContent) < 30 ? '→ Historically good buying zone' : parseInt(fgEl.textContent) > 70 ? '→ Be cautious, market overheated' : '→ Neutral territory'} 😊`;
    }
  }

  if(q.includes('bot') && (q.includes('running') || q.includes('active'))) {
    if(typeof demoBots !== 'undefined') {
      const running = Object.entries(demoBots)
        .filter(([,b]) => b.running)
        .map(([,b]) => b.name);
      return running.length > 0
        ? `Running bots: ${running.join(', ')} 🤖`
        : `No bots running.
Start one in the Bots tab! 🤖`;
    }
  }

  return null;
}

const _origSendSloth = typeof sendSlothMsg === 'function' ? sendSlothMsg : null;

async function sendSlothMsg() {
  const inp = document.getElementById('sloth-inp');
  const msg = inp?.value?.trim();
  if(!msg) return;
  inp.value = '';

  // Add user message
  addSlothMsg(msg, 'user');

  // Check pre-fixed Q&A first
  const instant = exGetAnswer(msg);

  if(instant) {
    // Instant answer — no API call needed
    setTimeout(() => {
      addSlothMsg(instant + `

📧 More questions? ${EX_EMAIL}`, 'ai');
    }, 300); // small delay feels more natural
    return;
  }

  // Unknown question — call Claude AI
  if(typeof slothBusy !== 'undefined') slothBusy = true;
  const typing = addSlothMsg('...', 'ai', true);

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-5',
        max_tokens: 300,
        system: `You are Ex, the ExNexus AI trading assistant. 
                 Wear a top hat 🎩. Be concise — max 3-4 lines.
                 Focus on trading, crypto, ExNexus features.
                 End with: 📧 info@exnexus.co</a> · <a href="/privacy.html" style="color:rgba(255,255,255,0.4);">Privacy Policy for more help.`,
        messages: [{ role:'user', content: msg }]
      })
    });
    const data = await res.json();
    const reply = data.content?.[0]?.text || 
      `Great question! Email us at 📧 ${EX_EMAIL} and we'll answer within 24 hours 🎩`;
    if(typing) typing.remove();
    addSlothMsg(reply, 'ai');
  } catch(e) {
    if(typing) typing.remove();
    addSlothMsg(`Email us at 📧 ${EX_EMAIL}
We reply within 24 hours! 🎩`, 'ai');
  }

  if(typeof slothBusy !== 'undefined') slothBusy = false;
}

    addSlothMsg(msg, 'user');
    slothHistory.push({ role:'user', content: msg });
    slothBusy = true;

    // Typing indicator
    const typing = addSlothMsg('...', 'ai', true);

    try {
        const res = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                model: 'claude-sonnet-4-5',
                max_tokens: 500,
                system: `You are Ex, the ExNexus AI trading assistant mascot. You wear a top hat and green vest. You are wise, charming, and slightly slow in personality but lightning fast in analysis. You help traders understand markets, arbitrage, trading strategies, and how to use ExNexus. Keep responses concise and friendly. Use occasional trading wisdom. Sign off with a 🎩 sometimes.`,
                messages: slothHistory.slice(-8)
            })
        });
        const data = await res.json();
        const reply = data.content?.[0]?.text || "Hmm, let me think about that one... 🎩";

        if(typing) typing.remove();
        addSlothMsg(reply, 'ai');
        slothHistory.push({ role:'assistant', content: reply });
    } catch(e) {
        if(typing) typing.remove();
        addSlothMsg("I seem to be moving a bit slow right now... try again in a moment! 🎩", 'ai');
    }
    slothBusy = false;
}

function addSlothMsg(text, role, isTyping=false) {
    const container = document.getElementById('sloth-messages');
    if(!container) return null;
    const div = document.createElement('div');
    div.className = 'sloth-msg ' + role;
    const avatarHtml = role === 'ai'
        ? `<div class="sloth-msg-avatar"><img src="${SLOTH_IMG}" alt="Ex" style="width:100%;height:100%;object-fit:cover;border-radius:50%;"></div>`
        : `<div class="sloth-msg-avatar">You</div>`;
    div.innerHTML = avatarHtml + `<div class="sloth-msg-bubble">${isTyping ? '<span style="opacity:.5;">Ex is thinking... 🎩</span>' : text}</div>`;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div;
}

// Close on outside click
document.addEventListener('click', function(e) {
    const overlay = document.getElementById('sloth-chat-overlay');
    const mascot  = document.getElementById('sloth-mascot');
    if(overlay?.classList.contains('open') &&
       !overlay.contains(e.target) &&
       !mascot?.contains(e.target)) {
        closeSlothChat();
    }
});
</script>


<script>
/* ── Live Phone Mockup Prices ── */
// Phone mockup moved to iframe — JS inside iframe
let phonePrices = [];
let phoneLastPrice = 0;

function startPhoneWS() {
    const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@ticker');
    
    ws.onmessage = (e) => {
        const d      = JSON.parse(e.data);
        const price  = parseFloat(d.c);
        const change = parseFloat(d.P);

        const priceEl  = document.getElementById('pwa-btc-price');
        const changeEl = document.getElementById('pwa-btc-change');

        if(priceEl) {
            // Flash animation on price change
            if(phoneLastPrice && price !== phoneLastPrice) {
                priceEl.style.color = price > phoneLastPrice ? '#00CC66' : '#FF003F';
                setTimeout(() => priceEl.style.color = '#fff', 500);
            }
            priceEl.textContent = '$' + price.toLocaleString('en',{minimumFractionDigits:2,maximumFractionDigits:2});
            phoneLastPrice = price;
        }

        if(changeEl) {
            changeEl.textContent = (change >= 0 ? '+' : '') + change.toFixed(2) + '% today';
            changeEl.style.color = change >= 0 ? '#22a849' : '#FF003F';
        }

        // Update chart bars
        phonePrices.push(price);
        if(phonePrices.length > 12) phonePrices.shift();
        updatePhoneBars(change >= 0);
    };

    ws.onclose = () => setTimeout(startPhoneWS, 3000);
    ws.onerror = () => ws.close();
}

function updatePhoneBars(isBull) {
    const bars = document.querySelectorAll('#phone-chart-bars div');
    if(!bars.length || phonePrices.length < 2) return;
    
    const min = Math.min(...phonePrices);
    const max = Math.max(...phonePrices);
    const range = max - min || 1;
    
    bars.forEach((bar, i) => {
        const price = phonePrices[i] || phonePrices[phonePrices.length-1];
        const pct   = (price - min) / range;
        const h     = 20 + pct * 55;
        bar.style.height = h + 'px';
        bar.style.transition = 'height 0.5s ease';
        bar.style.background = isBull 
            ? 'rgba(34,168,73,' + (0.4 + i*0.05) + ')'
            : 'rgba(255,0,63,' + (0.4 + i*0.05) + ')';
    });
}

document.addEventListener('DOMContentLoaded', startPhoneWS);
</script>

<script>
/* ── Phone Mockup Navigation ── */
let phoneAutoCycle = null;
let phoneHoverTimer = null;

function switchPhoneScreen(name) {
    document.querySelectorAll('.pscreen').forEach(s => {
        s.style.display = 'none';
        s.style.opacity = '0';
    });
    const screen = document.getElementById('pscreen-' + name);
    if(screen) {
        screen.style.display = 'block';
        setTimeout(() => screen.style.opacity = '1', 10);
    }
    document.querySelectorAll('.pnav-btn').forEach(b => {
        b.classList.remove('active-nav');
        b.style.color = 'rgba(255,255,255,0.4)';
        b.style.transform = 'scale(1)';
    });
    document.querySelectorAll('.pnav-btn[data-screen="' + name + '"]').forEach(b => {
        b.classList.add('active-nav');
        b.style.color = '#00FF88';
        b.style.transform = 'scale(1.15)';
    });
}

function startAutoCycle() {
    const screens = ['home','markets','trade','bots'];
    let idx = 0;
    phoneAutoCycle = setInterval(() => {
        idx = (idx + 1) % screens.length;
        switchPhoneScreen(screens[idx]);
    }, 3000);
}

function stopAutoCycle() {
    if(phoneAutoCycle) { clearInterval(phoneAutoCycle); phoneAutoCycle = null; }
}

// Wire hover + click on nav buttons
document.addEventListener('DOMContentLoaded', () => {
    startAutoCycle();

    document.querySelectorAll('.pnav-btn').forEach(btn => {
        const name = btn.dataset.screen;

        // Hover — preview after 200ms delay
        btn.addEventListener('mouseenter', () => {
            stopAutoCycle();
            clearTimeout(phoneHoverTimer);
            // Scale up on hover
            btn.style.transform = 'scale(1.2)';
            phoneHoverTimer = setTimeout(() => switchPhoneScreen(name), 200);
        });

        // Mouse leave — restart auto cycle after 2s
        btn.addEventListener('mouseleave', () => {
            clearTimeout(phoneHoverTimer);
            btn.style.transform = btn.classList.contains('active-nav') ? 'scale(1.15)' : 'scale(1)';
            setTimeout(startAutoCycle, 2000);
        });

        // Click — switch immediately
        btn.addEventListener('click', () => {
            stopAutoCycle();
            switchPhoneScreen(name);
            setTimeout(startAutoCycle, 4000);
        });
    });
});
</script>
