<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="icon" href="https://fav.farm/⚡">
    <meta charset="UTF-8">
    <title>Trading Command Center</title>
    <!-- Link to our STYLE file -->
    <link rel="stylesheet" href="style.css">
    <!-- Tailwind for quick layout -->
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
<!-- SECURITY GATEKEEPER WITH 2FA -->
<div id="login-screen" class="fixed inset-0 bg-[#0b0e11] z-[100] flex items-center justify-center">
    <div class="bg-[#161a1e] p-8 rounded-2xl border border-gray-800 w-80 shadow-2xl text-center">
        <!-- THE SINGLE LOGO ICON -->
        <div class="flex justify-center mb-6">
            <img src="Icon.png" alt="ExNexus" class="h-20 w-auto">
        </div>
        
        <!-- Phase 1: Password -->
        <div id="auth-phase-1">
            <h2 class="text-white font-bold mb-2">Terminal Locked</h2>
            <p class="text-gray-500 text-[10px] mb-6">Enter Master Password</p>
            <input id="master-password" type="password" placeholder="••••••••" 
                class="w-full bg-black border border-gray-700 p-3 rounded-lg text-white mb-4 outline-none focus:border-blue-500 text-center tracking-widest">
            <button onclick="checkPassword()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition">Next Step</button>
        </div>

        <!-- Phase 2: Authenticator (Hidden initially) -->
        <div id="auth-phase-2" class="hidden">
            <h2 class="text-white font-bold mb-2">2FA Required</h2>
            <p class="text-gray-500 text-[10px] mb-6">Enter code from Google Authenticator</p>
            <input id="2fa-code" type="text" placeholder="000 000" maxlength="6"
                class="w-full bg-black border border-gray-700 p-3 rounded-lg text-white mb-4 outline-none focus:border-blue-500 text-center tracking-[0.5em] text-xl font-bold">
            <button onclick="unlockTerminal()" class="w-full bg-green-600 hover:bg-green-500 text-white font-bold py-3 rounded-lg transition">Verify & Unlock</button>
        </div>
        
        <p id="login-error" class="text-red-500 text-[10px] mt-4 hidden">Invalid Credentials.</p>
    </div>
</div>
        <!-- THE MASTER LAYOUT -->
<div class="flex h-screen w-full overflow-hidden bg-[#0b0e11] absolute inset-0">
    
    <!-- 1. SIDEBAR (Widened to w-32 so ExNexus is clear) -->
    <aside class="w-32 bg-[#161a1e] border-r border-gray-800 flex flex-col items-center py-6 z-20">
        <div class="mb-10 w-full px-2">
            <!-- Your Logo -->
            <img src="Logo.png" alt="ExNexus" class="w-full h-auto object-contain">
        </div>
        
        <!-- Navigation Icons -->
        <div class="space-y-8 text-xl cursor-pointer text-gray-500">
            <div class="hover:text-white transition">📊</div>
            <div class="hover:text-white transition">🤖</div>
            <div class="hover:text-white transition">⚙️</div>
        </div>
    </aside>

    <!-- 2. MAIN TERMINAL -->
    <main class="flex-1 flex flex-col overflow-hidden">
        
        <!-- THE HEADER (Fixed at the top) -->
        <header class="h-16 bg-[#111418] border-b border-gray-800 flex items-center justify-between px-6 z-10">
            <div class="flex items-center space-x-10">
                <!-- PRICE BLOCK -->
                <div class="flex flex-col border-r border-gray-800 pr-10">
                    <span class="text-[10px] text-gray-500 font-bold uppercase tracking-widest mb-1">Bybit Spot Price</span>
                    <div class="flex items-center space-x-2">
                        <span id="display-pair" class="font-bold text-xs text-white italic">BTC/USDT</span>
                        <span id="btc-price" class="font-mono text-xl text-[#A4CD39] font-black">$--,---.--</span>
                    </div>
                </div>

                <!-- BALANCE BLOCK -->
                <div class="flex flex-col">
                    <span class="text-[10px] text-[#00ADEF] font-bold uppercase tracking-widest mb-1">Account Balance</span>
                    <div class="flex items-center space-x-2">
                        <span id="wallet-balance" class="font-mono text-xl text-white font-black">0.00</span>
                        <span class="text-[10px] text-gray-500 font-bold">USDT</span>
                    </div>
                </div>
            </div>

            <!-- API STATUS BUTTON -->
            <button onclick="toggleApiModal()" class="bg-[#00ADEF] hover:bg-blue-500 text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition shadow-lg shadow-blue-500/10">
                Connect API
            </button>
        </header>

        <!-- 3. CHART & CONTENT AREA -->
        <div class="flex-1 flex overflow-hidden bg-black">
    <div class="tradingview-widget-container" style="height:100%;width:100%">
        <div id="tradingview_chart" style="height:calc(100% - 32px);width:100%"></div>
        <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
        <script type="text/javascript">
        new TradingView.widget(
        {
            "autosize": true,
            "symbol": "BYBIT:BTCUSDT",
            "interval": "60",
            "timezone": "Etc/UTC",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "toolbar_bg": "#161a1e",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "container_id": "tradingview_chart"
        }
        );
        </script>
    </div>
    <!-- TradingView Widget END -->
</div>

                <!-- RIGHT PANEL (Execution & AI) -->
                <div class="w-80 p-4 space-y-4">
                    <div class="flex space-x-2">
                        <button class="flex-1 btn-buy py-3">BUY</button>
                        <button class="flex-1 btn-sell py-3">SELL</button>
                    </div>

                   <!-- AI CO-PILOT UNIT -->
        <div class="mt-4 p-4 border border-purple-500/30 rounded-lg bg-[#1c1329]">
            <div class="flex items-center justify-between mb-4">
                <h4 class="text-[10px] font-bold text-purple-400 uppercase tracking-widest">AI Co-Pilot</h4>
                <span class="text-[9px] bg-green-500/20 text-green-400 px-2 py-0.5 rounded">AltFINS Active</span>
            </div>
            <div id="ai-content" class="space-y-3">
                <p class="text-gray-500 text-xs italic animate-pulse">Scanning market data...</p>
            </div>
        </div>

        <!-- ASSETS PORTFOLIO UNIT (New) -->
        <div class="mt-4 p-4 border border-gray-800 rounded-lg bg-[#111418]">
            <div class="flex items-center justify-between mb-4">
                <h4 class="text-[10px] font-bold text-gray-500 uppercase tracking-widest">My Asset</h4>
                <span class="text-[9px] text-[#00ADEF] cursor-pointer hover:underline uppercase font-bold" onclick="updateWalletBalance()">Sync</span>
            </div>
            <div id="asset-list" class="space-y-2">
                <p class="text-[9px] text-gray-600 italic text-center py-2 uppercase">Awaiting API...</p>
            </div>
        </div>
                    <!-- AI ANALYTICS (Future AltFINS Integration) -->
                   <script>
    console.log("ExNexus Master Brain: Active");

    // 1. SECURITY SETTINGS
    const MASTER_PASSWORD = "YourSecretPassword123";
    const MOCK_2FA_CODE = "123456";

    function checkPassword() {
        const pass = document.getElementById('master-password').value;
        if (pass === MASTER_PASSWORD) {
            document.getElementById('auth-phase-1').classList.add('hidden');
            document.getElementById('auth-phase-2').classList.remove('hidden');
        } else {
            document.getElementById('login-error').classList.remove('hidden');
        }
    }

    function unlockTerminal() {
        const code = document.getElementById('2fa-code').value;
        if (code === MOCK_2FA_CODE) {
            document.getElementById('login-screen').style.display = 'none';
            sessionStorage.setItem('isUnlocked', 'true');
            updateWalletBalance(); // Trigger sync on login
        } else {
            alert("Invalid 2FA");
        }
    }

    // 2. API KEY STORAGE
    function saveApiKeys() {
        const key = document.getElementById('ex-key').value.trim();
        const secret = document.getElementById('ex-secret').value.trim();
        if (!key || !secret) { alert("Enter keys."); return; }
        localStorage.setItem('user_api_keys', JSON.stringify({ key, secret }));
        
        const btn = document.querySelector('button[onclick="toggleApiModal()"]');
        if (btn) { btn.innerText = "Bybit Connected ✅"; btn.style.backgroundColor = "#A4CD39"; }
        
        toggleApiModal();
        updateWalletBalance();
    }

    function toggleApiModal() {
        const modal = document.getElementById('api-modal');
        if (modal) modal.classList.toggle('hidden');
    }

    // 3. MARKET DATA (Bybit Price)
    async function updatePrice() {
        try {
            const res = await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=BTCUSDT');
            const data = await res.json();
            const lastPrice = data.result.list[0].lastPrice;
            document.getElementById('btc-price').innerText = '$' + parseFloat(lastPrice).toLocaleString();
        } catch (e) { console.error("Price error"); }
    }

    // 4. WALLET & ASSETS MIRROR
    async function updateWalletBalance() {
        console.log("NEXUS SYNC: Starting...");
        const savedKeys = JSON.parse(localStorage.getItem('user_api_keys'));
        if (!savedKeys || !savedKeys.key) return;

        const proxyUrl = "https://exnexus-proxy.drorbaron10.workers.dev/"; 

        try {
            const response = await fetch(proxyUrl, {
                method: 'POST',
                headers: { 'x-api-key': savedKeys.key, 'x-api-secret': savedKeys.secret }
            });
            const data = await response.json();
            
            const assetList = document.getElementById('asset-list');
            if (assetList) assetList.innerHTML = '';

            if (data.result && data.result.list && data.result.list[0].coin) {
                const coins = data.result.list[0].coin;
                coins.forEach(c => {
                    const balance = parseFloat(c.walletBalance);
                    if (balance > 0) {
                        if (c.coin === "USDT") {
                            document.getElementById('wallet-balance').innerText = balance.toFixed(2);
                        }
                        const row = document.createElement('div');
                        row.className = "flex justify-between items-center border-b border-gray-900 pb-2 mb-2";
                        row.innerHTML = <div><p class="text-[11px] font-bold text-white">${c.coin}</p><p class="text-[9px] text-gray-500 font-mono">${balance.toFixed(4)}</p></div><div class="text-right font-bold"><p class="text-[11px] text-[#A4CD39] font-mono">$${parseFloat(c.usdValue || 0).toFixed(2)}</p></div>;
                        if (assetList) assetList.appendChild(row);
                    }
                });
            }
        } catch (e) { console.error("Sync Failed", e); }
    }

    // 5. STARTUP LOGIC
    setInterval(updatePrice, 2000);
    setInterval(updateWalletBalance, 30000);
    updatePrice();
    
    window.onload = function() {
        if (sessionStorage.getItem('isUnlocked') === 'true') {
            document.getElementById('login-screen').style.display = 'none';
            updateWalletBalance();
        }
        if (localStorage.getItem('user_api_keys')) {
            const btn = document.querySelector('button[onclick="toggleApiModal()"]');
            if (btn) { btn.innerText = "Bybit Connected ✅"; btn.style.backgroundColor = "#A4CD39"; }
        }
    }
</script>
</body>
</html>
