<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus Trading Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0e11; color: white; font-family: sans-serif; overflow: hidden; }
        .font-mono { font-family: 'Courier New', Courier, monospace; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- 1. SECURITY GATEKEEPER (Simplified) -->
<div id="login-screen" class="fixed inset-0 bg-[#0b0e11] z-[100] flex items-center justify-center">
    <div class="bg-[#161a1e] p-8 rounded-2xl border border-gray-800 w-80 shadow-2xl text-center">
        <div class="flex justify-center mb-6">
            <img src="Icon.png" alt="ExNexus" class="h-20 w-auto">
        </div>
        <h2 class="text-white font-bold mb-2 uppercase tracking-widest text-sm">Terminal Locked</h2>
        <input id="master-password" type="password" placeholder="PASSWORD" class="w-full bg-black border border-gray-700 p-3 rounded-lg text-white mb-4 outline-none focus:border-[#A4CD39] text-center">
        <button onclick="simpleUnlock()" class="w-full bg-blue-600 hover:bg-blue-500 text-white font-bold py-3 rounded-lg transition uppercase text-xs">Unlock System</button>
        <p id="login-error" class="text-red-500 text-[10px] mt-4 hidden">WRONG PASSWORD</p>
    </div>
</div>

<!-- 2. MAIN TERMINAL -->
<div class="flex h-screen w-full overflow-hidden bg-[#0b0e11] absolute inset-0">
    <aside class="w-28 bg-[#161a1e] border-r border-gray-800 flex flex-col items-center py-6 z-20">
        <div class="mb-10 w-full px-2">
            <img src="Logo.png" alt="ExNexus" class="w-full h-auto object-contain">
        </div>
        <div class="space-y-8 text-xl text-gray-500"><div class="hover:text-white">📊</div><div class="hover:text-[#A4CD39]">🤖</div><div class="hover:text-white">⚙️</div></div>
    </aside>

    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-16 bg-[#111418] border-b border-gray-800 flex items-center justify-between px-6 z-10">
            <div class="flex items-center space-x-8">
                <div class="flex flex-col border-r border-gray-800 pr-8">
                    <span class="text-[9px] text-gray-500 font-bold uppercase">Bybit Price</span>
                    <span id="btc-price" class="font-mono text-lg text-[#A4CD39] font-black">$--,---.--</span>
                </div>
                <div class="flex flex-col">
                    <span class="text-[9px] text-[#00ADEF] font-bold uppercase">Balance</span>
                    <span id="wallet-balance" class="font-mono text-lg text-white font-black">0.00</span>
                </div>
            </div>
            <button onclick="toggleApiModal()" id="api-status-btn" class="bg-[#00ADEF] text-white px-5 py-2 rounded-full text-[10px] font-black uppercase tracking-widest transition shadow-lg">Connect API</button>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <div class="flex-1 bg-black relative"><div id="tradingview_chart" class="h-full w-full"></div></div>
            <aside class="w-80 p-4 space-y-4 bg-[#0b0e11] overflow-y-auto border-l border-gray-800">
                <div class="flex space-x-2"><button class="flex-1 bg-[#A4CD39] text-black font-bold py-3 rounded text-[10px] uppercase">Buy</button><button class="flex-1 bg-red-500 text-white font-bold py-3 rounded text-[10px] uppercase">Sell</button></div>
                <div class="p-4 border border-purple-500/30 rounded-lg bg-[#1c1329]"><h4 class="text-[9px] font-bold text-purple-400 uppercase mb-3">AI Co-Pilot</h4><div id="ai-content" class="space-y-2 text-[11px]">Scanning...</div></div>
                <div class="p-4 border border-gray-800 rounded-lg bg-[#111418]"><div class="flex justify-between items-center mb-3"><h4 class="text-[9px] font-bold text-gray-500 uppercase">My Assets</h4><span class="text-[8px] text-[#00ADEF] cursor-pointer" onclick="updateWalletBalance()">SYNC</span></div><div id="asset-list" class="space-y-2"></div></div>
            </aside>
        </div>
    </main>
</div>

<!-- API MODAL -->
<div id="api-modal" class="hidden fixed inset-0 bg-black/80 backdrop-blur-sm flex items-center justify-center z-[110]">
    <div class="bg-[#161a1e] border border-gray-800 w-80 p-6 rounded-xl shadow-2xl">
        <h2 class="text-white font-bold mb-4 text-center text-sm">Connect Bybit</h2>
        <input id="ex-key" type="text" placeholder="API KEY" class="w-full bg-black border border-gray-700 p-2 rounded mb-3 text-[10px] text-white">
        <input id="ex-secret" type="password" placeholder="API SECRET" class="w-full bg-black border border-gray-700 p-2 rounded mb-4 text-[10px] text-white">
        <button onclick="saveApiKeys()" class="w-full bg-[#00ADEF] text-white font-bold py-3 rounded uppercase text-xs">Save Keys</button>
        <button onclick="toggleApiModal()" class="w-full text-gray-500 text-[10px] mt-2 uppercase">Cancel</button>
    </div>
</div>

<script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
<script>
    // 1. CONFIGURATION
    const MASTER_PASSWORD = "YourSecretPassword123";
    const proxyUrl = "https://exnexus-proxy.drorbaron18.workers.dev/";

    // 2. AUTHENTICATION
    function simpleUnlock() {
        const pass = document.getElementById('master-password').value;
        if (pass === MASTER_PASSWORD) {
            document.getElementById('login-screen').classList.add('hidden');
            sessionStorage.setItem('isUnlocked', 'true');
            updateWalletBalance();
        } else {
            alert("Wrong Password");
        }
    }

    // 3. API & WALLET
    function toggleApiModal() { document.getElementById('api-modal').classList.toggle('hidden'); }

    function saveApiKeys() {
        const key = document.getElementById('ex-key').value.trim();
        const secret = document.getElementById('ex-secret').value.trim();
        if (!key || !secret) { alert("Missing Keys"); return; }
        localStorage.setItem('user_api_keys', JSON.stringify({ key, secret }));
        toggleApiModal();
        updateWalletBalance();
        updateStatus();
    }

    async function updatePrice() {
        try {
            const res = await fetch('https://api.bybit.com/v5/market/tickers?category=spot&symbol=BTCUSDT');
            const data = await res.json();
            document.getElementById('btc-price').innerText = '$' + parseFloat(data.result.list[0].lastPrice).toLocaleString();
        } catch (e) {}
    }

    async function updateWalletBalance() {
        const keys = JSON.parse(localStorage.getItem('user_api_keys'));
        if (!keys) return;
        try {
            const res = await fetch(proxyUrl, { method: 'POST', headers: { 'x-api-key': keys.key, 'x-api-secret': keys.secret }});
            const data = await res.json();
            const assetList = document.getElementById('asset-list');
            if(assetList) assetList.innerHTML = '';
            if (data.result && data.result.list) {
                data.result.list[0].coin.forEach(c => {
                    const bal = parseFloat(c.walletBalance);
                    if (bal > 0) {
                        if (c.coin === "USDT") document.getElementById('wallet-balance').innerText = bal.toFixed(2);
                        if(assetList) assetList.innerHTML += <div class="flex justify-between text-[10px] border-b border-gray-900 pb-1"><span>${c.coin}</span><span class="text-[#A4CD39] font-bold">$${parseFloat(c.usdValue || 0).toFixed(2)}</span></div>;
                    }
                });
            }
        } catch (e) { console.log("Sync Error"); }
    }

    function updateStatus() {
        if (localStorage.getItem('user_api_keys')) {
            const btn = document.getElementById('api-status-btn');
            if(btn) { btn.innerText = "Connected ✅"; btn.style.backgroundColor = "#A4CD39"; btn.style.color = "black"; }
        }
    }

    // 4. CHART & AI
    function initChart() {
        new TradingView.widget({
            "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "60", "timezone": "Etc/UTC",
            "theme": "dark", "style": "1", "locale": "en", "container_id": "tradingview_chart"
        });
    }

    function runAI() {
        const sigs = [{p:"BTC/USDT", pat:"Bull Flag", pr:"84%"}, {p:"SOL/USDT", pat:"RSI Oversold", pr:"88%"}];
        const s = sigs[Math.floor(Math.random()*sigs.length)];
        const ai = document.getElementById('ai-content');
        if(ai) ai.innerHTML = <div><b>${s.p}</b> - <span class="text-green-400">${s.pr}</span><br><span class="text-purple-300 text-[9px] uppercase">${s.pat}</span></div>;
    }

    // 5. INITIALIZE
    setInterval(updatePrice, 2000); setInterval(runAI, 10000); setInterval(updateWalletBalance, 60000);
    initChart(); updatePrice(); runAI(); updateStatus();

    window.onload = function() {
        if (sessionStorage.getItem('isUnlocked') === 'true') {
            document.getElementById('login-screen').classList.add('hidden');
            updateWalletBalance();
        }
    }
</script>
</body>
</html>
