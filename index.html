<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Institutional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&family=JetBrains+Mono&display=swap');
        
        :root { 
            --neon: #39FF14; 
            --hot-red: #FF003F; 
            --bg: #050505; 
            /* SIDEBAR LOCKS - Expanded to fill space from 40% graph reduction */
            --sidebar-left: 60px;   
            --sidebar-right: 380px; 
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg); 
            color: rgba(255,255,255,0.9); 
            overflow: hidden; 
            height: 100vh; 
            margin: 0; 
        }

        /* GRID LOCK - Graph is now significantly narrower */
        .app-container { 
            display: grid; 
            grid-template-columns: var(--sidebar-left) 0.6fr var(--sidebar-right); 
            grid-template-rows: 40px 1fr 180px; 
            height: 100vh; 
            gap: 4px; 
            padding: 4px;
            box-sizing: border-box;
        }

        .glass { background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.03); position: relative; }

        /* Left Nav */
        .nav-icon { color: #444; cursor: pointer; display: flex; align-items: center; justify-content: center; height: 50px; }
        .nav-icon:hover { color: var(--neon); }

        /* GRAPH AREA - Reduced by 40% */
        .chart-wrapper { 
            min-width: 0; 
            width: 100%; 
            height: 100%; 
            overflow: hidden; 
            border: 1px solid rgba(57, 255, 20, 0.1);
        }

        /* Right Sidebar */
        .node-header { font-weight: 900; font-size: 9px; color: rgba(255,255,255,0.4); text-transform: uppercase; letter-spacing: 0.2em; margin-bottom: 16px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; }
        .bot-row { display: flex; justify-content: space-between; font-size: 11px; padding: 8px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }
        
        .trade-input-group { margin-top: auto; padding-top: 20px; }
        input { background: #000; border: 1px solid rgba(255,255,255,0.1); color: white; font-family: 'JetBrains Mono'; font-size: 11px; padding: 12px; width: 100%; outline: none; margin: 10px 0; }
        
        .btn-short { width: 100%; padding: 14px; border: 1px solid var(--hot-red); color: var(--hot-red); font-weight: 800; text-transform: uppercase; font-size: 11px; transition: 0.2s; }
        .btn-short:hover { background: var(--hot-red); color: black; }

        #ticker { color: var(--neon); font-family: 'JetBrains Mono'; font-size: 12px; font-weight: 700; }
    </style>
</head>
<body>

    <div class="app-container">
        <header class="col-span-3 glass flex items-center justify-between px-6">
            <div class="flex items-center space-x-3">
                <span class="text-[10px] font-black tracking-widest text-white/60">EXNEXUS</span>
                <span class="text-[8px] font-bold text-white/20 uppercase border-l border-white/10 pl-3">Institutional Node</span>
            </div>
            <div id="ticker">$74,231.70</div>
        </header>

        <nav class="row-span-2 glass flex flex-col py-8 space-y-6">
            <div class="nav-icon"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
            <div class="nav-icon"><svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></div>
        </nav>

        <main class="glass chart-wrapper">
            <div id="tradingview_widget"></div>
        </main>

        <aside class="row-span-2 glass p-6 flex flex-col">
            <div class="node-header">Bot Intelligence Node</div>
            <div class="space-y-2">
                <div class="bot-row"><span>Smart Trades</span> <span style="color:var(--neon)">+$2,025.18</span></div>
                <div class="bot-row text-white/40"><span>DCA Strategy</span> <span>Active (3)</span></div>
                <div class="bot-row text-white/40"><span>Grid Bot</span> <span>Standby</span></div>
                <div class="bot-row"><span style="color:var(--neon)">DYS Custom Bot</span> <span class="italic text-white/20 font-mono text-[9px]">Scanning...</span></div>
            </div>

            <div class="trade-input-group">
                <div class="flex justify-between text-[10px] font-black opacity-30 uppercase mb-4">
                    <span>Bybit Perpetuals</span> <span>10.00x</span>
                </div>
                <span class="text-[9px] font-black text-gray-500 uppercase">Order Quantity (USDT)</span>
                <input type="text" placeholder="Enter Amount...">
                <div class="flex justify-between text-[8px] text-gray-700 font-mono mb-4">
                    <span>25%</span><span>50%</span><span>75%</span><span>Max</span>
                </div>
                <button class="btn-short">Execute Short</button>
            </div>
        </aside>

        <section class="glass px-8 py-4">
            <div class="flex items-center space-x-10 text-[10px] font-black uppercase tracking-widest text-white/20">
                <span style="color:var(--neon); border-bottom: 2px solid var(--neon)" class="pb-1">Live Orders</span>
                <span>Active Positions</span>
                <span>P&L History</span>
                <span>Asset Vault</span>
            </div>
        </section>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        new TradingView.widget({
            "autosize": true,
            "symbol": "BYBIT:BTCUSDT.P",
            "interval": "15",
            "theme": "dark",
            "style": "1",
            "locale": "en",
            "container_id": "tradingview_widget",
            "enable_publishing": false,
            "hide_side_toolbar": false,
            "allow_symbol_change": true,
            "details": false,
            "hotlist": false,
            "calendar": false
        });
    </script>
</body>
</html>
