<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ExNexus | Institutional Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script type="text/javascript" src="https://s3.tradingview.com/tv.js"></script>
</head>
<body class="bg-black text-gray-300 text-[11px] overflow-hidden">
    <div class="h-screen flex flex-col">
        <header class="h-10 border-b border-[#1c2024] flex items-center px-4 bg-[#0a0e12] justify-between shrink-0">
            <div class="flex items-center gap-6">
                <span class="text-sm font-black text-white"><span class="text-[#00b15d]">Ex</span>Nexus</span>
                <nav class="flex gap-4 font-bold text-gray-500 uppercase text-[9px]">
                    <span class="text-white border-b border-[#00b15d] pb-1 cursor-pointer">Trade</span>
                    <div class="relative group">
                        <span class="hover:text-white cursor-pointer">Layout ▾</span>
                        <div class="absolute hidden group-hover:block bg-[#0a0e12] border border-[#1c2024] mt-1 w-24 z-50">
                            <div onclick="loadChart(1)" class="p-2 hover:bg-[#1c2024] cursor-pointer text-white">1 Chart</div>
                            <div onclick="loadChart(4)" class="p-2 hover:bg-[#1c2024] cursor-pointer text-white">4 Charts</div>
                        </div>
                    </div>
                </nav>
            </div>
            <div class="text-[9px] font-bold text-[#00b15d] uppercase">● PRO TERMINAL ACTIVE</div>
        </header>
        <div class="flex-1 flex overflow-hidden">
            <aside class="w-56 border-r border-[#1c2024] bg-[#0a0e12] shrink-0">
                <div class="p-2 border-b border-[#1c2024] text-[9px] uppercase font-bold text-gray-600">Order Book</div>
                <div class="text-xl font-bold text-[#00b15d] text-center py-10">71,048.00 ↑</div>
            </aside>
            <main class="flex-1 flex flex-col bg-black">
                <div id="tv-chart-container" class="flex-1 bg-black relative"></div>
                <div class="h-40 border-t border-[#1c2024] bg-[#0a0e12] p-3 shrink-0 text-center text-gray-700 font-bold uppercase tracking-widest">
                    Awaiting active positions...
                </div>
            </main>
            <aside class="w-72 border-l border-[#1c2024] bg-[#0a0e12] p-4 shrink-0">
                <button class="w-full bg-[#00b15d] text-white py-4 rounded font-black text-[11px] uppercase shadow-[0_4px_25px_rgba(0,177,93,0.3)]">Open Long Position</button>
            </aside>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
