<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Institutional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=JetBrains+Mono&display=swap');
        
        :root { 
            --neon: #39FF14; 
            --hot-red: #FF003F; 
            --bg: #050505; 
            --section-1-width: 56px;   /* TOOLBAR */
            --section-3-width: 240px;  /* BOT LIST */
            --section-4-width: 320px;  /* BYBIT UI */
        }

        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; height: 100vh; margin: 0; overflow: hidden; }
        .glass { background: #0a0a0a; border: 1px solid rgba(255, 255, 255, 0.03); }

        /* THE 4-SECTION FORMULA */
        .app-shell {
            display: grid;
            grid-template-columns: var(--section-1-width) 1fr calc(var(--section-3-width) + var(--section-4-width));
            grid-template-rows: 40px 1fr 150px;
            height: 100vh;
        }

        /* SECTION 1: TOOLBAR */
        .toolbar { grid-row: 1 / 4; display: flex; flex-col; align-items: center; py-6; space-y-6; border-right: 1px solid rgba(255,255,255,0.05); }
        .t-icon { color: #444; cursor: pointer; transition: 0.2s; }
        .t-icon:hover { color: var(--neon); }

        /* SECTION 2: GRAPH */
        .chart-area { min-width: 0; height: 100%; }

        /* RIGHT MASTER CONTAINER (Sections 3 & 4) */
        .right-panel {
            display: grid;
            grid-template-columns: var(--section-3-width) var(--section-4-width);
            border-left: 1px solid rgba(255,255,255,0.05);
        }

        /* SECTION 3: BOT LIST */
        .bot-list { p: 5; border-right: 1px solid rgba(255,255,255,0.03); }
        .bot-item { display: flex; justify-content: space-between; font-size: 11px; padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.02); }

        /* SECTION 4: BYBIT UI */
        .trading-ui { p: 6; display: flex; flex-direction: column; }
        .bybit-input { background: #111; border: 1px solid #222; padding: 12px; font-family: 'JetBrains Mono'; width: 100%; margin-top: 8px; font-size: 12px; }
        .btn-bybit { background: none; border: 1px solid var(--hot-red); color: var(--hot-red); padding: 14px; font-weight: 900; margin-top: 20px; text-transform: uppercase; font-size: 10px; }

        .label-mini { font-size: 8px; font-weight: 900; color: rgba(255,255,255,0.2); text-transform: uppercase; letter-spacing: 1px; }
        #ticker { color: var(--neon); font-family: 'JetBrains Mono'; font-weight: 700; }
    </style>
</head>
<body>

<div class="app-shell">
    <header class="col-span-2 glass flex items-center px-4 justify-between border-b border-white/5">
        <div class="flex items-center space-x-4">
            <span class="text-[10px] font-black opacity-30 tracking-tighter">EXNEXUS INSTITUTIONAL</span>
            <span id="ticker">$74,231.70</span>
        </div>
    </header>

    <aside class="toolbar glass">
        <div class="t-icon" style="color:var(--neon)"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
        <div class="t-icon"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg></div>
        <div class="t-icon"><svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg></div>
    </aside>

    <main class="chart-area glass">
        <div id="tv_chart" style="width: 100%; height: 100%;"></div>
    </main>

    <div class="right-panel row-span-2 glass">
        <section class="bot-list p-4">
            <div class="label-mini mb-4">Bot Intelligence Node</div>
            <div class="bot-item"><span>Smart Trades</span> <span style="color:var(--neon)">+$2,025</span></div>
            <div class="bot-item text-white/40"><span>DCA Bot</span> <span>Active</span></div>
            <div class="bot-item text-white/40"><span>Grid Bot</span> <span>Standby</span></div>
            <div class="bot-item"><span style="color:var(--neon)">DYS Bot</span> <span class="animate-pulse">Monitoring</span></div>
        </section>

        <section class="trading-ui p-4">
            <div class="flex justify-between items-center mb-6">
                <div class="label-mini">Execution</div>
                <div class="text-[10px] font-mono text-white/40">10.00x Cross</div>
            </div>
            
            <div class="space-y-4">
                <div>
                    <span class="label-mini !text-[7px]">Order Qty (USDT)</span>
                    <input type="text" class="bybit-input" placeholder="0.00">
                </div>
                <div class="flex justify-between text-[8px] font-mono text-white/20">
                    <span>25%</span><span>50%</span><span>75%</span><span>100%</span>
                </div>
                <button class="btn-bybit">Open Short</button>
            </div>
        </section>
    </div>

    <footer class="glass flex items-center px-10 border-t border-white/5">
        <div class="flex space-x-1
