<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Trading Intelligence</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <div id="login-screen" class="min-h-screen flex items-center justify-center p-6">
        <div class="w-full max-w-md p-10 bg-[#0a0e12] rounded-3xl border border-[#2d343b] text-center shadow-2xl">
            <div class="brand-box mb-8">
                <svg viewBox="0 0 300 120" xmlns="http://www.w3.org/2000/svg">
                    <text x="150" y="60" text-anchor="middle" font-weight="800" font-size="42">
                        <tspan fill="#00b15d">Ex</tspan><tspan fill="#ffffff">Nexus</tspan>
                    </text>
                    <line x1="40" y1="85" x2="260" y2="85" stroke="#00b1ff" stroke-width="2" />
                    <text x="150" y="110" text-anchor="middle" fill="#848e9c" font-size="11" letter-spacing="0.45em">TRADING INTELLIGENCE</text>
                </svg>
            </div>
            <div class="space-y-4">
                <input type="email" class="input-field" placeholder="License Email">
                <input type="password" class="input-field" placeholder="Password">
                <button onclick="launch()" class="btn-primary mt-2">Initialize Terminal</button>
            </div>
        </div>
    </div>

    <div id="terminal-screen" class="h-screen flex flex-col hidden overflow-hidden">
        <header class="h-12 border-b border-[#2d343b] flex items-center px-4 bg-[#0a0e12] justify-between">
            <div class="flex items-center gap-6">
                <div class="flex items-center">
                    <span class="text-[#00b15d] font-extrabold text-lg">Ex</span><span class="text-white font-extrabold text-lg">Nexus</span>
                </div>
                <nav class="flex gap-4 text-xs font-bold text-gray-400">
                    <span class="text-white">MARKETS</span>
                    <span>TRADE</span>
                    <span class="text-[#00b1ff]">BOTS</span>
                </nav>
            </div>
        </header>

        <div class="flex-1 flex overflow-hidden">
            <nav class="w-12 border-r border-[#2d343b] flex flex-col items-center py-4 bg-black gap-6">
                <i data-lucide="layout-dashboard" class="w-5 h-5 text-[#00b15d]"></i>
                <i data-lucide="bot" class="w-5 h-5 text-gray-500"></i>
                <i data-lucide="database" class="w-5 h-5 text-gray-500"></i>
            </nav>

            <section class="flex-1 relative bg-black">
                <div id="tv-container"></div>
            </section>

            <aside class="w-72 border-l border-[#2d343b] bg-[#0a0e12] flex flex-col p-4 gap-4">
                <div class="flex gap-2">
                    <button class="flex-1 bg-[#00b15d] py-2 rounded text-xs font-bold uppercase">Buy</button>
                    <button class="flex-1 bg-gray-800 py-2 rounded text-xs font-bold text-gray-400 uppercase">Sell</button>
                </div>
                
                <div class="space-y-3">
                    <div class="text-[10px] text-gray-500 font-bold uppercase">Order Type</div>
                    <select class="w-full bg-black border border-[#2d343b] p-2 text-xs rounded text-white outline-none">
                        <option>Limit</option>
                        <option>Market</option>
                    </select>
                    
                    <div class="text-[10px] text-gray-500 font-bold uppercase">Price</div>
                    <input type="text" class="w-full bg-black border border-[#2d343b] p-2 text-xs rounded text-white" value="68410.50">
                    
                    <div class="text-[10px] text-gray-500 font-bold uppercase">Quantity (BTC)</div>
                    <input type="text" class="w-full bg-black border border-[#2d343b] p-2 text-xs rounded text-white" placeholder="0.001">
                </div>

                <button class="w-full bg-[#00b15d] py-3 rounded-lg text-sm font-bold mt-auto uppercase tracking-wider">Open Long</button>
            </aside>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script src="app.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
