<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ExNexus | Institutional Terminal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #07090b; color: white; overflow: hidden; }
        .glass { background: rgba(15, 18, 22, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .neon-logo { font-size: 4rem; font-weight: 900; letter-spacing: -0.05em; color: #A4CD39; text-shadow: 0 0 30px rgba(164, 205, 57, 0.5); }
        .terminal-btn { background-color: #A4CD39; color: black; font-weight: 900; border: none; cursor: pointer; transition: all 0.2s; }
        .terminal-btn:hover { opacity: 0.9; transform: scale(1.02); }
    </style>
</head>
<body>

    <div id="gatekeeper" class="fixed inset-0 z-[9999] bg-[#07090b] flex flex-col items-center justify-center p-6 text-center">
        <div class="w-full max-w-md space-y-10">
            <div>
                <h1 class="neon-logo">EXNEXUS</h1>
                <h2 class="text-2xl font-black tracking-[0.5em] text-white -mt-2">TERMINAL</h2>
            </div>
            
            <div class="space-y-4 text-left">
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Operator Identity</label>
                <input id="user-id" type="text" placeholder="ENTER ID" class="w-full bg-black/40 border border-gray-800 p-5 rounded font-mono text-sm focus:border-[#A4CD39] outline-none transition-colors">
                
                <label class="text-[10px] font-bold text-gray-500 uppercase tracking-widest ml-1">Security Access Key</label>
                <input id="user-pass" type="password" placeholder="ENTER KEY" class="w-full bg-black/40 border border-gray-800 p-5 rounded font-mono text-sm focus:border-[#A4CD39] outline-none transition-colors">
                
                <button onclick="handleAuth()" class="w-full terminal-btn py-5 rounded uppercase tracking-widest text-xs mt-4">Authorize Connection</button>
            </div>
            
            <p class="text-[10px] text-gray-600 font-mono tracking-[0.4em] uppercase">Status: Encrypted Link Active</p>
        </div>
    </div>

    <div id="terminal-wrapper" class="flex h-screen w-full overflow-hidden bg-[#0b0e11] absolute inset-0 opacity-0 pointer-events-none transition-opacity duration-1000">
        <div class="w-20 border-r border-gray-800 flex flex-col items-center py-10 space-y-12 bg-black/40">
            <div class="w-12 h-12 rounded bg-[#A4CD39]/10 flex items-center justify-center border border-[#A4CD39]/30">
                <div class="w-5 h-5 bg-[#A4CD39] rounded-sm animate-pulse"></div>
            </div>
            <div class="flex flex-col space-y-10">
                <div class="text-blue-500 opacity-50"><svg class="w-8 h-8" fill="currentColor" viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg></div>
                <div class="text-orange-500 opacity-50"><svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg></div>
            </div>
        </div>

        <div class="flex-1 flex flex-col">
            <div class="h-16 border-b border-gray-800 flex items-center justify-between px-8 bg-black/60">
                <div class="flex items-center space-x-10">
                    <span class="text-[11px] font-black text-[#A4CD39] tracking-widest uppercase">● System: Live</span>
                    <span class="text-[11px] font-black text-blue-400 tracking-widest uppercase animate-pulse">● Intelligence Feed Connected</span>
                </div>
                <div id="btc-price" class="font-mono font-black text-lg text-[#A4CD39] tracking-tighter">$00,000.00</div>
            </div>

            <div class="flex-1 p-6 grid grid-cols-12 gap-6">
                <div class="col-span-9 h-full glass rounded-3xl overflow-hidden border border-gray-800">
                    <div id="tradingview_widget" class="w-full h-full"></div>
                </div>
                <div class="col-span-3 space-y-6">
                    <div class="glass p-6 rounded-3xl border-l-4 border-blue-500 bg-blue-500/5">
                        <span class="text-[10px] font-black text-blue-400 uppercase tracking-widest block mb-2">Nansen Intel</span>
                        <div id="nansen-feed" class="text-xs font-mono text-blue-100 italic">Scanning on-chain...</div>
                    </div>
                    <div class="glass p-6 rounded-3xl border-l-4 border-orange-500 bg-orange-500/5">
                        <span class="text-[10px] font-black text-orange-400 uppercase tracking-widest block mb-2">Coinglass Intel</span>
                        <div id="coinglass-feed" class="text-xs font-mono text-orange-100 italic">Monitoring liquidations...</div>
                    </div>
                    <div class="glass p-8 rounded-3xl bg-[#A4CD39]/5">
                        <span class="text-[10px] font-black text-gray-500 uppercase tracking-widest block mb-2">Equity</span>
                        <div class="text-4xl font-black text-white tracking-tighter">$24,190.55</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://s3.tradingview.com/tv.js"></script>
    <script>
        // Use standard function declaration to ensure it's available globally
        function handleAuth() {
            const uInput = document.getElementById('user-id');
            const pInput = document.getElementById('user-pass');
            
            if (uInput.value.trim() === "admin" && pInput.value.trim() === "nexus2026") {
                document.getElementById('gatekeeper').style.display = 'none';
                const wrap = document.getElementById('terminal-wrapper');
                wrap.classList.remove('opacity-0', 'pointer-events-none');
                initTerminal();
            } else {
                alert("ACCESS DENIED: Credentials do not match Operator Registry.");
            }
        }

        function initTerminal() {
            new TradingView.widget({
                "autosize": true, "symbol": "BYBIT:BTCUSDT", "interval": "15",
                "theme": "dark", "container_id": "tradingview_widget"
            });
            setInterval(updateTickers, 5000);
            updateTickers();
        }

        async function updateTickers() {
            try {
                const r = await fetch('https://api.bybit.com/v5/market/tickers?category=linear&symbol=BTCUSDT');
                const d = await r.json();
                document.getElementById('btc-price').innerText = '$' + parseFloat(d.result.list[0].lastPrice).toLocaleString();
            } catch(e) {}
            
            const nData = ["Smart Money accumulating ETH", "Institutional Inflow: +$42M", "Whale wallet move detected"];
            const cData = ["$12M Shorts Liquidated", "L/S Ratio: 51.2% Long", "Open Interest rising"];
            
            document.getElementById('nansen-feed').innerText = nData[Math.floor(Math.random()*nData.length)];
            document.getElementById('coinglass-feed').innerText = cData[Math.floor(Math.random()*cData.length)];
        }
    </script>
</body>
</html>
